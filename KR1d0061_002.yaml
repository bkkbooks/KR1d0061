body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔頴達等奉勑撰問喪第三十五正義曰案鄭目録云名曰問喪者以其記善問居喪之禮所由也此於別録屬喪服也親始至實也正義曰此一節明初死三日以來居喪哭踊悲哀疾痛之意也雞斯者笄謂骨笄纚謂縚髮之繒言親始死孝子先去冠唯留笄纚也徒跣者徒空也無屨而空跣也扱上衽者上衽謂深衣前衽扱之於帶以號踊履踐為妨故扱之交手哭者謂交手拊心而為哭也傷腎乾肝焦肺者言肺在上性近於燥故云焦肝近肺故云乾腎近下故云傷言近下性多潤而為傷矣舉此三者五藏俱傷可知也不舉火者哀痛之甚情不在食故不舉火也言旁親以下食不可廢故鄰里為之糜粥以飲食之糜厚而粥薄薄者以飲之厚者以食之親父至為里正義曰凡云親者包之五服也以此經悲哀之甚故知父母也云雞斯當為笄纚明反哭之後虞祭之時也祭之宗廟以鬼饗之者謂虞祭於殯宫神之所在故稱宗廟以鬼饗之尊而禮之兾其魂神復反也成壙而歸者此明葬之後猶居廬枕塊不敢入於室處也故哭泣無時者此明終喪思慕之心也服勤者言服處憂勞勤苦也人情之實也者言非詐偽假為之是人情悲慕之實也或問曰死三日而后斂者何也此記者假設問三日而后斂之意也三曰斂者以士言之則大斂也明大夫以上言之則小斂也此經凡言亦者亦以俟其生制三日者俟其生也若三日不生於後亦不生矣也非但不生孝子之心亦益衰矣衣服之具亦可以成矣親戚之逺者亦可以至矣或問曰冠者不肉袒何也者此解冠必不祖祖必不冠之意也又明孝子身有病闕其居喪所以禮矣此冠不居肉袒者謂心既悲哀肉袒形褻故不可褻其尊服而冠也若有吉事而內心肅敬則雖袓而著冠也故郊特牲云君袒而割牲是也或問曰免者以何為也怪成人肉袒之時須著免今非成人肉祖亦有著免故問之云者以何所為曰不冠者之所服也辭也不冠謂末冠童子之所服以未冠故著免也緦者此喪服正經之文記者引之故稱禮曰童子不緦者言不為族人著緦服也唯當室緦者謂童子無父兄當室主於家事唯此當室之童乃為族人著緦服緦者其免也者作記者云所以此童子為族人得著緦者以其無父兄當室之時即著免也以其無父兄而可依理故得為族人著緦服也當室則免而杖矣者又明童子得免所由以其孤兒當室則得免而杖為族人得著緦也若童子不當室則不得免及杖也注云免冠之細別以次成人也正義曰解當室所著之意也言免是冠之流例也童子當室亞次成人故得著免也云緦者其免也者疊出經文也言免乃有緦服也鄭出緦其免之意言內為父母著免乃有族人緦服言緦服由於著免是所以緦者由有免故也或問曰杖者何也者此明問居喪有杖為父母乃異何意如此故問之竹桐一也言為父竹為母桐孝子之意其義一也言孝子奉親用心是一但取義有異故竹桐而殊也故為父苴杖苴杖竹也者父是尊極故為之苴杖言苴惡之物以為杖自然苴惡之色唯有竹也故云苴杖竹也為母削杖削杖桐也言為母屈於父不同自然苴惡之色也故用削杖其杖雖削情同於父故云削杖桐也桐為是同父之義故不用餘木也或解云竹節在外外陽之象故為父矣桐節在內內隂之類也故為母也或問曰杖者以何為也者此問孝子居喪何以須杖之意也父在不敢杖矣尊者在故也者為母親對父之時不敢據杖以尊者在故不敢也堂上不杖辟尊者之處也者所以為母堂上不敢杖者堂上是父之所在辟尊者之處所以為母堂上故不杖也堂上不趨示不遽也者言孝子為母所以堂上不為喪趨者示父以間暇不促遽也若堂上而趨則感動父情使父憂戚故不杖不趨兾不悲哀於父也此孝子之志意人情之實事服問第三十六正義曰案鄭目録云名曰服問者以其善問以知有服而遭喪所變易之節此於別録屬喪服也傳曰至父母正義曰此四明從服輕重之異也傳曰皇氏云此言傳曰者即前大傳之篇則服術有六不指其人今各以其或可傳曰者是舊成傳記者引之則非前大傳篇也多而刑五喪多而服今記者皆引此舊傳而記之有從輕而重公子之妻為其皇姑者公子謂諸侯之妾子也皇姑即公子之母也諸侯在尊厭妾子使為母練冠諸侯沒妾子得為母大功而妾子妻不辨諸侯存沒為夫之母期也其夫練冠是輕也而妻為期是重故云有從輕而重也而謂之皇姑者皇君也此妾既賤若惟云姑則有嫡女君之嫌今加皇字自明非女君而此婦所尊與女君同故云君姑也有從無服而有服公子之妻為公子之外兄弟者謂公子之外祖父母也公子被厭不服已母之外家是無服也妻猶從公子而服公子外祖父母從母緦麻是從無服而有服也有從有服而無服公子為其妻之父母者雖為公子之妻猶為父母期是有服也公子被厭不從妻服父母是從有服而無服也注謂為公子之外祖父母從母緦麻正義曰經唯云公子外兄弟知非公子姑之子者以喪服小記云夫之所為兄弟服妻皆降一等夫為姑之子緦麻妻則無服今公子之妻為之有服故知公子之外祖父母從母也此等皆小功之服凡小功者謂為兄弟若同宗直稱兄弟以外族故稱外兄弟也傳曰母出則為繼母之黨服者此明繼母之黨亦是舊傳之辭事異於上故更稱傳曰也三年之喪既練矣有期之喪既葬矣者謂三年之喪練祭之後又當期喪既葬之節也則帶其故葛帶者故葛帶謂三年練葛帶也今期喪既葬男子則應著葛帶與三年之葛帶粗細正同以父葛為重故帶其故葛帶絰期之絰者謂三年練後首絰既除故絰期之葛絰若婦人練後麻帶除矣則絰其故葛絰帶期之麻帶以其婦人不葛帶故也服其功衰者功衰謂服父之練之功衰也注帶其至粗衰正義曰三年既練期既葬差相似也者三年既練要帶四寸百二十五分寸之七十六期之既葬其帶亦然故云差相似但父帶為重故帶其故葛帶也云絰期之葛絰三年既練首絰除矣者以三年既練男子除於首是男子首絰除矣其首空故絰期之葛絰此文主於男子也若其婦人則首絰練之故葛絰練後麻帶巳除則要絰期之麻帶也云為父既練衰七升者以間傳稱斬衰三卒哭受以成布六升既衰七升也云母既葬衰八升者者誤當云七升故間傳云為母疏衰四升受以成布七升是既葬受持為母衰七升也云凡齊衰既葬衰或八升或九升者以父之既練母之既葬衰皆七升其齊衰仍有八升九升故更言之八升者是正服齊衰或九升者是義服齊衰也云服其功衰服粗衰者功即粗也言齊衰既有八升九升服也其粗者謂七升父之衰也經不云服其父衰而云功衰者經稱三年之衰則父為長子及父卒為母皆是三年今期喪既葬反服其服若言功衰揔道三人故不得特言服父衰也母喪既練雖衰八升與正服既葬齊衰同以母服為重亦服母之齊衰也皇氏云謂三年既練之後初遭期喪今謂此經亦三年未練之前初有期喪未葬為前三年之衰為練祭至期既葬乃帶其故葛帶絰期之葛絰也必知其期喪未葬巳前得為三年練祭者雜記篇云三年之喪既顈其練祥皆行彼謂後喪示三年既顈之後得行前三年之喪練祭則知後喪期年未顈之前得為三年之喪而行練也熊氏云為母既葬衰八升言父在為母也今鄭注云為父既練衰七升為母既葬衰八升矣又經云三年之喪既練皆為父卒為母今熊氏云父在為母其義非也有大功之喪亦如之者此明三年之喪練後有大功之喪也大功之喪者為大功喪既葬以前經云期之喪既葬則此大功之喪亦既葬不云既葬者從上省文也亦如之者言亦帶其故葛帶絰期之葛絰也故云亦如之注大功至皆麻正義曰言大功初死之麻變三年練後之葛首要皆麻矣故間傳謂之重麻也云期既葬之葛帶者謂大功既葬葛帶以次差之三寸有餘三年練之葛帶以次差之則四寸有餘大功既葬葛帶小於練之葛帶故反服練之故葛帶也又大功既葬者首絰四寸有餘若要服練之葛帶首服大功既葬之葛絰既粗細相似不得為五分去一為帶之差故首絰與期之絰五寸有餘進與期之既葬同也故云絰期之絰是差次之冝也此注亦主於男子矣其婦人之服於下間傳篇具釋也云比雖變麻服葛大小同耳者大功初喪服麻之時首絰五寸餘要帶四寸餘大功既葬之後首絰應合四寸餘要帶本合三寸餘既服練之要帶四寸餘則其首絰合五分加一寸餘也是大功初麻衰既葬之葛初死之麻大小同云雖變麻服葛大小同耳云亦服其功衰者亦上文也服其功衰謂服父之練衰也以大功初喪者衰七升八升九升既葬之後則有十升然服父七升也云凡三年之喪既練始遭齊衰大功之喪絰帶皆麻者間傳篇云斬衰既練遭大功之喪既重麻則知斬衰既練遭齊衰灼然重麻故云絰帶皆麻也此熊氏皇氏之説檢勘鄭意其義然也崔氏云此經大功之喪承前經之下既有三年之練又有期喪既葬合大功既葬之後故帶其練之故葛帶絰期之葛絰於此經文其義得通然於間傳之文於義不合案間傳斬衰既虞卒哭遭齊衰之喪又云既練遭大功之喪文各別則此經文大功唯據三年練後不合期喪既葬也注云男子絰期之葛絰婦人帶期之葛帶其誤者為期絰期帶謂其大功之絰大功之帶然於鄭注其義稍乖也當以熊皇為正也小功無變也謂凡常小功無變於大功以上之服言先有大功以上喪服今遭小功之喪無變於前服不以輕服減纍於重也麻之有本者變三年之葛者謂大功以上為帶者麻之根本并留之合糾為帶如此者得變三年之練葛若麻之無本謂小功以下其絰澡麻斷本是麻之無本不得變三年之葛也言變三年葛舉其重者其實期之葛有本者亦得變之矣既練遇麻斷本者此明斬衰既練之後遭小功之喪雖不變服得為之加絰也既練之後遭遇麻之斷本小功之喪於免絰之者以練無首絰於小功喪有事於免之時則為之加小功之絰也既免去絰者謂小功以下之喪斂殯事竟既免之後則脫去其絰也每可以絰必絰者謂於小功以下之喪當斂殯之節每可以絰之時必為之加麻也既絰則去之者謂不應絰之時則去其絰自若練服也注雖無至服也正義曰有事則免絰如其倫者倫謂倫類雖為之不變服其應免絰之時如平常有服之倫類也云免無不絰者解經於免絰之於是免之時必著絰則大斂小斂之節衆主人必加絰也云絰有不免者解經每可以絰必絰也云絰謂不免但云絰者謂既葬之後虞及卒哭之節但著絰不有免以服成故也是絰有不免者也小功不易喪之練冠者言功以下之喪不合變易三年喪之練冠期之練冠亦不得易也免則絰其緦小功之絰者謂如當緦小功免之節則首絰其緦與小功之絰所以為後喪緦絰者以前喪練冠首絰巳除故也上經云小功不易明緦不易下經云緦小功之絰兼言緦者恐免絰不及緦故也前經巳云於免絰之此經又云如免則絰者前經但云絰不云練冠恐小功以下不得改前喪練冠故重言之也因其初葛帶者言小功以下之喪要中所著仍因其初喪練葛帶上文云期喪既葬則帶練之故葛帶此小功以下之喪亦著練之初葛帶不云故而云初者以期初喪之時變練之葛帶為麻期既葬之後還反服練之故葛帶故言故也謂其小功以下之喪不變練之葛帶故云初葛帶也緦之麻不變小功之葛小功之麻不變大功之葛者謂以輕喪之麻本服既輕雖𥘉喪之麻不變前重喪之葛也以有本為稅者稅謂變易也所以緦之麻不變小功者以其緦與小功麻經既無本不合稅變前喪唯大功以上麻絰有本者得稅變前喪也注稅亦至易也正義曰云稅亦變易者以一經之內有變有稅兩文故言稅亦變易也云此要其麻有本者乃變上耳者麻有本謂大功以上麻絰有本為重下服乃變上服大功得變期期得變三年也云雜記曰有三年之練冠則以大功之麻易之者所以引此者欲明大功之麻非伹得易期喪之葛亦得易三年練冠之葛也殤長中變三年之葛者此論成人小功緦麻不得易前喪之葛又論殤在小功緦麻得易三年葛也殤長中者謂本服大功之喪今乃降在長中殤男子則為之小功婦人為長殤小功中殤則緦麻如此者得變三年之葛也終殤之月算者謂著此殤喪服之麻終竟此殤之月算數如小功則五月緦麻則三月而反三年之葛者此著麻月滿還反服三年之葛也是非重麻為其無卒哭之稅者言服殤長中之麻不改又變三年之葛是非重此麻也所以服不改又變前喪葛者以殤服質略初死服麻巳後無卒哭之時稅麻服葛之法以其質略其文不縟故也下殤則否者以大功以下殤謂男子婦人俱為之緦麻其情既輕則不得變三年之葛也案上文麻之有本得變三年之葛則齊衰下殤雖是小功亦是麻之有本故喪服小記云下殤小功帶麻不絶本然齊衰下殤乃變三年之葛今大功長殤麻既無本得變三年之葛者以其殤服質略無虞卒哭稅故特得變之若成人小功緦麻麻既無本故不得變也注謂大至服緦正義曰知大功之親為殤在緦小功者以前文云緦小功不得變上服則此得變三年之葛亦是緦麻小功也殤長中在小功緦者本大功之親耳云正親親也者以大功之親其殤所以得變三年之葛者以大功是正親親故重其殤也云三年之葛大功變既練者則雜記篇云三年之練冠則以大功之麻易之是也云齊衰變既虞卒哭者齊衰初喪得變三年既虞卒哭則下間傳篇云斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特是也云為殤未成人文不縟耳者縟謂數也謂禮文繁數若成人以上則禮繁數故變麻服葛今殤是未成人唯在質略無文飾之繁數故不變麻服葛也云男子為大功之殤中從上服小功婦人為之中從下服緦者喪服傳文君為天子三年者謂列國諸侯之君為天子三年也夫人如外宗之為君也者言諸侯夫人為天子如諸侯外宗之婦為君也諸侯外宗之婦為君期則夫人為天子亦期也故云如外宗之為君諸侯為天子服斬衰喪服正文此記載之者謂以夫人如外宗之為君起文以君與夫人故知將欲明諸侯夫人為天子故載君為文之首也注外宗至南面正義曰外宗君外親之婦也者其夫既是君之外姓其婦即是外宗也云其夫與諸侯為兄弟服斬妻從服期者謂夫與諸侯為兄弟之親在於他國諸侯既死來為之服當尊諸侯不繼本服之親故皆服斬其妻從服期也云諸侯為天子服斬故夫人亦從服期是為夫之君如外宗也熊氏云凡外宗有三案周禮外宗之女有爵通卿大夫之妻一也雜記云外宗為君夫人猶內宗是君之姑姊妹之女舅之女從母之女皆為諸侯服斬為夫人服期是二也此文外宗是諸侯外宗之婦也若姑之子婦從母之子婦其夫是君之外親為君服斬其婦亦名外宗為君服期是三也內宗有二者案周禮云內女之有爵謂其同姓之女悉是一也雜記云內宗者是君之五屬之內女是二也引喪大記曰外宗房中南面者證外宗之義也丗子不為天子服者此明諸侯世子有繼丗之道所以遠嫌下為天子服也君所主夫人妻大子適婦者此三人既正雖國君之尊猶主其喪也非此則不主也妻欲見大夫以下亦為妻及適子適婦為主也大夫之適子為君夫人太子如士服者此明大夫適子為君夫人大子之服是大夫無繼丗之道其子無嫌得為君與夫人及君之大子著服如士服也君之母非夫人則羣臣無服者若君母是適夫人則羣臣為服期今君母非夫人君為之服緦則羣臣為之無服也唯近臣及僕驂乘從服者近臣謂􅕡寺之屬僕御車者也驂車右也君之母非夫人貴臣乃不服而此諸臣賤者隨君之服也故云從服唯君所服服也者君服緦則此等之人亦服緦故云唯君所服服也注妾先至不可正義曰妾先君所不服也天子諸侯為妾無服唯大夫為貴妾服緦故知妾先君所不服云禮庶子為後其母緦者案喪服緦麻章云庶子為父後者為其母是也云言唯君所服伸君也者若其不為後則為母無服故喪服云公子為其母練冠麻衣縓緣今以為君得著緦麻服是伸君之尊也君既服緦是近臣得從君服也此謂禮之正法云春秋之義有以小君服之者鄭既以正禮言之又别春秋之時不依正禮者有以為小君之服服其妾母者是文公四年夫人風氏薨是僖公之母成風也又昭十一年夫人歸氏薨是昭公之母齊歸也皆亂丗之法非正禮也案異義云妾子立為君得尊其母立以為夫人否今春秋公羊既説妾子立為君母得稱夫人故上堂稱妾屈於適也下堂稱夫人尊於國也云子不得爵命父妾子為君得爵命其母者以妾在奉授於尊者有所因緣故也榖梁傳曰魯僖公立妾母成風為夫人是子爵於母以妾為妻非禮也故春秋左氏説成風妾得立為夫人母以子貴禮也許君謹案舜為天子瞽瞍為士起於士庶者子不得爵父母也至於魯僖公得尊母成風為小君經無譏文從公羊左氏之説鄭則從榖梁之説故異義駮云父為長子三年為衆子期明無二適也女君卒繼攝其事耳不得復立為夫人如鄭駮之言則此云春秋小君服之者是灼然非禮也云時若小君在則益不可者其小君無而以夫人服之巳為不可今小君既在而以夫人服妾母彌益不可故云益不可也公為卿大夫錫衰以居者明為卿大夫之喪服之後著錫衰以居也出亦如之者出謂以他事而出不至喪所亦著錫衰其首則服皮辨當事則辨絰者君行往弔卿大夫當大斂及殯并將葬啓殯當如此之事則首著辨絰身衣錫衰若於士雖當事首服皮辨故士喪禮云君視大斂注云皮辨服襲裘是也大夫相為亦然者亦如君於卿大夫也不當事則皮辨當事則辨絰故雜記云大夫與殯亦辨絰是也大夫於士士雖當事亦皮辨也為其妻往則服之出則否者謂公於卿大夫之妻及卿大夫相為其妻往臨其喪則服錫衰不恆著之以居若餘事之出則不服也言居亦不服其當殯斂之事亦辨絰也凡見人無免絰者謂已有齊衰之喪無免去絰重故也雖朝於君無免絰者以絰重縱往朝君亦無免脫於絰也唯公門有稅齊衰者謂已有不杖齊衰之喪公門稅去其衰絰猶不去也若杖齊衰及斬衰雖入公門衰亦不稅也其大功非但稅衰又免也傳曰君子不奪人之喪亦不可奪喪也解朝君無免絰之意引舊記以明之言君所以許臣不免絰而入朝以君子之人以已恕物不可奪人喪禮斬衰唯而不對但唯於人不言辭而對也皇氏以為親始死但唯而已不以言對案雜記云三年之喪對而不問為在喪稍久故對也大功言而不議者大功稍輕得言他事而不議論時事之是非雜記云齊衰之喪言而不語彼謂言已事故鄭彼注云言言己事也為人説為語與此言異也斬衰三日不食者謂三日之內孝經云三日而食者謂三日之外乃食也齊衰二日不食者皇氏云謂正服齊衰也喪大記云三不食者當是義服齊衰小功緦麻再不食者喪大記云一不食再不食則是一不食謂緦麻再不食謂小功也與此不同者熊氏云異人之説故其義别也父母之喪既虞卒哭者此明父母終喪以來所食之節也又期而大祥有醯醬者謂至大祥之節食醯醬則小祥食菜果之時但用鹽酪也若不能食者小祥食菜果之時得用醯醬也故喪大記云小祥食菜果以醯醬中月而禫禫而飲醴酒又云食肉者先食乾肉喪大記云祥而食肉者異人之説故不同也注先飲醴酒食乾肉者不忍發御厚味正義曰以醴酒味薄乾肉又澀所以先食之者以喪服除孝子不忍發初御醇厚之味故飲醴酒食乾肉也父母之喪居倚廬者此明初遭五服之喪居處之異也芐翦不納者芐為蒲蘋為席翦頭為之不編納其頭而藏於內也父母之喪既虞卒哭者此明遭父母之喪至終服以來所居改變之節即斬衰居倚廬齊衰居堊室論其正耳亦有斬衰不居倚廬者則雜記云大夫居廬士居堊室是士服斬衰而居堊室也亦有齊衰之喪不居堊室者喪服小記云父不為衆子次於外注云自若居寢是也斬衰三升者此明五服精粗之異有事其縷無事其布曰緦者以三月之喪治其麻縷其細如緦故云緦麻以朝服十五升抽去其半縷細而疏也有事其縷事謂煆治其布纑縷也無事其布謂織布既成不煆治其布以哀在外故也注此齊至差也正義曰此齊衰多二等者案喪服記云齊衰四升此經云齊衰四升五升六升多於喪服篇之二等故云多二等也云大功小功多一等者案喪服記云大功八升若九升此云大功七升八升九升是多於喪服一等也喪服記又云小功升若十一升此云小功十升十一升十二升是多於喪服一等故云大功小功多一等也服於受者以喪服之經理主於受服者而言以大功之殤無受服不列大功七升以喪服父母為主欲其文相值故略而不言故云服主於受也云是極列衣服之差也者以喪服既略故記者於是經極列衣服之差所以齊衰多二等大功小功多一等也斬衰三升者此明父母之喪初死至練冠衰升數之變并明練後除脫之差也受以成布六升者以言三升四升五升之布其縷既粗疏未為成布也六升以下其縷漸細與吉布相參故稱成布也葛帶三重者謂男子也既虞卒哭受服之節要中之帶以葛代麻帶又差小於前以五分去一唯有四分見在三重謂作四股糾之積而相重四股則三重未受服之前麻帶為兩股相合也此直云葛帶三重則首絰雖葛不三重也猶兩股糾之也期而小祥練冠縓緣者父沒為母與父同也至小祥又以卒哭後冠受其衰而用練易其冠也又練為中衣以縓為領緣也又期而大祥素縞麻衣者謂二十五月大祥祭此日除脫則首服素冠以縞紕之身著朝服而為大祥之祭祭訖之後而哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣末有采緣故云大祥素縞麻衣也中月而禫者中間也大祥之後更間一月而為禫祭二十五月大祥二十七月而禫禫而纎者禫祭之時玄冠朝服禫祭既而首著纎冠身著素端黃裳以至吉祭無所不佩者吉祭之時身尋常吉服平常所服之物無不佩也注葛帶至常也正義曰葛帶三重謂男子也以經文直云葛帶三重不辨男女之異故明之云謂男子也云五分去一而四糾之者以喪服傳云五服絰帶相差皆五分去一故知受服之時以葛代麻亦五分去一既五分去一唯有四分見在分為四股而糾之故云四糾云帶輕既變因為飾也者男子重首而輕帶既變麻用葛四股糾之以為飾也則知男子首絰婦人要帶不三重為飾也云婦人葛絰不葛帶者案少儀云婦人葛絰而麻帶又上檀弓云婦人不葛帶謂齊斬之婦人也故士虞禮日婦人既練説首絰不説帶也注云不脫帶齊斬婦人帶不變也婦人少變而重帶帶下體之上也其大功以下婦人亦葛帶也故喪服大功章男女並陳及其變服三月受以小功衰即葛九月是男女共為即知大功婦人亦受葛也云舊説云三糾之練而帶去一股者舊説云所至練之時又三分去一此既葬葛帶三重去其一股以為練之帶也云去一股則小於小功之絰似非也者斬衰既葬與齊衰之麻同斬衰既練與大功之麻同大功之帶即與小功首絰同所云同者皆五分去一個乃三分斬衰既葬三重之葛帶去其一服以為練帶則是三年練帶小於小功首絰非五服之差次故云似非也云易服謂為後喪所變也者以身先有前喪重今更遭後喪輕服欲變易前喪故云為後喪所變也云其為帶猶五分絰去一耳者以婦人斬衰不變帶以其重要故也婦人既重其要恐要帶與首絰粗細相似同故云其為帶猶須五分首絰去一分耳以首尊於要但婦人避男子而重要帶耳云喪服小記曰除成喪者其祭也朝服縞冠者證當祥祭之時所著之服非是素縞麻衣也云此素縞者玉藻所云縞冠素紕既祥之冠者引之者證此經大祥素縞麻衣是大祥之後所服之服也云麻衣十五升布深衣也者案雜記篇云朝服十五升此大祥之祭既著朝服則大祥之後麻衣粗細當與朝服同者故知十五升布深衣也云謂之麻者純用布無采飾也者若有采飾則謂之深衣深衣篇所云者是也若緣以素則曰長衣聘禮長衣是也若緣之以布則曰麻衣此云麻衣是也云大祥除衰杖者以下三年問篇云三年之喪二十五月而畢既稱終畢是除衰杖可知也云黑經白緯曰纎者戴德變除禮文矣云舊説纎冠者采纓也者以無正文故以舊説而言之云無所不佩紛帨之屬如平常也者此謂禫祭既畢吉祭以後始得無所不佩若吉祭之前禫祭雖竟未得無所不佩以其禫後尚纎冠玄端黃裳故知吉祭以後始從吉也若吉祭在禫祭既畢以後始從吉也若吉祭在禫月猶末純吉七虞記云是月也吉祭而猶未配注云是月是禫月也當四時之祭月則祭而猶未以某妃配則禫之後月乃得復平常易服者何為易輕者也以前文云易服者先易輕者故記者於此經更自釋易輕之意故云何為易輕者也言有何所為得易輕者故下文釋云既有前喪今又遭後喪得以後喪易換前喪輕者也斬衰之喪既虞卒哭者謂士及庶人也故卒哭與虞並言之之也注此言至其輕正義曰包特著其義兼者明有絰帶耳者以卑者可包尊須持著其尊卑之義故於斬衰重服言兼者不取其義直云絰帶麻葛兼有故於齊義輕服言之於男子而論其實同也云不言重者三年之喪既練或無絰或無帶言重者以明今皆有者鄭以既遭大功之喪麻葛重此文承麻葛重下所以不稱麻葛重者以三年之喪既練之後男子除首絰是或無絰也婦人除要帶是或無帶也所以稱重以於先既單今首絰皆有故須稱重云期以下固皆有矣者言男子首之與要固當皆有絰帶矣婦人亦然也既不似既練之單所以不得稱重也斬衰至服之此明五服葛之與麻粗細相同同者與後兼前服也麻同則兼服之者以後服之麻與前服之葛粗細同則得服後麻兼前服葛也案服問篇小功緦不得變大功以上此小功之麻得變大功之葛緦之麻得變小功之葛謂成人大功之殤在長中服問已釋也兼服之服重者則前文重者特是也則易輕者也謂男子婦人則易換輕者前文輕者包是也注服重至受矣正義曰云則者則男子與婦人也者以前文麻葛兼服之但施於男子不包婦人今此易輕者男子則易於要婦人則易於首男子婦人俱得易輕故云則者則男子與婦人也云凡下服虞卒哭男子反其故葛帶婦人反其故葛絰者此明遭後服初喪男子婦人雖易前服之輕至後服既葬之後還須反服其前喪故云男子反服其故葛帶婦人反服其故葛絰但經文據其後喪初死得易前喪之輕注意明也後既易以滿還反服前喪輕服故文注稍異也禮記正義卷第六十四
