body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔穎達等奉勑撰射義第四十六正義曰案鄭目録云名曰射義者以其記燕射大射之禮觀德行取於士之義此於別録屬吉事案此篇中有鄉射又云不失正鵠正則賔射然則鄉射賔射俱有之矣今目録唯云燕射大射者但此篇廣說天子諸侯大射燕射之義不專於鄉射賔射故鄭目録特舉大射燕射其射之所起起自黃帝故易繫辭黃帝以下九事章云古者弦木為􅓡剡木為矢􅓡矢之利以威天下又丗本云揮作弓夷牟作矢注云揮夷牟黃帝臣是弓矢起於黃帝矣虞書云侯以明之是射侯見於堯舜夏殷無文周則具矣古者至序也正義曰此一篇之義廣說射禮明天子以下射之樂章上下之差又明天子諸侯選士與祭之法因明孔子矍相之圃簡賢選士誓衆之事又明君臣父子正鵠之義是男子有事於射故男子初生設桑􅓡蓬矢之義又明志正射中之義飲酒養病之事今各隨文解之此經明將射之子諸侯先行燕禮所以眀君臣之義卿大夫將射先行鄉以明長幼之序也古者諸侯之射也必先行燕禮者案儀禮大在未旅之前燕初似饗即是先行饗禮而云先行燕禮者燕初似饗正謂立行禮似饗其餘則燕故禮其牲狗及設折俎行一獻此等皆燕之法也故云先行燕禮也燕禮者所以明君臣之義也者謂臣於堂下再拜稽首升成拜君答拜似若臣盡竭其力致敬於君君施惠以報之也鄉飲酒之禮者所以明長幼之序也者此鄉飲酒謂黨正飲酒以鄉統名則前篇云六十者坐五十者立侍是也故射至行矣正義曰此一經明射者之禮言內志審正則射能中故見其外射則可以觀其內德故云可以觀德行矣注正鵠之名出自此也正義日以賔射之的謂之正正者正也欲明射者內志須正也鄭注大射云正者正也亦烏名齊魯之閒名題肩為正是也以大射之質謂之鵠鵠者直也欲使射者外體之直是正鵠之名出自此射者而來故云正鵠之名出自此也其節至德也正義曰此節明天子以下射禮樂章之異天子以騶虞為節者歌騶虞之詩射人云騶虞九節諸侯以貍首為節者謂歌貍首也射人云貍首七節卿大夫以采蘋為節士以采蘩為節者射人云皆五節案鄉射注云五節歌五終四節四拾其一節先以聽也若然則九節者五節先以聽七節者三節先以聽皆以四節應乘矢拾發也騶虞者樂官備也者謂射一發而得五豝喻得賢人多賢人多則官備也貍首者樂㑹時也者諸侯不來朝射其首是樂㑹及盟也采蘋者樂循法也于以采蘋南澗之濱循㵎以采蘋踰循法度以成君事采蘩者樂不失職也謂采蘩曰被之童童夙夜在公是其不失職也是故天子以備官為節謂騶虞也諸侯以時㑹天子為節謂歌貍首也卿大夫以循法為節謂歌采蘋也士以不失職為節謂歌采蘩也明乎其節之志以不失其事者其節之志謂天子以備官為志諸侯以時㑹為志卿大夫以循法度為志士以不失職為志是各明逹其樂節之志故能不失其所為之事也德行立則無暴亂之禍矣功成則國安者是覆說上文功成德行立先覆說德行然後却覆說功伐也以先由德行乃功成也故曰射者可以觀盛德也之禍國安射者各明其志能致盛德故云所以觀盛德至仁人正義曰案詩義云君射一發則驅五豝獸以軍戰之禮禽獸之命不忍特驅其一此云喻得賢者多則以豝喻賢也謂一發而得五豝猶若君一求而得五賢與詩文異者斷章為義云于嗟乎騶虞歎仁人也與詩義同也以騶虞不食生物故云于嗟歎其仁人騶虞既為天子樂章而儀禮鄉射用之者鄭注鄉射云此天子之射節也而用之者方有樂賢之志取其冝也曽孫之詩謂之貍首者貍首篇名曽孫者其章頭也儀禮大射奏貍首閒若一鄭注云貍之言不來也其詩有射諸侯首不朝者之言因以名篇故謂之貍首也是故至務焉正義曰此一節明天子以射禮簡選諸侯以下德行能否故聖王所以務以射選諸侯卿大夫者諸侯雖繼丗而立卿大夫有功乃升非專以射而選伹既為諸侯卿大夫又考其德行更以射辨其才藝髙下非謂直以射選補始用之也射者男子之事也因而飾之以禮樂也者男子生有縣弧之義故云射者男子之事因此射事更華飾以禮樂則容體比於禮其節比於樂是也故事之盡禮樂而可數為以立德行者莫若射者謂諸事之中能窮盡禮而可數數為之以興立人之德行諸事之中無如於射唯射能如此故聖王務重焉也注男子至飾之正義曰男子生而有射事者案內則篇云男子生設弧於門左是也云長學禮樂以飾之者案內則篇云十有三年學樂誦詩舞勺成童舞象二十舞大夏是長學禮樂以華飾射事也是故至有也正義曰此一節眀射為諸侯之事又明諸侯君臣盡志於射以習禮樂無流亡之患諸侯歲獻者謂諸侯每歲獻國事之書及獻計偕之物於天子也貢士於天子者諸侯三年一貢士於天子也天子試之於射宫者言天子試此所貢之士於射宮之中而中多者得與於祭者此謂大射也注歲獻至一人正義曰以經云歲獻貢士於天子恐歲獻之文只是貢獻於士故云歲獻獻國事之書云及計偕物也者漢時謂郡國送文書之使謂之為計吏其貢獻之功與計吏俱來故謂之計偕物也偕俱也非但獻國事之書又俱獻貢物故云及計偕物知歲獻國事之書者小行人云令諸侯春入貢秋獻功注云貢六服所貢也功考績之功也秋獻之若今計文書斷於九月其舊法也云者以經貢士之文繫歲獻之下恐每歲貢土故云三歲而貢士知三歲者案書傳云古者諸侯之於天子也三年一貢士一適謂之好德再適謂之賢賢三適謂之有功有功者天子賜以衣服弓矢再賜以秬鬯三賜以虎賁百人號曰命諸侯不云益地者文不具矣書傳又云貢士一不適謂之過注云謂三年時也再不適謂之敖注云謂六年時也三不適謂之誣注云謂九年時也一絀以爵再黜以地三絀而地畢注云凡十五年鄭以此故知三歲而貢士也故詩至具也正義曰上經說諸侯君臣之射此明諸侯之射所歌樂章節者此貍首之詩也所以論燕射則燕則譽故君臣相與盡志於射也此詩名貍首而發首云曽孫侯氏者但此篇之中有貍首之字在於篇中撮取貍首之字以為篇首之目謂若騶虞之詩其字雖在篇內而名騶虞矣曽孫侯氏者謂諸侯也此諸侯出於王是王之曽孫也故云曽孫侯氏矣若左傳云曽孫蒯聵之類是也四正具舉者將射之時先行燕禮其燕之時四度正爵悉皆舉遍謂獻賔獻君獻卿獻大夫四獻既畢乃後射故云具舉大夫君子凡以庶士者言為燕之時大夫君子及庶衆士等小大莫處御于君所者言大夫士等小之與大無有處於職司而不來者皆御侍於君之處所也以燕以射者謂先行燕禮而後射也則燕則譽者燕安也既君臣歡樂用是燕安而有聲譽也諸侯自為正之具也正謂修正言射者是諸侯自為修正之具言修正得安由於射也故前文云內志正謂此也注此曽至名譽正義曰以諸侯射以貍首之篇謂今詩文無貍首之篇今射義有載曽孫之詩故知是貍首也云正爵四行獻賔獻公獻卿獻大夫者大射禮文云乃後樂作而射也者案大射禮獻大夫之後乃後工入樂作而後射此謂大射也若燕射則說屨升堂坐之後乃射矣故燕禮說屨升堂獻士畢若射則大射正為司射如鄉射之禮是也孔子至存者正義曰從篇首以來釋天子以下射樂之節又說大射之禮并顯諸侯貍首之義故此一節載孔子射於矍相之圃選賢誓衆之禮也射至於司馬者欲射之前先行鄉飲酒之禮獻賔及介獻衆賔之後未旅之前作相為司正至於將射轉司正為司馬故云射至於司馬也使子路執弓矢出延射者謂立司馬之時孔子路為司射之官出門而延進觀者及欲射之人曰賁軍之謂覆敗也敗軍之將言無勇也亡國之大夫者謂亡君之國言不忠且無智也與為人後者與猶竒也謂有人無後既立後訖此人復往竒之是其貪財也不入其餘皆入者言有此以前三惡則不得入若其餘無此三惡者皆得入也又使公罔之裘序點揚觶而語者公罔為氏也裘名也序氏也點名也揚舉也至將旅之時使二人俱舉觶誓衆而說所誓之事此舉其目故揔舉二人於是公罔之裘先言序點後言矣幼壯孝弟者謂二十之幼三十之壯能於幼壯以來能行孝弟也耆耊好禮者謂六十之耆七十之耊老而不倦愛好於禮不從流俗者身行獨行不從流移之俗也修身以俟死者謂修潔其身以俟於死者不在此位也者者不問此衆人之中有此上諸行不若有則可在此賔位矣好學不倦好禮不變者此之所誓彌精於前前則雖云孝弟好禮未能不倦不變旄期稱道不亂者旄謂八十九十曰旄期謂百年曰期頥年雖甚老行道不亂亦喻前文耆耊好禮是後者彌精也伹此記所陳唯約鄉射禮也子路出延射者是將射之前案鄉射司射比衆耦於堂西此出延者但觀者既多庭中不容故出延之入乃比耦以初門外未入觀者既多未有賔主之禮故誓惡者令其不入以鄉飲酒禮差之射禮畢旅酬之時乃使二人舉觶故鄉射禮畢司馬反為司正樂工升堂復位賔取俎西之觶酬主人主人酬大夫自相旅畢君使二人舉觶於賔與大夫則當此公罔之裘序點二人舉觶之節也但衆賔射事既了衆賔皆在賔位主人以禮接之不復斥言其惡於此伹簡其善公罔簡而尚疏序點簡而轉詳旄期之老不復能射得云在位者此極老之人本來觀禮雖不能射與在賔中故知旅酬之時其人猶在也注先行至去也正義曰知先行飲酒禮者案儀禮鄉射先行飲酒之禮此射矍相之圃謂賔射故鄭注鄉侯二正是用賔射之正又鄉大夫職云以鄉射之禮五物詢衆庶鄭引此孔子射於矍相之事故知與此鄉射同也云賁讀為僨者若春秋鄭伯之車僨於濟說文云僨僵也是僨為覆敗也云與猶竒也者謂他人無後巳有人後之相為合配今巳更後之是配合之外更有竒隻故云後人者有為者而往竒之發也正義曰案經上云之裘故知之是發聲也即裘為名矣云射畢又使此二人舉觶者古者於旅也語者鄭釋其公罔之裘序點揚觶而語之事古者於旅也語者鄉射記文鄭注云禮成樂備乃可以言語先王禮樂之道也云耆耊皆老也者案曲禮云六十曰耆服䖍注僖九年傳云七十曰耊又鄭注易大耊之嗟謂年餘七十也又毛詩傳云八十曰耊大略言之七十八十皆謂之耊也云者不言有此行不可以在此賔位者謂射畢旅酬之時衆賔之位矣射之至諸侯正義曰此一經釋稱射之名及鵠之與侯之文射之為言繹也者此記者訓釋射之名射者是繹也繹陳也言陳巳之志或曰舍也者是記者又解射名故云射者舍也舍中也謂心平體正持弓矢審固則能中也繹者各繹巳之志也者言君臣父子各舒陳已之志意則下云為人父者以為父鵠是也持弓矢審固則射中矣者此覆說釋上或曰舍也舍中也為人父者以為父鵠者凡射者大射則皮侯賔射則正侯燕射則獸侯唯大射有鵠此據大射而知然鵠則上下俱同無復君臣父子之别而言以為父鵠者謂升射之時既身為人父則念之云所射之鵠是為人父之鵠中則任為人父不中則不任為人父故為人之父者以為父鵠以下放此故射者各射已之鵠者謂衆射之人雖共射一鵠各射巳之所主之鵠也故天子之大射謂之射侯者言天子所射之物謂之射侯言射之中能服諸侯也舉大射言之其實賔射燕射皆謂之射侯也射中則得為諸侯者謂數有慶賜堪得久為諸侯也射不中則不得為諸侯者數被責讓不堪久為諸侯也非為射中封為諸侯不中不得為諸侯也注大射至讓也正義曰大射將祭擇士之射者即下文云天子將祭必先習射於澤所以擇士是也云將射還視侯中之時意曰此鵠乃為某之鵠者案大射禮云耦升自西階並而東皆當其物北面揖及物揖皆左足履物還視侯中謂於此之時南面回還視侯中也中謂身謂視侯中身也射者意云此鵠乃為某之鵠謂父之鵠子之鵠不定一故稱某也云吾中之則成人不中之則不成人也者中之則能成其父子君臣若不中則不能成其父子君臣故知父鵠子也云得為諸侯謂有慶也不得謂有讓也者鄭恐得為諸侯始封以土得為諸侯則奪其國之也凡天子諸侯及卿大夫禮射有三一為大射是將祭擇士之射二為賔射諸侯來朝天子入而與之射也或諸侯相朝而與之射也三為燕射謂息燕而與之射其天子諸侯大夫三射皆具其士無大射故司裘職云大射唯明王及諸侯卿大夫不及於士故鄭注云士不大射士無臣祭無所擇是也其賔射燕射士皆有之故射人云士射犴侯二正是士有賔射也又鄉射記云士布侯畫以鹿豕是士有燕射矣其侯天子大射則射皮侯故者工記云張皮侯而棲鵠則春以功又司裘職云王大射則共虎侯熊侯豹侯設其鵠鄭注考工記皮侯謂此侯也畿內諸侯大射則張熊侯豹侯故司裘職云諸侯則共熊侯豹侯設其鵠是也若畿外諸侯大射亦張三侯鄭注云逺尊得伸故亦張三侯一曰大侯鄭注云則天子熊侯謂以熊皮飾之二曰糝侯鄭注云糝雜也豹鵠而麋飾三曰犴侯鄭注云犴胡犬皮飾侯若畿內卿大夫射麋侯故司裘云卿大夫則共麋侯是也其畿外卿大夫射侯無文於諸侯既得三侯其卿大夫蓋降君一等則糝侯犴侯其大射之侯皆有鵠也其鵠則三分侯中而居其一故考工記云梓人為侯廣與崇方參分其廣而鵠居一焉凡皮侯者各以其飾侯之側又方制其皮以為鵠故鄭注司裘云以虎熊豹麋之皮飾其側又方制之以為􅾱謂之鵠謂之鵠者取名於鳱鵠鳱鵠小鳥而難中是以中之為俊亦取鵠之言較較者直也射所以直巳志則是但取其名非是實鳥也此侯道鄭注司裘云虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十參七十干五十逺尊得伸可同耳其天子以下賔射則射人云王射三侯五正諸侯射二侯三正卿大夫射一侯二正士射犴侯二正鄭云謂五正三正二正之侯五正者中朱次白次蒼次黃玄居外三正損玄黃二正畫以朱緣鄭又云二侯者三正二正之侯也一侯者二正而已此皆與賔射於朝之禮也考工記梓人職云張五采之侯則逺國屬凡賔射之侯謂之正鄭注大射云正者正也亦鳥名齊魯之閒名題肩為正然則天子賔射用五正三正二正之侯畿內諸侯賔射用三正之侯卿大夫用二正之侯士亦用二正之侯又飾以犴畿外諸侯以下賔射其侯無文約大射諸侯既司天子張三侯則賔射亦同天子用五正正二正之侯其卿大正二正之侯士射二正之侯若五正者同虎侯九十弓三正七十弓二正者同豹侯五十弓凡中央之赤皆方二尺以外之色皆分布之其外又畫以雲氣天子以下燕射則尊卑皆用一侯故鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕鄭注云白質赤質皆謂采其地其地不采者白布也熊麋虎豹鹿豕皆正面畫其頭象於正鵠之處耳君畫一臣畫二陽竒隂偶之數也燕射射熊虎豹不忘上下相犯射麋鹿豕志在若臣相養也梓人云張獸侯則王以息燕謂此也鄉射記既不列畿內畿外之異則諸侯以下外內同也鄉射記列天子以下各一侯下文云侯道五十弓弓二寸以為侯中則天子以下皆五十弓侯中同方一丈也降尊以就卑言燕主歡心故也而皇氏沈氏乃云天子熊侯或云九十弓或云七十弓乃同三侯上下之差文無準據其義非也其侯用布之數案鄉射記鄉侯五十弓則侯道五十步也以弓之下制長六尺以射用弓故稱弓一弓取二寸以為中則侯中方一丈也鄉射記又云倍中以為躬注云躬身也謂中之上下幅也用布各二丈鄉射記又云倍躬以為左右舌舌謂躬之上下橫一愊布張於躬外左右而出謂之舌考工記謂舌為個躬既二丈上舌倍躬則用布四丈也鄉射記又云下舌半上舌注云半者半其出於躬者也上舌出躬各一丈則下舌出弓各五尺然則下舌用布三丈揔而計之侯中方一丈凡五愊用布五丈上下二躬用布四丈上舌復用布四丈下舌用布三文故鄭注鄉射記云鄉射侯用布十六丈也以此計之侯道七十弓則侯中方丈四凡七愊愊別丈四是用布九丈八尺上下二躬各倍中用布五丈六尺上舌倍躬亦用布五丈六尺上舌出躬各丈四尺下舌半上舌則左右各減七尺則下舌用布四丈二尺故鄭注鄉射記云七十步之侯用布二十五丈二尺其九十弓之侯則侯中方丈八尺凡九愊愊別一丈八尺侯中用布十六丈二尺上下二躬各倍中用布七丈二尺上舌倍躬長七丈二尺其舌出躬各丈八尺下舌半上舌出躬者則左右各減九尺下舌長五丈四尺故鄭注鄉射記云九十步之侯用布三十六丈其張三侯之體同道位之近者最下逺者漸髙故大射云大侯之崇見鵠於參參見鵠於干干不及地武以此計之犴侯下畔去地尺寸犴侯之體上下躬及舌揔有四幅凡廣八尺侯中方一丈是犴侯揔髙一丈九尺二寸此犴侯上畔去地一丈九尺二寸以此犴侯上畔則是糝侯之鵠去地之數也其糝侯下舌及躬凡有四尺糝侯之中鵠下有三分之一糝侯中方丈四其三分之一得四尺六寸三分寸之二是糝侯自鵠以下凡有八尺六寸三分寸之二皆為犴侯所掩犴侯上畔去地一丈九尺二寸去其八尺六寸三分寸之二是糝侯下畔去地一丈五寸三分寸之一故鄭注大射云糝侯去地一丈五寸少半寸也云少半寸則三分寸之一也犴侯既去地一丈九尺二寸更加糝侯之中三分之二九尺三寸三分寸之一又加糝侯上躬與個四尺則糝侯上畔去地三丈二尺五寸三分寸之一則是大侯鵠下之數也其大侯下舌及躬并侯中三分之一揔一丈為糝侯所掩於三丈二尺五寸三分寸之一减其一丈則是大侯下畔去地之數故鄭注大射云大侯去地二丈二尺五寸少半寸也其耦射人云王以六耦諸侯以四耦卿大夫士以三耦又射人云諸侯以下謂畿內也若畿外諸侯以下則皆三耦故大射及鄉射并左傳襄二十九年晉士鞅來聘射皆三耦是也其射宫所在天子大射必先習於澤宫而後射於射宫則比射義文也其射宫天子則在廟也故司服之享先公饗射則鷩冕司几筵云大朝覲大饗射依前南鄉是也其服鷩冕天子賔射則在朝故射人云諸侯在朝則皆北面是也其服皮辨服矣天子燕射則在寢以諸侯燕於小寢天子路寢之朝謂之燕朝者故知天子諸侯燕射在寢故鄉射記云君國中射則皮樹中鄭注云謂燕射也其服則玄冕緇衣素裳也諸侯以為朝服燕禮云燕朝服於寢是其諸侯大射不顯畿內畿外之異案儀禮大射云公入驁射畢而云入謂從郊入國也謂射在郊學也故鄉射記云於郊則閭中鄭注云大射於大學儀禮所陳多據畿外諸侯即畿內諸侯或亦然也其服無文故用皮辨以射在學宫學記云皮辨祭菜故也其諸侯賔射若在國則亦在朝與天子同若在國外相㑹則在竟故鄉射記云於竟則虎中鄭注云謂與鄰國君射也其服亦皮辨服也以聘禮君受聘皮辨故也其卿大夫以下射之所在及所服之衣無眀文也此三射之外又有鄉射謂鄉大夫貢賢能之後行鄉射之禮而詢衆庶故鄉大夫職云獻賢能之書于王退而以鄉射之禮五物詢衆庶是也又有州長身州序之禮其侯並同賔射之注故鄭注云鄉侯二正又有主皮之射凡主皮之射有二一是卿大夫從君田獵班餘獲而射書傳云凡祭取餘獲陳於澤然後卿大夫相與射也鄭注鄉射云主皮者無侯張獸皮而射之主於獲也二是庶人亦主皮之射故鄭注周禮云庶人無侯張皮而射之是也又有習武之射故司弓矢云􅓡弓以授射甲革椹質者是也天子至是也正義曰前經巳言數與於祭而君有慶數不與於祭而君有讓此經又重言者前經明諸侯貢士之制故賞罰所貢之君此經論人君將祭擇士賞罰其士之身故於此又重言也又前經貢士云容體合禮其節比樂此經直云射中與不中不云容體及射節者文不具也天子將祭必先習射於澤澤者所以澤士也者澤是宫名於此宫中射而擇士故謂此宫為澤澤所在無文蓋於寬間之處近水澤而為之也非唯祭而擇士餘射亦在其中故書傳論主皮射云嚮之取也於囿中勇力之取也今之取也於澤宫揖讓之取也是主皮之射亦近於澤也選士於澤不射侯也但試武而巳故司弓矢云澤共射椹質之弓矢鄭司農引此射義之文以釋之是知於澤中射椹質而已又鄭注司弓矢云樹椹以為射正射甲與椹試弓習武也其上皮之射則張皮亦揖讓也有讓削以地有慶益以地者謂諸侯也注澤宫至削地正義曰士謂諸侯朝者諸臣及所貢士也者以其助祭故知是此等之人前經論貢士與祭故知此經之士含貢士也云諸侯有慶者先進爵有讓者先削地者此解經進爵絀地之文以經之上文有讓削以地有慶益以地更揔云進爵絀地據有慶者先進爵有讓者先絀地進則爵輕於地故先進爵而後益以地也退則地輕於爵故先削地而後絀爵也故男至謂也正義曰此一經眀男子重射之義以男子生三日射人以桑弧蓬矢者則有為射之志故長大重之桑􅓡蓬矢者取其質也所以用六者射天地四方也所以禮射唯四矢者示事有不用也四矢者象禦四方之亂故必先有志於其所有事者言子初生三日用桑􅓡蓬矢六者欲使此子先有志意於其所有事之處謂於天地四方也然後敢用榖也者三日射罷之後然後敢用榖以食其子也飯食之謂也首至射畢用榖猶若事畢設飯食者故飯食之謂也射者至君子正義曰此一經眀射是仁恩之道唯內求諸己不病害於物既求諸己恥其不勝乃有爭心矣揖讓而升下而飲者下猶降也言將飲射爵之時揖讓而升堂又揖讓而降下而飲此罰爵既以禮升降其事可慙故也其爭也君子者言雖君子因射亦有爭也注必也至爭中正義曰此飲射爵者亦揖讓而升降者此解經揖讓而升下經稱揖讓謂飲射爵時揖讓非射時揖讓也故云飲射爵者亦揖讓而升降亦者亦如射時揖讓飲今亦揖讓故儀禮大射云耦進上射在左並行當階北面揖及階揖升堂揖皆當其物北面揖及物揖射畢北面揖揖如升射是射時升降揖讓也大射又云飲射爵之時勝者皆祖決遂執張弓不勝者皆襲說決拾卻左手右加弛弓于其上遂以執弣揖如始升射及階勝者先升升堂少右不勝者進北面坐取豐上之觶立卒觶坐奠於豐下興揖不勝者先降是飲射爵之時揖讓升降也孔子至養也正義曰前經論射求諸巳乃有爭心故此眀射中之難以中為貴射者何以射者言為射之人何以能使射中與樂節相應也何以聽者言何以能聽此樂節使與射中相合言射中樂節兩相應㑹至極難矣循聲而發發而不失正鵠者其唯賢者乎者此論射中與樂節相㑹為難之事循聲若謂射者依循樂聲而發矢不失正鵠言其中矣如此者其由賢者乃能然是難也若夫不肖之人則彼將安能以中者不肖謂小人也言小人則不能循聲而發又不能持弓矢審固彼既如此則何能以中也詩云發彼有的以祈爾爵者此小雅賔之初筵之篇刺幽王之詩陳古之明王大射之禮發矢之時射彼所祈之的祈求也以求祈中辭爾所罰之酒爵也求中以辭爵者辭養也者酒既養老又以養病今射者非病非老故求射中以辭讓此爵者辭讓見養老也不敢當其養禮也注何以至中也正義曰何以言其難者言此事難作何法以為之者言不可為也故云言其難也云聲謂樂節也者騶虞九節之屬也云畫日正則賔射也捿皮曰鵠則大射也注發猶至養也正義曰云發猶射者解上發彼有的也云的謂所射之識也識猶記識之處即正鵠之中也云辭養讓見養也若己有老病而可受養今己為射不而受爵是無功受養不敢當之故讓矣禮記正義卷第六十九
