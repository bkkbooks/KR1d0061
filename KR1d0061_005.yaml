body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔潁逹等奉敕撰子曰聽訟吾猶人也正義曰此一經廣明誠意之事言聖人不惟自誠己意亦服民使誠意也孔子稱斷獄猶如常人無以異也言吾與常人同也必也使無訟乎者必也使無理之人不敢爭訟也無情者不得盡其辭者情實也言無實情虛誕之人無道理者不得盡竭其虛僞之辭也大畏民志者大能畏脅民人之志言人有虛誕之志者皆畏懼不敢訟言民亦誠實其意也聽訟吾猶人也必也使無訟乎是夫子之辭無情者不得盡其辭大畏民志是記者釋夫子無訟之事然能使無訟則是異於人也而云吾猶人者謂聽之時備兩造吾聽與人無殊故云吾猶人也但用意精誠求其情僞所以使無訟也此謂知本者此從上所謂誠意以下言此大畏民志以上皆是誠意之事意為行本既精誠其意是曉知其本故云此謂知本也所謂修身者此覆說前修身正心之事身有所忿􅓰則不得其正者􅓰謂怒也身若有所怒則不得其正言因怒而違於正也所以然者若遇忿怒則於理則失於正也有所恐懼則不得其正者言因恐懼而違於正也心不在焉視而不見聽而不聞食而不知其味者此言修身之本必在正心若心之不正身亦不修若心之不在視聽與食不覺知也是心為身本修身必在正於心也所謂齊其家在修其身者此經重明前經齊家修身之事人之其所親愛而譬焉者之猶適也此言修身之譬也設我適彼人見彼有德則為我所親愛當反自譬喻於我也以彼有德故為我所親愛則我若自修身有德必然亦能使衆人親愛於我也之其所賤惡而譬焉者又言我往之彼而賤惡彼人者必是彼人無德故也亦當回以譬我我若無德則人亦賤惡我也之其所畏敬而譬焉者又我往之彼而畏敬彼人必是彼人莊嚴故也亦回其譬我我亦當莊敬則人亦必畏敬我之其所哀矜而譬焉者又我往之彼而哀矜彼人必是彼人有慈善柔弱之德故也亦回譬我我有慈善而或柔弱則亦為人所哀矜也之其所敖惰而譬焉者又我往之彼而敖惰彼人必是彼人邪僻故也亦回譬我我若邪僻則人亦敖惰於我也故好而知其惡惡而知其美者天下鮮矣者知識也鮮少也人心多偏若心愛好之而多不知其惡若嫌惡之而多不知其美今雖愛好知彼有惡事雖增惡知彼有美善天下之內如此者少矣故諺有之曰人莫知其子之惡莫知其苗之碩者碩猶大也言人之愛子其意至甚子雖有惡不自覺知猶好而不知其惡也農夫種田恆欲其盛苗雖碩大猶嫌其惡以貪心過甚故不知其苗之碩若能以已子而方他子已苗而匹他苗則好惡可知皆以已而待他物也此謂身不修不可以齊其家者此不知子惡不知苗碩之人不修其身身既不修不能以已譬人故不可以齊整其家注之適至大也正義曰之適也釋詁文云反以喻已者謂見他人所親愛被賤惡以人類巳他人之事反來自譬已身也云則修身與否可自知也者謂彼人不修則被賤惡敖惰已若不以修身事亦然也若彼修身則被親愛敬畏已若修身亦當然也故云修身與否可自知也云碩大也釋詁文所謂至其家此一節覆明前經治國齊家之事康誥曰如保赤子者此成王令康叔之辭子謂心所愛之子言治民之時如保愛赤子愛之甚也心誠求之雖不中不逺矣者言愛此赤子內心精誠求赤子之嗜欲雖不能正中其所欲去其所嗜欲其不甚逺言近其赤子之嗜欲為治人之道亦當如此也未有學養子而后嫁者也言母之養子自然而愛中當赤子之嗜欲非由學習而來故云未有學養子而后嫁者此皆本心而為之言皆喻人君也一家仁一國興仁一家讓一國興讓者言人君行善於家則外人化之故一家一國皆仁讓也一人貪戾一國作亂者謂人君一人貪戾惡事則一國學之作亂其機如此者機謂關機也動於近成於逺善惡之事亦發於身而及於一國也此謂一言僨事一人定國者僨猶覆敗也謂人君一言覆敗其事謂惡言也一人定國謂由人君一人能定其國謂善政也古有此言今記者引所為之事以結之上云一人貪戾一國作亂是一言僨事也又云一家仁讓則一國仁讓是知一人定國也一家則一人也皆謂人君是一人之身先治一家乃後治一國其所令反其所好而民不從者令謂君所號令之事若各隨其行之所好則人從之其所好者是惡所令者是善則所令之事長其所好雖欲以令禁人人不從也是故君子有諸已而后求諸人者諸於也謂君子有善行於己而后可以求於人使行善行也謂於已有仁讓而后可求於人之仁讓也無諸已而后非諸人者謂無惡行於已而后可以非責於人為惡行也謂無貪利之事於已而後非責於人也所藏乎身不恕而能喻諸人者未之有也者謂所藏積於身既不恕實而能曉喻於人使從已者未之有也言無善行於身欲曉喻於人為善行不可得也詩云桃之夭夭其葉蓁蓁者此周南桃天之篇論昏姻及時之事言桃之夭夭少壯其葉蓁蓁茂盛喻婦人形體少壯顔色茂盛之時似桃之夭天也之子千歸冝其家人者之子者是子也歸嫁也冝可以為夫家之人引之者取冝其家人之事冝其家人而后可以教國人者言人既家得冝則可以教國人也詩云冝兄冝弟者此小雅蓼蕭之篇美成王之詩詩之本文言成王有德冝為人兄冝為人弟此記之意冝兄冥弔謂自與兄弟相善相冝也既為兄弟相冝而可兄弟之意而後可以教國人也詩云其儀不忒正是四國者此曹風鳲鳩之篇忒差也正長也言在位之君子威儀不有差忒可以長者是四國言可法則也其為父子兄弟足法而后民法也者此謂治在齊家謂其修德於家在室家之內使父子兄弟足可方法而後民皆法之也是先齊其家而後能治其國也注一家至於齊正義曰一家一人謂人君也者以經言治家故知是人君也若文王刑于寡妻至于兄弟以御于家邦是也云春秋傳日登戾之者此隱五年公羊傳文案彼傳文公觀魚于棠何以書譏何譏爾逺也公曷為逺而觀魚登來之也彼注意謂以思得而來之齊人語謂登來為得來也聲有緩急得為登謂隱公觀魚於棠得此百金之魚而來觀之公羊傳為登來鄭所引公羊本為登戾之以來為戾與公羊本不同也鄭意以戾為貪戾故引以證經之貪戾也云又曰鄭伯之車僨於濟者隱三年左傳文所謂平天下在治其國者正義曰自此以下至終篇覆明上經平天下在治其國之事但欲平天下先須治國治國事多天下理廣非一義可了故廣而明之言欲平天下先須修身然後及物自近至逺自內至外故初明潔矩之道次明散財於人之事次明用善人逺惡人此皆治國治天下之綱故揔而詳說也今各隨文解之上恤孤而民不倍者孤弱之子人所遺棄在上君長若能憂恤孤弱不遺則下民學之不相棄倍也是以君子有潔矩之道也者潔猶結也矩法也言君子有執結持矩法之道動而無失以此加物物皆從之也所惡於上母以使下者此以下皆是潔矩之道也譬諸侯有天子為上上有不善之事加已己惡之則不可回持此惡事使已下者為之也所惡於下母以事上者言臣下不善事己已所有惡則已不可持此惡事回以事己之君上也所惡於前母以先後者前謂在己之前不以善事施己巳所僧惡則無以持此惡事施於後人也所惡於後母以從前者後謂在已之後不以善事施已已則無以惡事施於前行之人也所惡於右母以交於左者謂與己平敵或在已右或在已左以惡加己己所憎惡則無以此惡事施於左人也舉此一隅餘可知也此之謂潔矩之道者上經云君子有潔矩之道也其潔矩之義未明故此經中說能持其所有以待於人恕已接物即潔矩之道也詩云樂只君子民之父母此記者引之又申眀潔矩之道若能以已化從民聽欲則可謂民之父母此小雅南山有臺之篇美成王之詩也只辭能以已民從民所欲則為民父母矣民之所好好之者謂善是民之願好己亦好之以施於民若發倉廩賜貧窮賑乏絶是也民之所惡惡之者謂苛政重賦是人之所惡已亦惡之而不行也詩云節彼南山者上經說恕已待民此經明己須戒愼也詩云節彼南山維石巖巖此小雅節南山之篇刺幽王之詩言幽王所任大臣非其賢人也節然髙峻者是彼南山維積纍其石巖巖然高大喻幽王大臣師尹之尊嚴赫赫師尹民具爾瞻者赫赫顯盛貌是大師與人為則者具俱也爾汝也在下之民俱於汝而瞻視之言皆視師尹而為法此記之意以喻人君在上民皆則之不可不愼有國者不可以不愼者有國謂天子諸侯言民皆視上所行而則之不可不愼其德乎冝愼之也辟則為天下僇矣者僇謂刑僇也君若邪辟則為天下之民共所誅討若桀紂是也詩云殷之未喪師克配上帝此一經明治國之道在貴德賤財此大雅文王之篇美文王之詩因以戒成王也克能也師衆也言殷自紂父帝乙之前未喪師衆之時所行政教皆能配上天而行也儀監于殷峻命不易者儀冝也監視也今成王冝監視于殷之存亡峻大也奉此天之大命誠為不易言其難也道得衆則得國失衆則失國者道猶言也詩所云者言帝乙以上得衆則得國言殷紂失衆則失國也有德此有人者有德之人人之所附從故有德此有人也有人此有土者有人則境土寬大故有土也有土此有財言有土則生植萬物故有財也有財此有用者為國用有財豐以此而有供國用也德者本也財者末也者德能致財財由德有故德為本財為末也外本內末爭民施大集者外疏也內親也施奪謂施其劫奪之情也君若親財而疏德則爭利之人皆施劫奪之情也是故財聚則民散財散則民聚者事不兩興財由民立君若重財而輕民則民散也若散財而賙恤於民則民咸歸聚也是故言悖而出者亦悖而入者悖逆也若人君政教之言悖逆人心而出行者則民悖逆君上而入以報答也謂拒違君命也貨悖而入者亦悖而出者若人君厚斂財貨悖逆民心而入積聚者不能久如財人畔於上財亦悖逆君心而散出也言衆畔親離財散君有也注師衆至厚仁正義曰師衆也峻大也皆釋雅峻字馬旁為之與此同也能也釋言文也云君有逆命則也者君有逆命解經言悖而出也民有逆辭解經亦悖而入謂人有逆君之辭以拒君也云老子曰多藏必厚亡者言積聚藏之既多必厚重而散亡也引之者證貨悖而入亦悖而出康誥曰倠命不于常者謂天之命不於是常住在一家也道善則得之不善則失之矣書之本意言道為善則得之不善則失之是不常在一家也舅犯曰亡人無以為寶仁親以為寶者此舅犯勸重耳之辭於時重耳逃亡在翟奏穆公欲納之反國而勸重耳不受秦命對秦使云奔亡之人無以貨財為寶唯親愛仁道以為寶也注楚書至奚恤正義曰鄭知是楚昭王時書者案楚語云楚昭王使王孫圉聘於晉定公饗之趙簡子鳴玉以相問於王孫圉曰楚之白珩猶在乎其為寶幾何矣王孫圉對曰未嘗為寶楚之所寶者曰觀射父能作訓辭以行事於諸侯使無以寡君為口實又新序云秦欲伐楚使者觀楚之寶器楚王命昭奚恤而問焉對曰寶器在賢臣王遂使昭奚恤應之昭奚恤發精兵三百人陳於西門之內為東靣之壇一南靣之壇四西靣之壇一秦使者至昭奚恤曰君客也請就上位東面之壇令尹子西南面大宗子牧次之葉公子髙次之司馬子發次之昭奚恤自居西面之壇稱曰客欲觀楚之寶器言楚之所寶者即賢臣也唯大國之所觀秦使無以對也使歸告秦王曰楚多賢臣無可以圖之何知有觀射父昭奚恤者案戰國義云楚王築壇昭奚恤等立於壇上楚王指之謂秦使曰此寡人之寶故知有昭奚恤等也謂賢為寶者案史記云理百姓實府庫使黎氓得所者有令尹子西而能也執法令奉圭璋使諸侯不怨兵車不起者有大宗子牧能也守封疆固城郭使鄰國不侵亦不侵鄰國者有葉公子髙能也整師旅治兵戈使蹈白刃赴湯蹈火萬死不顧一生者有司馬子發能也坐籌帷幄之中決勝千里之外懷霸王之業撥理亂之風有大夫昭奚恤能也是皆為寶也引之者證為君長能保愛善人為寶也注舅犯至利也正義曰舅犯晉文公之舅狐偃者左傳文也云時避驪姬之讒亡在翟而獻公薨秦穆公使子顯弔之因勸之復國舅犯為之對此辭也檀弓篇文秦誓曰者此經明君臣進賢詘惡之事秦誓尚書篇名秦穆公戈鄭還歸誓羣此篇秦穆公賢去惡也若有一介目斷斷兮者此秦穆公誓辭云羣有一耿介之臣斷斷然誠實專一謹慤兮是語辭古文尚書兮為猗言有一介之臣其心斷斷猗猗然專一與此本異無他技其心休焉其如有容焉者言此專一之臣無他竒異之技惟其心休休然寬容形貌似有包容如此之人我當任用也人之有技若已有之者云見人有技藝欲得親愛之如已自有也人之彥聖其心好之不啻若自其口出者謂見人有才彥美通聖其心中愛好不啻如自其口出心愛此彥聖之美多於口說言其愛樂之甚也實能容之以能保我子孫黎民尚亦有利哉者實是也若能好賢如此是能有所包容則我國家得安保我後丗子孫黎衆也尚庶幾也非直子孫安其下衆人皆庶幾亦望有利益哉也人之有技媢疾以惡之者上明進賢之善此論蔽賢之惡也媢妬也見人有技藝則掩藏媢妬疾以憎惡之也人之彥聖而違之俾不通者見他人之彥聖而違戾抑退之俾使也使其善功不通逹於君尚書通為逹字也實不能容以不能謂君子君子所惡者凶惡事今乃愛凶惡是好人之惡人之所好者君子所好仁義善道今乃惡此仁義善道是惡人之所好也是謂拂人之性者若如此者是謂拂戾善人之性菑必逮夫身者逮及也如此菑必及夫身矣是故君子有大道者大道謂所由行孝悌仁義之大道也必忠信以得之驕泰以失之者言此孝悌仁義必由行忠信以得之由身驕泰以失之也生財有大道者此一經明人君當先行仁義愛省國用以豐足財物上文大道謂孝悌仁義之道此言人君生殖其財有大道之理則下之所云者是也生之者衆者謂為農桑多也食之者寡者謂減省無用之費也為之者疾者謂百姓急營農桑事業也用之者舒者謂君上緩於營造費用也則財恆足矣者言人君能如此則國用恆足仁者以財發身者謂仁德之者以財散施發起身之令名也不仁者以身發財者言不仁之人唯在吝嗇務於積聚勞役其身發起其財此在治家治國天下之科皆謂人君也未有上好仁而下不好義者也言在上人君好以仁道接下其下感君仁恩無有不愛好於義使事皆得其冝也末有好義其事不終者也言臣下悉皆好義百事盡能終成故云未有好義其事不終也言皆能終成也未有府庫財非其財者也又為人君作譬也君若行仁民必報義義必終事譬如人君有府庫之財必還為所用也故云未有府庫財非其財者也注其為至有也正義曰言君行仁道則臣必為義臣既行義事必終成以至誠相感必有實報如巳有府庫之財為巳所有也其為誠實而然言不虛也孟獻子曰畜馬乘不察於雞豚者此一經明治國家不可務於積財若務於積財即是小人之行非君上之道言察於雞豚之所利為畜養馬乘士初試為大夫不窺察於雞豚之小利伐水之家不畜牛羊者謂卿大夫喪祭用冰從固隂之處伐擊其冰以供喪祭故云伐冰也謂卿大夫為伐冰之家不畜牛羊為財利以食祿不與人爭利也百乘之家不畜聚斂之臣者百乘謂卿大夫有采池者也以地方百里故云百乘之家言卿大夫之家不畜聚斂之臣使賦稅什一之外徴求采邑之物也故論語云百乘之家是與其有聚斂之臣寧有盜者覆辭不畜發斂之臣音若其有身僉之臣寧可有盜竊之臣以盜臣此謂國不以利為利以義為利也者言若能如上所是國家之伹以義事為國家利也長國家而務財用者必自小人矣者言為人君長於國家而務積聚財以為己用者必自為小人之行也注孟獻至可也正義曰孟獻子魯大夫仲孫蔑者此據左傳文也云畜馬乘謂以士初試為大夫者案書傳士飾車駢馬詩云四牡騑騑大夫以上乃得乘四馬今下云伐冰之家百乘之家家是卿大夫今別云畜馬乘者不察雞豚故知士初試為大夫也云伐冰之家卿大夫者案招四年左傳云大夫命婦喪浴用冰喪大記注云士不用冰故知卿大夫也士若恩賜及食而得用亦有冰也但非其常故士喪禮賜冰則夷槃可也左傳又云食肉之祿冰皆與焉是也云百乘之家有采地者也此謂卿也故論語云百乘之家鄭云采地一同之廣輪是也彼為至利也前經明逺財重義是不以利為利以義為利此經明為君治國棄逺小人亦是不以利為利以義為利也彼為善之彼謂君也君欲為仁義之道善其政教之語辭故云彼為善之小人之使為國家菑害並至者言君欲為善反令小人使為治國家之事毒害於下故菑害患難則並皆來至雖有善者亦無如之何矣者既使小人治國其君雖有善政亦無能奈此患難之何言不能止之以其惡之巳著故也禮記正義卷第六十七
