body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔頴逹等奉勑撰三年問第三十八正義曰案鄭目録云名曰三年問者善其問以知喪服年月所由此於别録屬喪服三年至也哉正義曰此一節問喪三年所由解釋所以三年之意三年之喪何也者記者欲釋三年之義故假設其問云三年喪者意有何義理謂稱人之情而立禮之節文因以飾羣者飾謂章表也羣謂五服之親也因此三年之喪差降各表其親黨别親疏貴賤之節而弗可損益也者親謂大功以上疏謂小功以下貴謂天子諸侯絶期卿大夫降期以下賤謂士庶人服族其節分明使不可損益也故曰無易之道也者引舊語成文也無不也並有差品其道不可改易創巨者其曰久者以釋重喪所以三年也其事既大故為譬也巨大也夫創小則易差創大則難愈故云創巨其日久也痛甚者其愈遲者俞差也賢者喪親傷腎乾肝斬斫之痛其痛既甚故其差亦遲也三年者稱情而立文所以為至痛極也者既痛甚差遲故稱其痛而立三年之文以表是至痛極者也哀痛未盡思慕未忘者言賢人君子於此二十五月之時悲哀摧痛猶未能盡憂思悲慕猶未能忘故心之哀慕於時未盡而外貌喪服以是斷割者豈不送死有巳復生有節也哉者若不斷以二十五月則孝子送死之情何時得巳復吉常之禮何有限節故聖人裁斷止限二十五月豈不是送死須有巳止反復生禮須有限節也哉凡主至不窮正義曰此一經明天地之間血氣之類皆有所知至於鳥獸大小各能思其種類況在於人何有窮巳也將由至亂乎正義曰此一經明小人之人曽鳥獸之不若若不以禮節之安能羣居而不亂將由至窮也正義曰此一經明賢人君子於三年之喪若駟之過隙若不以禮制節之則哀痛何時窮巳駟之過隙者駟謂駟馬隙謂空隙駟馬峻疾空隙狹小以峻疾而過狹小言急速之甚故先至之矣正義曰此一經明小人君子其意不同故先王為之立中人之制節故先王焉者焉是語辭立中制節者言先王是三年者取象於一閏天地一期物終是一期者取象於一周九月者以象陽之數又象三時而物成也五月以象於五行三月者取象天地一時而氣變言五服之節皆取法於天地中取則於人者則法也天地之中取則於人若子生三年然後免於父母之懷故服三年人之一歲情意變改故服一期九月五月三月之屬亦逐人情而減殺是中則於人所以羣居和一之理盡矣者既法天地與人三才並備故能調和羣衆聚居和諧專一義理盡備矣故三至喪也正義曰此一節重明三年之義三年之喪人道之至文者也言三年喪禮於人道之中至極文理之盛者則期以下非其至極也夫是之謂至隆者言三年之喪人恩之至極隆厚也未有知其所由來者也言三年之喪行之自逺未有能識知所從來也言不知從何代而來引孔子曰者論語之文證此三年之喪也注不知至久矣正義曰案易繫辭云古之葬者厚衣之以薪葬之中野不刲不樹喪期無數尚書云百姓如喪考妣三載此云不知所由者但上古云喪期無數謂無葬練祥之數其喪父母之哀猶三年制度同玉藻云長中繼掩尺若深衣則緣而巳下云緣廣寸半凡深衣皆用諸侯大夫士夕時所著之服故玉藻云朝玄端夕深衣庶人吉服亦深衣皆著之在表也其中衣在朝服祭服喪服之下知喪服亦有中衣者檀弓云練衣黃裏注云練中衣以黃為內是也伹喪服中衣不得繼掩尺也故喪服云帶緣各視其冠注云緣如深衣之緣是喪服中衣用深衣則深衣緣之以采故下云具父母大父母衣純以繢以青之屬也唯孤子深衣純以素但以緣而巳不與長衣同其吉服中衣亦以采緣其諸侯得綃黼為領丹朱為緣郊特牲云綃黼丹朱中衣大夫之僭禮則知大夫士不用綃黼丹朱但用采純而巳矣無文以明之其長衣以素緣知者若以采緣則與吉服中衣同故知以素緣也若以布緣則日麻衣知用布緣者以其稱麻衣故知也其喪服之中衣其純用布視冠布之粗細至葬可以用素緣也練則用縓也其詩之麻衣則與此別彼謂吉服之衣也所以此稱深衣者以餘服則上衣下裳不相連此深衣衣裳相連𬒳體深邃故謂之深衣古者至篇末義曰此一篇從𥘉至末皆論深衣之曲裾也其深衣之衽已於玉藻釋之故今不復言也要縫半下要縫謂要中之縫尺寸闊狹半下畔之闊下畔一丈四尺四寸則要縫半之七尺二寸注三分至寬也正義曰此據裳之一幅分為二幅凡布廣二尺二寸四寸為縫一尺八寸在三分之一分為六寸減此六寸以益於下是下二幅有二尺四寸上二幅有一尺二寸故云三分要中減一以益下下容舉足而行故冝寬也裕之髙下可以運肘袼謂當臂之處袂中髙下冝稍寬大可以運動其肘袂二尺二寸肘尺二寸是容運肘也𬒮之長短反詘之及肘者袂長二尺二寸并緣寸半為二尺三寸半除去其縫之所殺各一寸餘有二尺一寸半在從肩至手二尺四寸今二尺一寸半之𬒮得反詘及肘者以袂屬於衣幅闊二尺二寸身脊至肩但尺一寸也從肩覆臂又尺一寸是衣幅之畔覆臂將盡今又屬𬒮於衣又二尺一寸半故反詘其袂得及於肘也當無骨者帶若當骨則緩急難中故當無骨之處此深衣帶下於朝祭服之帶也朝祭之帶則近上故玉藻云三分帶居二焉是自帶以下四尺五寸也云深衣者用十五升布煆濯灰治者案雜記云朝服十五升此深衣與朝服相類故用十五升布煆濯謂打洗煆濯用灰治理使和熟也然則喪服麻衣雖似深衣之制不必煆濯灰治以其雜凶故也云自士以上深衣為之次者案玉藻諸侯夕深衣祭牢肉又大夫士朝玄端夕深衣是深衣為朝祭之次服也云庶人吉服深衣者深衣是諸侯之下自深衣以後更無餘服故知是庶人之吉服喪服有衰裳包貴賤上下無差亦明庶人吉服乃深衣也具父母大父母衣純以繢者所尊俱在故衣純以繢言具父母則父母俱在也大父母則亦然也若其不具一在一亡不必純以繢也具父母衣純以青者唯有父母而無祖父母者以為吉不具故飾少而深衣領緣用青純降於繢也若父母無唯祖父母在亦當純以青純袂緣純邊廣各寸半者純袂者純緣也謂純其袂緣則袂口也又云緣讀為緆謂深衣之下純也純邊者謂深衣之旁側也廣各寸半者言純袂口及裳下之緆并純旁邊其廣各寸半言表裏合為三寸注純謂至寸矣正義曰純謂者解經中二箇純字一是純袂二謂曲而不直也哨謂哨峻不正是主人謙遜之辭某既賜矣又重以樂敢辭者賔稱主人設酒肴以待已是某既受主人之賜矣主人又請投壷樂已是重以樂也注士則至北面正義曰士則鹿中案鄉射記云大夫兕中士鹿中此篇投壷是大夫士之禮故云士則鹿中不云兕中者略之也知此投壷是大夫士禮者以經云主人請賔是平敵之辭與鄉飲酒鄉射同故知是大夫士也若諸侯則燕禮大射每事云請於公不得云主人請賔也此既非諸侯之禮而經云奏貍首者别取燕飲之義非謂尊卑之詩其諸侯相燕亦有投壷故左傳云晉侯與齊侯燕投壷然則天子亦有之但古禮亡無以知也其中之形刻木為之狀如兕鹿而伏背上立圎圈以盛算云奉之西階上北面者案鄉射禮將射之時司射升自西階階上北面告於賔故知此司射奉中在西階上北面其執壷之人賤於司射故在司射之西以凡行禮統於主人雖俱在西階而當尊東故燕禮大射宰夫代公為主人與賔倛升西階而主人在東也注燕飲至射也正義曰知既脫坐主人乃請投壷也者案燕禮取以出卿大夫皆降賔反入大夫皆說屨升就席羞庶羞之後乃若射則大射正為司射則知此亦在脫屨升坐之後若鄉射之禮則在飲酒未旅之前為射以其詢衆庶禮重故早射異於燕射也賔再至日辟正義曰此一經論賔與主人受矢送矢之節賔再拜受者賔既許主人投壷賔乃於西階上北面再拜遙受矢也主人般還日辟者主人見賔之拜乃般曲折還謂賔曰今辟而不敢受言此者欲止賔之拜也於是賔及主人各來兩楹之間相就俱南面主人在東授矢與賔主人阼階上拜送者主人既授矢之後歸還阼階上北面拜送矢也賔般還曰辟者賔受矢之後歸於西階上見主人之拜賔乃般還而告主人曰今辟而不敢受之言此者亦止主人拜知皆北面者案鄉飲酒鄉射拜受爵送爵皆北面故知亦當北面熊氏云以拜時還辟或可東西面相拜又以日辟者是贊者來辭告主人及賔言曰辟義亦通也巳拜至就筵正義曰此一經明賔主受矢之後就投壷之筵巳拜受矢者謂主人拜送矢之後主人贊者持矢授主人主人於阼階上受矢也進即兩楹閒退反位者主人受矢之後乃獨來就兩楹間者言將有事於此也看投壷處所乃却退反阼階之位揖賔就筵者主人於阼階之上西面揖賔令就投壷之筵於是賔主各來就筵注退乃至射物正義曰云退乃揖賔者解經退反位揖賔也所以揖之者欲與賔俱即席相對為偶而共投壷云賔席主人席皆南鄉間相去如射物者以壷在於南故知投壷南鄉也投壷是射之類故知席相去如射物也物謂射者所立之處物長三尺闊一尺二寸兩物東西相去容一弓故鄉射記云物長如笴其間容弓距隨長武注云笴長三尺距隨者物橫畫也司射至算興正義曰前經賔主既就筵此經明進度壷并算之節司射進度壷者司射於西階之上於執壷之人處受壷乃東嚮來賔主筵前進所量度其壷置於賔主筵南間以二矢半者投壷有三處室中堂上及庭中也日中則於室日晚則於堂大晚則於庭是各隨光明故也矢有長短亦隨地廣狹室中狹矢長五堂上稍廣矢長七扶庭中大廣矢長扶指日扶扶廣四寸則二尺也七扶者則二尺八寸畢而為勝者立馬者則又取算以為馬表於勝數也必謂算為馬者馬是威武之用為將帥所乘今投壷及射亦是習武而勝者自表堪為將帥故云馬也一馬從二馬者每一勝輒立一馬禮以三馬為成若專三馬則為一成但勝偶未必專頻得三若勝偶得二劣偶得一一既劣於二故徹取劣偶之一以足勝偶之二為三故云一馬從二馬然定本無此一句三馬既立請慶多馬者若頻得三成或取彼足為三馬是其勝巳成又酌酒慶賀於多馬之偶也請主人亦如之者司射請賔之黨為每事並應日諾竟而司射又請主人事事亦如賔而主人皆亦曰諾如賔也案鄉射司射請賔於西階上請主人於阼階上則此請賔請主人皆亦就賔主之前也注正爵至為樂正義曰此經正爵謂罰爵故下别云三馬既備請慶多馬今鄭注或以罰或以慶則慶馬勝算亦為正爵者鄭通而解之罰慶俱是正爵故下又云正爵既行請徹馬被謂慶爵亦稱正爵也案鄉射禮三耦先射賔主乃射以射禮重也此投壷不立三耦以投壷禮輕故命諾正義曰此於左者左謂司射之前稍北也注巳投者退各反其位正義曰約鄉射禮射畢則各反其位則知投壷者畢亦各反其位辟後來也反位謂主黨於東賔黨於西卒投至右鈞正義曰此一經明投壷算數之儀卒投者謂投壷卒也司射執算日左右卒投請數者司射於壷西東面執算請曰賔主之黨卒竟投請數算二算為純一純以取者純全也二算合為一全地上取算之時一純則别而取之一算為竒者一算謂不滿純者竒隻也故云一算為竒遂以竒算告者竒餘也謂左右數鈞等之餘算手執而告曰某賢於某若干純者或左或右不定故稱某賢賢謂勝者也勝者若有雙數則云若干純假令十算則云五純也竒則曰竒者若有竒數則曰竒假令九算則曰九竒也鈞則曰左右鈞者鈞猶等也等則左右各執一算以告注卒巳至以告正義曰云如數射算者以投壷射之類故知此數投壷之算如數射算云一純以取至其他如右獲此皆鄉射之禮文也一純以取實於左手謂就地上之算以右手每一純實於左手云十純而委之弟子洗觶升酌南面坐奠于豐上是也注周禮至射爵正義曰此周禮典瑞文引之者證灌為飲也云賜灌敬養各與其偶於西階上如飲射爵者以投壷射類故約鄉射而知也正爵至曰諾正義曰此一經論飲不勝者畢司射請為勝者立馬以表顯賢能之事正爵既行者謂正禮罰酒之爵既行飲畢之後司射乃請賔主請為勝者樹標立其馬也馬各直其算者直當也謂所立之馬各當其初釋算之前所釋之算東中之西也一馬從二馬者投壷與射禮同亦三畨而止每畨勝者則立一馬假令賔黨三畨俱勝則立三馬或賔黨兩勝而立二馬主黨一勝但立一馬即以主黨從就賔黨二馬以少足益於多以助勝者為榮以慶者一馬從二馬之後乃以慶賀多馬故云以慶但此經上云請立馬者是司射請辭馬各直其算一馬從二馬以慶是禮家陳事之言也慶禮曰三馬既備請慶多馬者此還是司射請辭言為慶之禮勝者三馬既巳備具請酌酒慶賀於多馬者賔主皆曰諾者無問勝不勝皆稱曰諾注飲無豐正義曰云投壷如射亦四算也籌室中五扶堂上七庭中九扶者籌矢也室中最狹故五扶堂上差寬故七扶庭中彌寬故九扶注投壷者人四矢正義曰案鄉射及大射人皆乘矢故知四矢也注籌矢至常處正義曰云春秋傳曰膚寸而合者此僖三十一年公羊傳文彼云觸石而出膚寸而合不崇朝而遍雨乎天下唯泰山爾引之者證彼膚與此扶同也注修長至餘也正義曰腹容斗五升三分益一則為二斗者既稱腹容斗五升又云三分益一者以斗五升其數難計故加三分益一為二斗從整數計之云得圜囷之象積三百二十四寸也者以算法方一寸髙十六寸二分為一升則一斗之積方一寸髙一百六十二寸也二斗之積為三百二十四寸也於此壷之圜囷之中凡有三百二十四寸也云以腹修五寸約之所得者腹之上下髙五寸共有三百二十四寸今且以壷底一寸約之即於三百二十四寸之中五分之一得六十四寸八分也是修五寸約之所得之數也云求其圜周圜周二尺七寸有竒者壷底一重既有六八分以圜方十四寸八分分三分則有二十一寸六分并前分得八十六寸底一重方積之數也今將八十六寸開方積之九九八十一則為九寸強也一面有九寸強四面凡有三十六寸強今以方求圜四分去一有二十七寸強是壷圜周二尺七寸有強故云圜周二尺七寸有竒也鄭之此計據二斗之數必知然者壷徑九寸以圜求方以方九寸計之凡九九八十一壷底一重有八十一寸五重則有五箇八十一寸揔為四百五寸今以方求圜四分去一去其一百一寸四分寸之一餘三百三寸四分寸之三於二斗之積三百二十四寸之內但容三百三寸四分寸之三餘有二十寸四分寸之一不盡故云圜周二十七寸有竒乃得盡也若以斗五升計之計一斗五升之㺓有二百四十三寸則壷之所徑唯八寸餘也得容此數必知然者凡方八寸開方計之八八六十四得六十四寸壷髙五重則五箇六十四寸揔為三百二十寸以方求圜四分去一去八十寸餘有二百四十寸於一斗五升之積餘有三寸不盡是壷徑八寸有餘乃得盡也今檢鄭之文注之意以二斗整數計之不取經文斗五升之義故云圜周二尺七寸有竒今算者以其二尺七寸之圍必受升五升之物數不相㑹也云壷體腹之上下各漸減殺苟欲望合恐非鄭意魯令至者浮正義曰此一篇是周公正經而有魯薛之事者録記之人以周衰之後魯之與薛有當時投壷號令弟子之異未知孰是故因以記之也母幠母敖者幠亦敖也號令弟子云母得憮而敖慢也母偝立母踰言偝立踰言有常爵者母偝立謂不正面前母得踰言謂逺相談話若偝立踰言有常刑之罰爵也若是者浮浮亦罰也薛令弟子辭曰若如是偝立踰言者則有浮罰之爵薛令弟子異於魯者其魯令弟子則稱偝立踰言有常爵薛令弟子則揔稱若是者浮浮亦罰也其言辭詳略雖異其意則同注晏子至丘據正義曰引晏子春秋者證浮是罰爵之義故小爾雅云浮罰也魯鼓薛鼓注云此魯薛擊鼓之節也圜者擊鼙方者擊鼓正義曰以鼓節有圜點有方點故以為圜者擊鼙方者擊鼓若頻有圜點則頻擊鼙聲每一圜點則一擊鼙聲若頻有方擊鼓聲也記者因擊鼓之異圖而記代久以知其得注射謂正義曰此投壷相對半鼓節為投壷用全鼓節為射禮又投壷在室在是燕樂之事知此射亦謂燕射非大射及鄉射也注庭長至投壷正義曰經云司射庭長案鄉飲酒將旅之時使相為司正在庭中立于觶南北面察飲酒不如儀者故知庭長司正也冠士者謂外人來觀投壷成人加冠之士尊之故令屬賔黨若童子賤則屬主黨也云樂人國子能為樂者以國子習樂故云國子能為樂者欲明此樂人非瞽矇視瞭之徒以其能與主人之黨而觀禮故知非作樂瞽人也案國子是王子公卿大夫元士之子今來觀樂士大夫投壷者以國之俊選皆在學習樂共士子來觀投壷非謂一皆是王子及公卿大夫之子也云此皆與於投壷者鄭恐伹來觀其禮不觀投壷經既云屬賔黨主黨則是入賔主之朋故云與於投壷也禮記正義卷第六十五
