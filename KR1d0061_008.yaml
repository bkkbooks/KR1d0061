body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔穎逹等奉勑撰燕義第四十七正義曰案鄭目録云名曰燕義者以其記君臣燕飲之禮上下相尊之義此於別録屬吉事案儀禮目録云諸侯無事若卿大夫有勤勞之功與羣臣燕飲以樂之勤勞謂征伐聘問詩曰吉甫燕喜是也臣有王事之勞亦燕之故燕禮記云若有王事是也古者至退之正義曰此一節眀諸侯與庶子燕飮之禮從篇首至未皆明燕飲之義但燕飲之禮有庶子官故方說燕禮之初先陳庶子之事各隨文解之周天子之官有庶子官者此眀庶子之義也謂作記之人在於周末追述周初之事故云古者言周之天子其下立官有庶子之官天子謂之諸子諸侯謂之庶子其所職掌諸子庶子同也故此記雖眀諸侯庶子職掌其所載之事皆諸子職文也庶子官職諸侯卿大夫士之庶子之卒者言此官職主諸侯及卿大夫士衆庶之子副倅於父之事所以官名庶子掌其戒令者此等衆子須有戒法政而庶子官掌之與其教治者與猶及也教謂教學治謂治身言非但掌戒令而巳及其教治亦皆掌之別其等者謂分別其貴賤之等正其位者正其朝廷所立之位也此記云諸侯卿大夫士之庶子之卒周禮諸子職則云掌國子之倅唯此為別但諸子職揔謂之國子此云諸侯卿大夫士之庶子者是其適子也謂之庶者庶衆也以其適子衆多故揔謂之庶子非適子庶弟而稱庶子也必知適子者以其云倅是副二於父之言故鄭注諸子職云國子者是公卿大夫士之副二又引王制云王大子王子羣后之大子卿大夫元士之適子是也注職主至位也正義曰云周禮諸子之官司馬之屬也者案周禮諸子下大夫屬司馬云卒讀皆為倅者以經云庶子之卒下文云國子存游卒以卒半非一故云卒皆為倅若旁置人者是副倅之倅若不置人者則百人為卒之卒故讀卒從倅也云諸子副代父者也此諸適子皆副代於父與父為倅故稱倅也云戒令致於大子之事者則下文云國有大事則率國子而致於大子其事非一故云戒令致於大子之事云位朝位也者此等諸子雖未為官皆繼父尊卑以為等級故有別其等正其位也唯所用之者若國有大事之時而進致諸子於大子唯任大子隨時所用也合其卒伍置其有司者言若國有甲兵之事則庶子之官付授以車甲合㑹之以卒伍置立之以有司謂立其主將使統領之用軍旅之法治理之司馬弗正者弗不也正後也以此等諸子既統屬大子隨大子徴發王家之事司馬不得征後之也凡國之政事國子存游卒者前經云國有大事謂祭祀或宿衛又云甲兵之事此經別云國之政事則非大事與甲兵也是國之尋常小小之政事謂力役土功胥徒之屬不與于國子唯民庶所為國子存游卒未仕者之中不干其事也使之修德學道者既不與國子之尋常政事伹使之修行其德學習道藝也春合諸學者謂仲春之時合此諸子在於大學秋合諸射者謂仲秋之時合其諸子在於射宫使之修德學道或容習射也以考其藝而進退之者是庶子之官考校其藝之髙下而進退其能否能者進之否者退之注游卒至為說正義曰游卒未仕者也案師氏職云凡國之貴游子焉鄭注云貴游子弟王公之子弟游官則此游卒是副倅故云未仕者云學大學也者以大胥云春釋采合舞文王丗子云春夏學干戈秋冬學羽籥皆於東序初教在東序至合時則在周之大學故云學大學也云射射宫也擇士習射之官也又周禮大胥云秋頒學合聲其合聲之時則亦在大學文子丗子云凡大合樂必遂養老鄭云春合舞秋合聲是養老在東序也故知大合樂在東序云燕禮有庶子官是以義載此以為說者案燕禮云主人升自西階獻庶子子阼階上又云庶子執燭是燕禮有庶子官也以庶子於燕有事是以燕義於此說庶子職掌故云載此以為說也諸侯至義也正義曰此經說燕禮之初君獨升立於阼階之上明君尊莫敢敵之義也皆引燕禮正經記者以義說之卿大夫皆少進定位也者案燕禮卿大夫皆入門石北面君南鄉爾卿卿西面北上爾大夫大夫皆少進皆北面所以然者定羣臣之位也定位之語是記者之辭也君席阼階之上居主位也者居主位之語亦記者辭也君獨升立席上西面特立莫敢適之義也者莫敢適言臣下莫敢與君敵匹而為禮亦是記者之言也設賔至之也正義曰此經明燕禮臣莫敢亢君君又屈而禮之也而以大夫為賔為疑也者公卿朝臣之尊賔又敵主之義若以公卿為賔疑其敵君之義為其嫌疑故所以使大夫為賔明其逺嫌之義也君降一等而揖之禮之也賔既至庭君降階一等而揖之是以禮待於賔也故云禮之禮之亦記者辭也注設賔至相近正義曰云天子使膳宰為主人者文王丗子文云公孤也者此諸侯燕臣子之禮而稱公故知是上公得置孤孤止一人而燕禮云諸公者鄭注彼云諸者容牧有三監也云疑自下上至之辭也疑擬也是在下比擬於上故云自下上至之辭也云尊與君大相近言公卿在朝位與君相近今若使為賔被君所敬則其尊與君大相逼近故經云以大夫為賔為其疑故也君舉至義也正義曰此一經明燕禮臣盡禮於下君答之於上上下交歡而不相怨明君臣之義也君舉旅於賔者謂舉旅酬之酒以酬賔及君所賜爵者特賜臣下之爵皆降再拜稽首升成拜者謂賔受君之酬及臣受君賜爵皆降自西階再拜稽首以受君恩又升堂更再拜稽成拜也故燕禮云公酬賓賔降西階下再拜稽首公命小臣拜鄭云升成拜復再拜稽首也至禮殺之後賔下堂是欲拜君則辭之賔未拜也賔乃升堂再拜稽首鄭注云不言成拜者以其下堂未拜故也燕禮云公卒觶賔下拜小臣辭賔升再拜稽首鄭注云不言成拜者為拜故下實未拜也下不敢輒拜禮殺也臣下竭力盡能以立功於國者案燕禮君賜爵之時再拜稽首示竭力盡能立功於國也君必報之以爵祿者以燕禮臣拜君皆答之者示君報之以爵祿也禮無不答言上之不虛取於下也者以燕禮凡臣之拜君無不答拜之示為上之道不虛取於下也上必須報之也上必明正道以道民民道之而有功者上下必須相報故在上明正教以教道於民民亦依君訓道有功報上也然後取其什一者前眀君臣相報此則君民上下相報君既薄斂於上民亦什一而稅於下故國家用足而下不匱乏是上下和平親睦而不相怨恨也和寧禮之用也者上下和親是和也而不相怨是安寧也和之與寧禮之所用以結成上文也席小至賤也正義曰此明尊卑上下席位之所受獻旅酬之差貴賤先後之義席小卿次上卿者案燕禮上卿在賔席之東小卿在賓席之西隔越於賔席而云次上卿者以俱南面東上遙相次耳大夫次小卿者案燕禮大夫在小卿之西故燕禮云辨獻大夫遂薦之繼賔以西東上士庶子以次就位於下者燕禮于西階上獻士既受獻者立於阼階下西面北上獻庶子于阼階上既獻立於阼階下故云士庶子以次就位於下也獻君君舉旅行酬者案燕禮宰夫為主人酌以獻賔賔飲畢酌以酢主人主人飲畢酌以獻君君飲畢酌以酢主人更爵以受酢于阼階下飲卒爵主人又洗觚酬主人先飲卒爵酌以酬賔賔受觚坐奠于薦東訖小臣請媵爵者二人媵爵阼階下皆北面媵爵于公媵爵者先自飲畢媵爵者洗象觶酌奠于公席之前公坐取所媵之觶以酬賔賔於時下再拜稽首公命小臣辭賔升成拜公立卒觶賔乃受公虛爵酌之酬大夫于西階上衆大夫相酬畢奠虛觶于篚此是獻君君舉旅行酬也而后獻卿卿舉旅行酬者案燕禮主人洗升實散獻卿于西階上獻卿畢小臣又請媵爵者公使二人媵爵奠于公前公又行一爵若賔若長唯公所酬以旅于西階上而止此是為卿旅酬也燕禮直云卿不云大卿小卿之俱同獻也而后獻大夫大夫舉旅行酬者案燕禮主人洗獻大夫于西階上大夫辨受獻乃納工獻衆工畢公又舉奠觶唯公所賜以旅于西階上此是獻大夫為大夫而旅酬也而后獻士士舉旅行酬者案燕禮說屨升堂坐之後主人獻士于西階上獻士辨又獻旅食賔媵觚于公公坐取賔所媵觶興唯公所賜乃就席坐行之終於大夫終受者興以酬士士舉旅于西階上此是獻士為旅酬也而后獻庶子者庶子卑不為之舉旅伹無算爵之節執爵者酌而旅之俎豆牲體薦羞皆有等差者公及卿大夫士等牲體薦羞之節皆有等差但燕禮不載無以言也聘義第四十八正義曰案鄭目録云名曰聘義者以其記諸侯之國交相聘問之禮重禮輕財之義也此於別録屬吉事此聘義釋儀禮聘禮之義伹儀禮聘禮者謂大聘使卿故經云及竟張旜旜是孤卿所建也聘禮謂侯伯之卿故經云上介奉束錦士介四人皆奉玉錦介凡五人故知侯伯之卿此聘義所釋包五等之卿故此經云上公七介侯伯五介子男三介皆謂其卿也聘禮至賤也正義曰此扁揔眀聘義各顯聘禮之經於上以義釋之於下從首至末又眀聘所執玉又因明有諸德之義今各依文解之今此一經以介數不同明貴賤有異皆謂使卿出聘之介數也上公七介者若上公親行則九介其卿降二等故七介侯伯子男以次差之義可知也介紹至至也正義曰此一節眀聘禮之有介傳逹賔主之命敬之至極也三讓至讓也正義曰上經眀設介傳命致敬之義此經明欲傳命之時先須三讓又傳命之後入廟門及升階揖讓之節眀賔所以尊讓主人三讓而后傳命者謂賔在大門外見主人陳擯以大客之禮待己已不敢當三度辭讓主人不許乃後傳聘君之命三讓而后入廟門者謂賔既傳命之後主君延賔而入至廟將欲廟受賔不敢當之故三讓而后入廟門主君在東賔差退在西相嚮三讓乃入廟門也三揖而后至階者初入廟門一揖也當階北面又揖二揖也當碑又揖三揖也三讓而后升者謂主君揖賔至階主君讓賔升賔讓主君如此者三主君乃先升賔乃升也所以致尊讓也言如此致其尊敬讓主人之心也注此揖至其辭正義賔者以三讓而后傳命及三讓而后入廟門皆賔先讓也三揖至階三讓而后升雖主人為首皆賓讓而後至於主人若賔不讓則不至於三是揖讓之事皆賔為主故云此揖讓主謂賔也云三讓而後傳命賔至廟門主人請事時也者鄭解三讓而後傳命之節正當賔至主人大門主人請事之時案聘禮賓至大門主人陳介而請事此云廟門者有廟字者誤也案鄭注鄉飲酒云事同日讓事異日辭此主人以大客禮賓賔不敢當大客之禮乃是事異應云三辭而云三讓者但鄭於儀禮自上下為例此云三讓記者之言辭之與讓其義亦通也云乃傳其君之聘命也解經傳命之言案聘禮注云賔至未介上擯至末擯亦相去三丈六尺賔乃傳聘君之命於上擯也故云傳其君之聘命也案司儀職兩君相見則交擯若臣聘於君則旅擯交擯傳命者聘禮注云其傳命各鄉本受命反面傳而下及未則鄉受之反靣傳而上又受命傳而下其旅擯之時不上下相傳直賔及上擯相對而語交擯與旅擯雖別揔而言之皆是傳命故注聘禮引此介紹而傳命謂時交擯而傳命也今此聘義介紹傳命論相聘也及三讓而后傳命皆聘之旅擯亦是傳命也熊氏皇氏皆以此介紹傳命為朝之交擯今此聘義不釋朝乃於聘義之中而記朝之傳命理為不可又鄭此注傳其聘君之命其義分眀熊氏皇氏之說未盡善也云三讓而後入廟門者案聘禮入廟門之時無三讓之文不備也云讓主人廟受也者解入廟門三讓之意主人於廟受賔之禮言賔不敢當其廟受故云讓主人之廟受也引小行人職者證大客來主人有擯迎之法君使至敬也正義曰前經明賔致尊讓於主君故此經眀主君尊敬聘客所以致敬於彼君之命也君使士迎於竟謂主君使士迎客於竟故聘禮賔及竟張􅎶君使士請事遂以入是也大夫郊勞聘禮云賔至于近郊君使下大夫請行君又使卿朝服用束帛勞此大夫郊勞者即卿也君親拜迎于大門之內而廟受案聘禮賔入門左公再拜是君拜迎於大門之內聘禮又云及廟門公揖入納賔賔入門左賔升西楹西東面是廟受也北面拜貺者君於阼階之上北面再拜拜聘君之貺貺謂惠賜也聘禮云公當楣再拜是也拜君命之辱者釋此北面拜貺之義也言主君所以北面拜貺者拜聘君之命來屈辱也所以致敬於聘君敬讓至侵陵正義曰此一經揔結上賔致尊讓於主君主君又致敬於聘君故賔主交相敬讓者是君子所以相接待也敬讓則不相侵陵者以主人致敬賔致歡同心以禮相接故不相侵陵卿為至義也正義曰主國之卿為上擯接迎於賔大夫為承擯者承副上擯也士為紹擯者紹繼也謂繼續承擯案聘禮注其位相承繼又聘禮注云主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人其待聘客及朝賔其擯數皆然故大行人云上公擯者五人侯伯四人子男三人謂迎朝賔也若擯者五人則士為紹擯者三人若擯者四人則士為紹擯者二人若擯者三人則士為紹擯一人君親禮賔者謂行聘己訖君親執醴以禮賔故聘禮賔行聘訖宰夫徹几改筵公出迎賔以入公側受醴賔受醴公拜送醴是也賓私面私覿者私面謂私以己禮面見主國之卿大夫也私覿者私以已禮覿主國之君以其非公聘正禮故謂之私案聘禮私面在後此先云私面者記者便文無義例也面亦見也以其於臣禮質故以面言之故聘禮注云面亦見也其謂之面威儀質也此於臣謂之面而司儀云諸公之臣相為國客私面私獻注云私面私覿也又以私面為私覿者以司儀之文但云私面私獻不云私覿故以私面為私覿也昭六年左傳楚公子棄疾見鄭伯以其乘馬八匹私面於君而稱面者因行過鄭而面鄭伯非正禮故雖君亦稱面也致饔餼者謂行聘之日主君使卿致饔餼之禮於賔館案聘禮君使卿韋辨歸饔餼五牢注云牲殺曰饔生曰餼又曰飪一牢鼎九設于西階前腥腥牢鼎二七設于阼階前餼二牢陳于門西北面東上是也案聘禮餼既為生而左傳僖三十三年云餼牽竭矣服䖍云死曰餼者以餼與牽相對牽既為生餼則為死故詩瓠葉篇云牲牢饔餼鄭注云腥曰餼者以牲牢饔餼相對以牲牢既為生饔又為熟故以餼為腥也還圭璋者謂賔將去時君使卿就賔館還其所聘之圭璋故聘禮云君使卿皮辨還玉于館是也賄贈者因其還玉之時主人之卿并以賄而往還玉既畢以賄贈之故聘禮還圭璋畢大夫賄用束紡是也饗食燕者謂主君設大禮以饗賔設食禮以食賔皆在廟也又設燕以燕之燕在寢也故聘禮云公於賔一食再饗燕與差俶獻無常數是也君臣之義也謂君親禮賔賔用私覿及致饔餼饗食之屬或主人敬賔或賔答主人或君親接賔或使臣致之是顯明賔客君臣之義也注設大至臣也正義曰鄭解賔客君臣之義也設大禮謂饗食之屬則以賔客禮待之使人延賔於館則主君親待之是賔客其使人也云或不親而使臣則為君臣也者謂主君或不親饗則使人致禮於賔若致饔餼致饗致食及還圭贈賄之屬皆主君不親使臣致禮於客客是臣故使臣敵之是君臣之義也故天至具也正義曰此經明諸侯交相聘問相厲以禮則內崇敬讓外不相侵陵是自為正之具天子制諸侯比年小聘三年大聘者謂天子立制使諸侯相於比年使大夫小聘三歲使卿大聘使者聘而誤主君弗親饗食也謂來聘使者行聘之時禮有錯誤則主國之君不親自饗食以接賔所以使賔恥愧自勉勸厲此天子之所以養諸侯兵不用者謂天子制此禮使諸侯自相親是存養諸侯無兵革之患而諸侯自為正之具也正謂國無患難國家得正由其外親諸侯所以如此是自為正之具也注比年至聘也正義曰案大行人云諸侯之邦交歲相問也案聘禮記云小聘曰問故知此比年小聘是歲相問也大行人又云殷相聘也殷中也謂三年之時中而無事故稱殷也案昭九年左氏傳云孟僖子如齊殷聘禮也服䖍法云自襄二十年叔老聘於齊至今積二十年故修盛聘之禮鄭引之以解大行人殷相聘也鄭以殷為中惟取殷聘之文以解殷相聘之義正取殷文是同其年數則異故以此三年之聘為殷聘也此經所云謂諸侯自相聘也而王制云諸侯之於天子比年一小聘三年一大聘五年一朝與此不同者此經諸侯相聘是周公制禮之正法王制所云謂文襄之法故不同也以圭至讓矣正義曰此一經明既聘還圭璋輕財重禮教民廉讓之意以圭璋聘重禮也者玉以比德故以圭璋而聘貴重其禮也言此禮可貴與玉相似巳聘而還圭璋此輕財而重禮之義也謂既聘之後賔將歸時致此圭璋付與聘使而還其聘君也凡行聘禮之後享君用璧享夫人用琮圭璋玉之質惟玉而巳壁琮則重其華美加於束帛聘使既了還以圭璋之玉重其禮故還之留財是輕其財故留之重者難可報覆故用本物還之輕者更以他物贈之此是輕財重禮之義也則民作讓矣者言諸侯既能相厲以輕財重禮之義君既行之於上人則效之於下故民皆作其廉讓矣注圭瑞至是也正義曰云圭瑞者以器言之謂之圭執以行禮謂之瑞瑞信也謂與人為尊卑之信驗也云尊圭璋之類也用之還之皆為重禮者言尊敬此璋同於圭則璋是圭之等類用之以聘聘訖又還皆為尊重此禮以圭璋所以行禮故重之也云禮必親之不可以已之有遙復之也者言行禮之義必親自為之若己親往彼國則可以已國之有執注行禮今主國之君既不親往彼國則不以已國所有寶玉遙復償他國所來圭璋故還歸之也故云不可以已之有遙復之也復償也云財謂璧琮享幣也受之為輕財者案聘禮享君以璧享夫人以琮享獻也謂所獻之幣主人受而不還是謂輕財也云財可遙復者解受璧琮之意璧琮是財輕可得以己物遙而復償於彼國賫來者己得受之伹聘禮圭璋與璧琮相對故圭璋為聘璧琮為享若諸侯之朝天子圭璋與壁琮皆為享也皆為財故小行人合六幣圭以馬璋以皮二王之後享天子用圭享后用璋則雖圭璋亦受之不歸也云重賄反幣是也者案聘禮云無行則重賄反幣注云無行謂獨來復無所之也主國至禮也正義曰此一經明待賔之厚所以尊重聘禮之義主國待客出入三積者此謂上公之臣故出入三積若侯伯以下之臣則不致積也故司儀云諸公之臣相為國客則三積注云侯伯之臣不致積知者謂聘禮是侯伯之臣故文無致積也此出入三積者謂入三積出亦三積故司儀云遂行如入之積是去之積如來時積也餼客於舍五牢之具陳於內者案聘禮致客有饔有餼今直云餼客者略言之於舍謂於賔館也五牢之具謂飪一牢在賔館西階也腥二牢在賔館東階也餼二牢在賔館門內之西是皆陳於內也米三十車禾三十車芻薪倍禾皆陳於外者案聘禮米三十車設于門東東陳禾三十車設於門西西陳薪芻倍禾也鄭注薪從米芻從禾乘禽曰五雙者謂乘行羣匹之禽鴈鶩之屬聘卿則每日致五雙也羣介皆有餼牢者鄭注掌客云爵卿也則飧二牢饔餼五牢爵大夫也則飱大牢饔餼三牢爵士也則飱少牢饔餼再饗燕與時賜無數者此謂聘卿也一為之設食歡燕與當時之賜無常數也所以厚重禮也言備賔之物所以豐厚尊重行聘之禮其天子待諸侯之禮及諸侯相待之法賔主玉帛之節饔餼飧積之差米禾薪芻多少饗食牲牢隆殺皆文具掌客義見聘禮可以尋文取實故於此略而不言也古之至焉爾正義曰此一經明聘禮用財之厚務行禮讓則君臣內外不相侵陵所以諸侯務焉古之用財不能均如此者言古之費用其財不能悉皆均平常能如此之厚言厚則從其豐無則從其實然而用財如此其厚者言盡之於禮也者言古之用財既有隆有殺而相聘之事費用其財如此豐厚者言用財盡極於禮言以禮則止雖有冨者不得過也盡之於禮則內君臣不相陵而外不相侵者言若能豐厚用財在於禮謂以禮自制不得過則於國內上下和睦君臣不相陵也謂四鄰歸懷外不相侵也故天子制之諸侯務焉爾者言行禮使君臣內外不相侵陵故天子制此聘禮而諸侯務而行焉注不能至過也正義曰言無則從其實也者言國若豐厚則盡其財以行禮國若乏無則從其當時之實猶如國新殺禮凶荒殺禮計財而行禮故云從其實云欲令冨者不得過也者謂豐財以行禮盡禮而用財雖有其財唯盡極於禮不可禮外更多用其財使貧而及禮冨者不得奢使上下得冝內外無怨也聘射至安也正義曰以前經說聘禮既畢此一節又申明行聘之時禮儀既大日晚始罷故記者引唯勇敢之人能成禮事故於此眀之此是聘義兼云射者以強有餘力之士非伹聘而行禮又能射為武事故此揔眀之也聘射之禮至大禮也者言此聘之與射至極繁大之禮非如冠昏之屬暫時助異曰幾中而后禮成者幾近也曰近在於中而後禮成畢非強有力者弗能行也故強有力者將以行禮也言非強有德力而行禮則禮事不成也酒清人渴不敢飲也者此謂射禮也言欲射之時先行燕禮唯以禮獻酬不敢恣意醉飽但行禮而巳非謂全不得飲之聘禮行聘之時但酌醴禮賔無酒肴之事故知此唯據射也肉乾人飢而不敢食也亦言不敢全食而令飽也日莫人倦齊莊正齊者謂日莫晚人斯懈倦猶齊莊而自整齊也以成禮節者所以日莫猶自整齊者以不敢懈倦成謂射禮也故此以下即云以正君臣以親父子以和長幼皆謂射也前文云日幾中而后禮成聘射揔陳特謂聘也故日幾中而禮成此云日莫者謂射禮也酒清肴乾特據於射故曰莫而成禮節也以正君臣者謂射前行燕禮謂君在阼賔升成拜稽首之屬及受君賜再拜稽首之等是以正君臣也以親父子以和長幼者此謂鄉射之前行鄉飲酒之禮有齒於父族之事故云以親父子以和長幼但此節揔結聘射則前篇射義在其中也故射義云諸侯之射必先行燕禮卿大夫士之射必先行鄉飲之禮故燕禮所以明君臣之義也鄉飲酒之禮所以明長幼之序也故此經揔結之也故酒淸肴乾之屬燕禮與鄉飲酒禮初行之時事同於饗皆有此也至說屨升坐之後乃盡歡飲食也此衆人之所難而君子行之者言以上之事凡衆人所難行君子之人特能行之故謂之有行者以君子有能行故謂此君子為有行之士身既有行則事得冝故云有行之謂有義有義則臨敵果斷故云有義之謂勇敢此揔覆說聘之與射也故勇敢強有力者勇敢射之所須强有力明聘之所須故前文論聘止稱強有力者此經論射則云勇敢故知然也天下無事則用之於禮義者無事謂兵革休息故用之於聘射之禮義天下有事則用之於戰勝者有事謂軍旅數起故用之於戰鬪必得勝也勇敢強有力而不用之於禮義戰勝而用之於爭鬪則謂之亂人者戰勝謂公義而戰勝則前經戰勝是謂以戰而勝也比云用之於爭鬪者謂私爭忿鬪與前經不同也故云不用之禮義戰勝而用之於爭鬪子貢至之也正義曰以聘用玉因論玉有諸德而結成聘義之篇也為玉之寡而珉之多與者子貢之意所以貴玉者豈不為玉之寡少故貴之珉之饒多故賤之與疑辭也孔子曰至玉焉言貴玉由其有德非為少故貴之謂昔者君子之人於玉以比道德所以貴玉者為其有德君子之人比德堪敬重如玉故貴之有德即下云溫潤而澤仁等是也溫潤而澤仁也者言玉色溫和柔潤而光澤仁者亦溫和潤澤故云仁也縝密以粟知也者縝緻也栗謂堅剛言玉體密緻而堅剛人有智者性亦密緻堅剛故云知也廉而不傷也言王體雖有廉稜而不傷割於物人有義者亦故云義也垂之如隊禮也言玉體垂之而下墜人有禮者亦謙恭而卑下故言禮也叩之其聲清越以長其終詘然樂也者越揚也詘謂止絶也言玉體以物叩擊其聲淸冷發越以長逺而聞其擊之終音聲則詘然而止不如鐘聲擊罷猶有餘音也其為樂之法初作聲而發揚樂罷則止如槁木言玉體亦然故云樂也瑕不掩瑜瑜不掩瑕忠也瑕謂玉之病處瑜謂玉中美處言玉之病處不掩映美處玉之美處不掩映病處皆以忠實見外如人之忠者亦以忠心見外故云忠也孚尹旁逹信也孚浮也浮者在外之名尹讀如筠筠者若竹箭之筠筠亦潤色在外者旁者四面之謂也逹者通顯之名也信者內不欺隱者也玉采色彰逹著見於外無隱掩如人有信者亦著見於外故云信也氣如白虹天也白虹謂天之白氣言玉之白氣似天白氣故云天也精神見於山川地也精神謂玉之精氣徹見於山川謂玉在山川之中精氣徹見於外地氣含藏於內亦徹見於外與地同故云地也圭璋特達德也行聘之時唯執圭璋特得通逹不加餘幣言人之有德亦無事不通不須假他物而成言圭璋之特同人之有德故云德也天下莫不貴者道也道者通也言萬物無不由道而通故天下無不貴之玉者亦天下貴之與道相似故云道也詩云言念君子溫其如玉此詩秦風小戎之篇美秦襄公之詩也言襄公出兵征伐西戎婦人思念其夫言我念此君子顔色溫然如玉引之者證玉以比德之事言貴玉者以其似君子故云君子貴之也注珉石似玉正義曰案吕諶字林云珉美石以其石之美者故云似玉也注栗堅貌正義曰案詩大雅云實穎實栗栗是禾之堅熟故云栗堅貌也注樂記日止如槀木正義曰引之者證樂聲之止似擊枯槀之木無餘聲也言玉擊止之時其聲即絶與樂相似也注瑕玉至忠也正義曰瑕玉之病也吕諶字林云瑕玉小赤而云病者以瑕與疵瘕義同故云玉之病也云瑜其中閒美者案字林云瑜美玉是瑕之中閒美善者注孚讀至信也正義曰案字林云琈玉別名玉旁孚也此讀為浮者取浮見於外非字林琈玉之名也注有德者無所不逹不有須而德者得也萬物皆得故無所不通不更須待外物之禮有圭璋璧琮壁琮則有束帛加之乃得逹圭璋則不用束帛故云特逹然璧琮亦玉所以璧琮則加於他物圭璋得特逹者但玉既比德於禮重處則特逹於禮輕處則加物以玉可重可輕美其重處言之故云特逹喪服四制第四十九正義曰案鄭目録云名曰喪服四制者以其記喪服之制取於仁義禮知也此於别録舊說屬喪服鄭云舊說案別録無喪服四制之文唯舊說稱此喪服之篇屬喪服然以上諸篇每篇言義此不云喪義而云喪服四制者但以上諸篇皆記儀禮當篇之義故每篇言義也此則記者別記喪服之四制非記儀禮喪服之篇故不云喪服之義也凡禮至生也正義曰此一篇揔論喪之大體有四種之制初眀恩制次眀理制次明節制次明權制既眀四制事畢又明三年喪自古而行之故引髙宗之事又明斬衰以下節制之差結成仁義之事各隨文解之體天地者言禮之大綱之體體於天地之間所生之物言所生之物皆禮以體定之法四時者則下文云喪有四制變而從冝取之四時是也則隂陽者下文云吉凶異道不得相干取之隂陽是也順人情者下文云有恩有理有節有權取之人情是也故謂之禮者以其無物不體故謂之為禮故注云禮之言體也訾之者是不知禮之所由生也者言若訾毀不信禮之體天地法四時則隂陽順人情如此之人是不識知禮之所由生也言不知禮之有法則也夫禮至具矣正義曰此一節覆說前文禮法四時則隂陽順人情之事不覆說體天地者天地包此四時隂陽人情無物不揔故不覆說體天地之事吉凶異道者言吉凶各異其道及衣服容貌器物不同也喪有四制變而從冝者言門內主恩若於門外則變而行義尊卑有定禮制有恆以節為限或有事故不能備禮則變而行權是皆變而從冝取人情也恩者仁也理者義也節者禮也恩屬於仁理屬於義節屬於禮故云節者禮也權者知也量事權冝非知不可故云權者知也仁義禮知人道具矣者此揔結四制之義仁屬東方義屬西方禮屬南方知屬北方四時並備是人道具矣五常五行四時之故北方水為知又為信是取法四時故不并數信也至也正義曰此一經明四制之中恩制也以父最恩深故特舉父而言之其實門內諸親為之著服皆是恩制也門內至者也正義曰此一經眀門外之治四制之中義制也門內之治恩掩義者以門內之親恩情既多掩藏公義言得行私恩不行公義若公羊傳云有三年之喪君不呼其門是也門外之治義斷恩者門外謂朝廷之閒既仕公朝當以公義斷絶私恩若曽子問父母之喪既卒哭金革之事無辟是也資於事父以事君而敬同者言操持事父之道以事於君則敬君之禮與父同貴貴者貴謂大夫之臣事大夫為君者也大夫始入尊境則是貴也此臣盡敬此君故云貴貴也尊尊者尊尊謂天子諸侯之臣事天子諸侯為君者也天子諸侯同為南面則是尊也此臣極敬此君故曰尊尊也義之大者也以義斷息門外如一雖復大夫與王侯有異而其臣敬不殊故並云義之大者也故為君亦斬衰三年以義制者也言亦謂亦同於父也三日至尊也正義曰此一節明四制之中節制也苴衰不補者言苴麻之衰雖破不𥙷墳墓不培者培益也一成丘陵之後不培益其土祥之日鼓素琴者大祥之日得鼓素琴告民有終也者言所以為此上事告教其民使哀有終極也以節制者也以情實未巳仍以禮節為限制抑其情也自此以上皆節制之事從此以下更申明節制欲尊歸其一故更眀無二尊之理資於事父以事母而愛同者言操持事父之道以事於母而恩愛同恩愛雖同而服乃有異以不敢二尊故也故以天無二日及家無二尊之等眀皆歸於尊一以治理之也天無二日至二尊也此揔結無二尊之理也注食食粥至必朋正義曰沐謂將虞祭時也士虞記曰沐而不櫛故知沐謂將虞祭時虞後有事得沐浴也故雜記云非虞附練祥無沐浴云鼓素琴始存樂也於此祥曰而鼓素琴始存省此樂縣而作樂在既禫之後杖者至者也正義曰此一經眀四制之中權制也杖者何也爵也者權制之中所以先明杖者以下有不應杖而杖又有應杖而不杖皆是權冝故先舉正杖於上言爵也者杖之所設本為扶病而以爵者有德其恩必深其病必重故杖為爵者而設故云爵也三日杖五日授大夫杖七日授士杖者上云杖者也遂歷敘故云三日授子杖五日授大夫杖七日授士杖或曰擔主者解無爵而亦杖故記者稱或日擔主喪服傳云杖者何爵也無爵而杖者何擔主也鄭注云擔假也尊其為主假之以杖或曰輔病者喪服傳云非主而杖者何輔病也謂庶子以下雖非適子皆杖為其輔病故也婦人童子不杖不能病也者杖既扶病何婦人童子所以不杖為其不能病也婦人謂未成人之婦人童子謂幼少之男子百官備百物具不言而事行者扶而起者此謂王侯也喪具觸事委任百官不假自言而事得行故許子病深雖有扶病之杖亦不能起故又須人扶乃起也言而后事行者杖而起者此謂大夫士既無百官百物須巳言而後喪事乃行故不許極病所以杖而起不用扶也身自執事而后行者面垢而巳者此謂庶人也卑無人可使但身自執事不可許病故有杖不得用但使面有塵垢之容而巳也子於父母貴賤情同而病不得一故為權制秃者不髽髽者是婦人之大紒重喪辮麻繞髮秃者無髮故不髽也女秃不髽故男子秃亦不免也傴者不袒袒者露膊傴者可憎故不露也跛者不踊踊是跳躍跛人腳蹇故不跳躍也老病不止酒肉者孝子悲哀非病不食滋味若老及病身巳羸瘠又使備禮必致滅性非制所許故酒肉養之凡此八者以權制者也此記者結前權數也夫喪禮冝備今有此八條不可以強逼故聖人權冝制也所謂八者謂應杖不杖不應杖而杖一也扶而起二也杖而起三也面垢四也悉者五也傴者六也跛者七也老病者八也庚蔚云父存為母一也不數杖與不杖之科皇氏熊氏並取以為說今案經文為母期乃屬前經鄭於期下揔注三日而食三月而沐之事是為母期之文乃在節制之中不得下屬此經權制之例又此經權制之科乃載杖與不杖之條此經末又揔云八者是揔此經之八事今乃不數此經杖條便是杖文虛設庾氏之說恐未為善聽賢者擇焉注五日至人髽正義曰云五日七日授杖謂為君喪也者案喪大記大夫與士之喪皆云三日授子杖同主為其親也今云五日七日故知為君也始死至而祥正義曰此一節覆明前經四制之中節制之事以禮之大體喪之三年為限節之事故重明之三日不怠者謂哭不休怠三月不解者謂不解衣而居期悲哀者謂期之間朝夕恆哭三年憂者謂不復朝夕哭但憂戚而巳恩之殺也者自初以降是恩漸減殺也聖人因殺以制節者言聖人因其孝子情有减殺制為限節此喪之中庸也者庸常也言三年之喪賢者不得過不肖者不得不及是喪之中平常行之節也故王者之所常行也書曰髙宗諒暗二年不言善之也引書者明古來王者皆三年喪諒讀曰梁暗讀曰䳺謂廬也謂既虞之後施梁而柱楣故云梁暗之中三年不言政事善之者言是古人載之於書美善之故也王者莫不行此禮河以獨善之也記者自設問古人獨善之意曰髙宗者武丁者記者還自釋獨善髙宗之意武丁者殷之賢王也者中興殷丗故曰賢王也故載之書中者言以古人善此髙宗載於書中又尊髙其行故謂之髙宗三年之喪君不言者是記者引古禮三年之喪君則不言國事書云髙宗諒暗三年不言此之謂也者此記者引書髙宗所行中節是君不言之事故云此之謂也然而曰言不文者謂臣下也者是記者既稱古禮君不言故又云言不文故記者復解云言不文者謂臣下也禮斬衰之喪唯而不對者謂與賔客言也但稱唯而已不對其所問之事侑者為之對不旁及也齊衰之喪對而不言者但對其所問之事不餘言也大功之喪言而不議者但言說他事不與人論議相問答也緦小功之喪議而不及樂者得議他事但不能聽及於樂也三年而祥者此章從上以來至此皆明三年之喪制節之事比終至察焉正義曰此一節更覆結居父母之喪能終此三節可以知其德行三節者目初喪至沐一也十三月練二也三年祥三也能終此三節者仁者可以觀其愛知者可以觀其理強者可以觀其志也言此自初遭喪至於喪畢有三者之節仁者可以觀其愛焉者孝子居喪性有仁恩則居喪思慕可以觀其知愛親也若不愛親則非仁恩也知者可以觀其理焉者若孝子有知則居喪合於道理若不合於道理則非知也強者可以觀其志焉若孝子堅強其居喪則能守其志節若無志節則非堅強禮以治之者言用禮以治居喪之事義以正之者用義以正居喪之禮孝子者謂孝順之子弟者謂遜弟之弟貞婦者謂貞節之婦皆可得而察焉者若能依禮合義有仁可觀其愛有理可觀其知有志可觀其強則是孝子弟弟貞婦也若無此事則非孝子弟弟貞婦也故云可得而察焉也禮記正義卷第七十祕閣寫御書臣王文懿臣孟佑書將仕郎守澤州陽城縣主簿臣劉文蔚校將仕郎守開封府陽武縣主簿臣董拙校將仕郎守鄆州司法參軍臣隨億校文林郎守光州固始縣令臣軒轅節校文林郎守坊州軍事判官臣王用和校承奉郎守殿中丞臣胡迪校將仕郎守蒙州司戶參軍臣袁柄再校文林郎守福州福淸縣令臣步藻再校文林郎守戎州𤏡道縣令臣李坦再校將仕郎守大理評事臣孫奭再校登仕郎守大理寺丞臣田嘏再校承奉郎守大理寺丞武騎尉臣王曉再校徴事郎守殿中丞臣紀自成再校朝奉郎守國子博士崇文院檢討兼祕閣校理上騎都尉賜緋魚袋臣杜鎬推誠同德佐理功臣銀靑光祿大夫行尚書吏部侍郎兼祕書監修國史判國子監上柱國隴西郡開國侯食邑一千二百户臣李至淳化五年五月日朝散大夫右諌議大夫參知政事柱國東平縣開國男食邑三百戶賜紫金魚袋臣吕端等進正奉大夫給事中參知政事上柱國天水縣開國男食邑三百戶賜紫金魚袋臣趙言朝請大夫給事中參知政事上柱國武功縣開國男食邑三百户賜紫金魚袋臣蘇易簡推忠協謀佐理功臣光祿大夫吏部尚書同中書門下平章事上柱國東平郡開國公食邑二千三百戶食實封六百戶臣吕蒙正
