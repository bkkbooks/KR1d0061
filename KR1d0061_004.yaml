body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔頴逹等奉勑撰儒行第四十一正義曰案鄭目録云名曰儒行者以其記有道德者所行也儒之言優也柔也能安人能服人又儒者濡也以先王之道能濡其身此於别録屬通論案下文云儒有過失可微辨而不可面數搏猛引重不程勇力此皆剛猛得爲儒者伹儒行不同或以遜讓爲儒或以剛猛爲儒其與人交接常能優柔故以儒表名魯哀公問於孔子者言夫子自衞反魯哀公館於孔子問以儒行之事記者録之以爲儒行之篇孔子說儒凡十七條其從上以來至下十五條皆明賢人之儒其第十六儒明聖人之儒包上十五條賢人儒也其十七條之儒是夫子自謂也今此一節明哀公至孔子之家見孔子衣服之異疑其儒服遂問儒行爲孔子命帟方說儒行之事也君子之學也博者言徧知今古之事也其服也郷者冠服湏所居之郷也丘不儒服者言服但衣其郷之服不知儒服言此者譏哀公意不欲侮笑其服故以此言非之注逢猶至二寸正義曰謂逢猶盛大之貌詩云維柞之枝其葉蓬蓬是逢爲盛大之貌也云掖之衣大袂禪衣也者掖謂肘掖之所寛大故云大袂禪衣也禮大夫以上其服侈袂鄭注司服云侈之者半而益一袂三尺三寸祛尺八寸朝祭之服必表裏不禪也孔子若依尋常侈袂之服則哀公無由怪之以其大袂禪衣異於士大夫常服故問之云非哀公意不在於儒者今若在儒孔子新來則應問以儒行今乃問其服是意欲侮戲夫子故下文云不敢以儒爲戯明此時意以爲戯也云庶人禪衣袂二尺二寸者庶人無朝祭之事故知禪衣袂二尺二寸云祛尺二寸者玉藻文言深衣之制如此今夫子著禪衣與庶人同其袂大與庶人異故謂衣爲逢掖也則此大袂深衣也長居宋冠章甫之冠言夫子生於魯長於宋魯有大袂禪衣宋有章甫之冠故知大袂之衣是少所居之服也章甫之冠是長所居之冠案曲禮云去國三丗唯興之日從新國之法孔子曽祖防叔防叔生木金木金生伯夏伯夏生良紇良紇生孔子防叔奔魯至孔子五丗應從魯冠而猶著殷章甫冠者以丘爲制法之主故有異於人所行之事多用殷禮不與尋常同也且曲禮從新國之法秖謂禮儀法用未必衣服盡從也禮臣朝於君應著朝服而著常服者時孔子自衞新還哀公館之非是常朝故衣冠異也遽數之不能終其物者遽卒也數說也終盡也物事也孔子荅言儒行深逺非可造次若急而說則不能盡事也悉數之乃留更僕未可終也者留乆也若委細悉說之則乃大乆也更僕者更代也僕大僕也君燕朝則大僕正位掌擯相也言若委細悉說之則大乆僕侍疲倦冝更代之未可終也若不代僕則事未可盡也哀公命席者哀公旣聞孔子所荅稱儒行不敢造次而盡故命掌筵者爲夫子布席也故注云爲孔子布席於堂與之坐也君適其臣升自阼階所在如主孔子侍者此一經明孔子侍坐於哀公說儒行脩立已身終始之事儒有席上之珍以待聘者席猶鋪陳也珍謂美善之道言儒能鋪陳上古堯舜美善之道以待君上聘召也盧云儒是侍坐席之司重也此經論者自學脩􅎖事六應直云席上之可故鄭不也力行以待取言已脩身勵力行之擬待進取榮位也其自立有如此者謂自脩立已身有如此行在上之諸事也儒有衣冠中者此明儒者容貌之事儒有衣冠中者中間言儒者所服衣冠在尋常人之中間不嚴勵自異也動作愼者謂舉動興作恒謹愼也其大讓如慢謂有人以大物與已已之讓此大物之時辭貌寛緩如慠慢然小讓如僞者言讓其小物如似詐僞亦謂寛緩不急切也言儒不以利動也大則如威者言有大事之時形貌則如似有所畏懼也小則如愧者言行小事之時則如似有所慙愧如威如愧皆謂重愼自貶損粥粥若無能也者粥粥是柔弱專愚之貌言形貌粥粥然如無所能也注中中至所畏正義曰中中間者言儒者衣冠在常人中間則孔子逢掖之衣是也云如慢如僞言之不愊怚也者愊怚謂急促之意言語之時不愊怚切急如似慢然如似僞然庾氏云讓大物不受拒於人如似慠慢讓小物之時初讓後受如似僞然與注意不合非鄭旨也儒有居處齊難者此明儒行先以善道豫防備患難之事居處齊難者凡所居處容貌齊莊可畏難也貌旣如此人則無由慢之也道塗不爭險易之利者塗路也君子行道路不與人爭平易之地而避險阻以利巳也冬夏不爭隂陽之和者冬温夏涼是隂陽之和處冬日暖處則暄夏日隂處則涼此並爲丗人所競唯儒者讓而不爭也故注云行不争道止不選處所以逺鬪訟也愛其死以有待也者此解不爭也言愛死以待明時養其身以有爲也者言養身爲行道德也其備豫有如此者言儒者先行善道豫防患害有如此在上諸事也儒有不寳金玉而忠信以爲寳者此一經明儒者懷忠信義之事也儒有不寳金玉而忠信以爲寳者言儒懷忠信仁義以與人交不貪金玉利禄以與人競人則親而近之不祈土地立義以爲土地者言儒者祈土之福以義自居故云以爲土地不祈多積多文以爲富者積積聚財物也儒以多學文章技藝爲富不求財積以利其身也難得而易禄也非道之丗則不仕是難得也先事後食是易禄也易禄而難畜也者無義則去是難畜也非時不亦難得手者非時謂非明時則不見是不亦難得乎非義不合不亦難畜乎者君有義而與之合無義則去是難畜也其近人有如此者言儒者親近於人有如此在上之諸事也儒有委之以貨財者此明儒者之行有異於衆挺特而立不與同羣之事儒有委之以貨財淹之以樂好者言儒者之行人或委聚之以貨財謂多以貨財委之淹之以樂好謂他人淹漬之以愛樂華好之事言以愛樂玩好浸漬之也見利不虧其義者謂儒者執持操行雖見貨財樂好之利不虧損已之義事苟且而愛也劫之以衆沮之以兵者謂他人劫脅以軍衆沮恐之以兵刄也見死不更其守者言儒者雖見劫見沮以致於死終不更改其所守之志而茍從之免死也鷙蟲攫搏不程勇者言儒者若逢鷙猛之蟲則身往攫搏不程量武勇堪當以否遇即行也引重鼎不程其力者言引重鼎不豫前商量已力堪引以否言見則引之此攫搏引鼎喻艱難之事言儒者見艱難之事遇則行之不豫度量也此實暴虎之事而得爲儒者孔子此言雖託儒爲事其實自述也若春秋夾谷之㑹孔子欲斬齊之優儒是也案定十年公與齊侯㑹於夾谷之地於時孔子爲都禮之事齊人欲劫辱魯君孔子使人拒之而又齊人之樂併優及侏儒者於魯幕下弄魯君孔子命誅之斷其手足異門而出齊侯不敢輕魯還汶陽之田及所侵之地並歸於魯是夫子之功儒者亦有勇不避艱難引之者言儒者有勇往者不悔者言儒者有往過之事雖有敗負不如其意亦不追悔也來者不豫者謂將來之事其所未見亦不豫前防備言巳往及未來平行自若也過言不再者再更也言儒者有愆過之言不更爲之流言不極者極謂窮極若聞流傳之言不窮其根本所從出處也言儒者識慮深逺聞之則解故不窮極其所出也不斷其威者斷絶也言儒者不蹔絶其威嚴容止當可畏也不習其謀者逢事則謀不豫習也其特立有如此者言餘人不能唯儒者獨能特立有如此之行也注淹謂至順也正義曰淹謂浸漬之者言樂好之事民之所嗜易以溺人云淹之樂好故知淹爲浸漬也云沮謂恐怖之也以沮謂敗壞於人是恐怖之也俗本沮或爲阻字謂阻難之事云鷙蟲猛鳥猛獸也者蟲是鳥獸通名故爲猛鳥猛獸云字從鳥鷙省聲也者言鷙蟲旣是猛鳥猛獸伹獸摯從執下著手鳥鷙從執下著鳥今一鷙包兩義以獸鷙從鳥故云省也執下著鳥執下著手俱是鷙聲故云聲也但以脚取之謂之攫以翼擊之謂之傅云雖有負者後不悔也者身行往過之事雖有負敗不追悔也云平行自若者若如也言雖有敗負及未見之事不恥愧憂慮但平常而行志意自如也云不習其謀口及則言不豫其說而順也者口及則言謂口及其事則言論謀度之不豫前備其言說而順從所謀之也儒有至此者此明儒有剛毅之事居處不淫者淫謂傾邪也言儒者性旣剛毅故居處不傾邪也飲食不溽者溽之言欲也即濃厚也言儒性旣剛儉故飲食常質不濃厚也其剛毅有如此者言儒者其剛强嚴毅有如此諸事儒有忠信至此者此明儒者自立之事也忠信以爲甲胄注云甲鎧胄兠鍪也千櫓小盾大盾也甲胄干櫓所以禦其患難儒者以忠信禮義亦禦其患難謂有忠信禮義則人不敢侵侮也戴仁而行仁之盛抱義而處義不離身雖有暴政不更其所者更改也不改其志操逈然自成立也雖與前自立文同其意異於上也其自立有如此者初第一儒言自立者謂強學力行而自脩立也此經自立者謂獨懷仁義忠信也儒有一畝之宫至此者此明儒者仕官能自執其操也儒有一畝之宫者一畝謂徑一歩長百歩爲畝若折而方之則東西南北各十歩爲宅也牆方六丈故云一畝之宫宫謂牆垣也環堵之室者環謂周迴也東西南北唯一堵篳門圭窬篳門謂以荆竹織門也杜氏云柴門也圭窬門旁窬也穿牆爲之如圭矣故云圭窬說文云穿木爲户左傳作竇謂門旁小戸也上銳下方狀如圭也蓬戸甕牖者蓬戸謂編蓬爲戸又以蓬塞門謂之蓬戸甕牖者謂牖牎圎如甕口也又云以敗甕口爲牖易衣而出者王云更相衣而後可以出如王之意是合家共一衣故言出更著之也并曰而食者謂不日日得食或三日二日并得一日之食故注云二日用一日食也上荅之不敢以疑者上君也荅之謂已有言語君應荅而用之不敢以疑謂已決竭心力不敢疑貳於君也亦謂雖被信任用不敢猜疑於君上也言儒者官盡忠上荅不敢以諂者已有言語而君不用及不見使則已冝靜黙不敢諂媚求進也注貧窮至爲雉正義曰貧窮屈道仕爲小官也者以經云其仕有如此者是仕官之人今乃篳門圭窬仕爲小官儒有大德而仕小官故知貧窮屈道也云五板爲堵五堵爲雉者定十二年公羊傳文引之者證堵之大小髙一丈長三丈爲雉儒有今人與居至此者此明儒者雖身不居明代猶能憂思愛及於人之事也今人與居古人與稽者言儒與今丗小人共居住與古人之君子意合同也今丗行之後丗以爲楷者楷法式也言儒者行事以爲後丗楷模法式適弗逢丗者適之也謂已之生於澆薄之時不逢明丗也上弗援者援引也取也旣不逢明時又不爲君上之所引取也下弗推者下謂民人也推謂進舉也言身在下不遇之時又不爲民下所薦舉也讒諂之民有比黨而危之者危謂毀害也旣不爲君所引又不爲民所薦唯有讒諂之民其羣黨連比共危亡已者也身可危也而志不可奪也者言身乃可危而心志不可變奪也故論語云守死善道是也雖危起居竟信其志者起居猶舉動也竟終也信讀爲伸雖比黨之民共危矣而行事舉動猶能終伸我已之志操不變易也猶將不忘百姓之病也者猶圖也身雖不遇其丗所圖謀不忘百姓之所憂病也言常念之也其憂思有如者謂儒者身雖不遇猶能憂思於人有如在上之事也注信讀如屈伸之伸假借字也正義曰此是信字義當如舒伸之伸伹古之字皆假借此信字以爲屈伸之伸也儒有愽學至此者此明儒有寛𥙿之事愽學而不窮者謂廣愽學問而不窮止篤行而不倦者篤猶純也又有純壹之行而行之不疲倦也幽居而不淫者幽居謂未仕獨處也淫謂傾邪也君子雖復隱處常自脩整不傾邪也上通而不困者上通謂身得通達於君有道德被用也不困謂旣在其位必行其正使德位相稱不爲困弊不足也以儒德之備也禮之以和爲貴者禮以體别爲理人用之當患於貴賤有隔尊卑不親儒者用之則貴賤有禮而無間隔故云以和爲貴也忠信之美者見人有忠信則已美之優游之法者優柔者和柔也見人和軟則已法之慕賢而容衆者以見賢思齊是慕賢也汎愛一切是容衆也毀方而瓦合者方謂物之方正有圭角鋒鋩也瓦合謂瓦器破而相合也言儒者身雖方正毀屈已之方正下同瓦細如破去圭角與瓦器相合也注不窮至逺人正義曰不窮不止也者恐爲困窮故云不止謂不窮巳云幽居謂獨處時也者旣未仕對己仕者爲獨處也云去已之大圭角下與衆人小合也者圭角謂圭之鋒鋩有楞角言儒者身恒方正若物有圭角不欲異衆過甚去其大圭角言猶有小圭角也下與衆人小合儒者不與衆人之合亦於細碎小事而相合也則大義之事不皆合也云必瓦合者亦君子爲道不逺人者言儒者必湏瓦合爲屈已同凡亦是君子爲道不逺離於人與常人小合若破圭角與瓦之相合故云不逺人也皇氏云毀巳之圭角與瓦礫而相合義亦通也儒有内稱至此者此明儒者舉賢能之事儒有内稱不辟親者稱舉也不辟親舉人以理若祁奚舉子祁午是不辟親外舉不辟怨者若祁奚舉讎人解狐也案襄三年左傳云祁奚請老致仕晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可稱其讎不爲諂立其子不爲比但審知其賢故不辟也程功積事推賢而進達之舊至此絶句皇氏以達之連下爲句言儒者欲舉人之時必程效其功積累其事知其事堪可乃推而進達之不妄舉人也不望其報者言雖進達賢人於君不求望其報也君得其志苟利國家不求富貴者君得其志者謂君任此儒者輔助其君使君得其志意所欲皆成此儒者推賢達士無所求爲唯苟在利益國家不於身上自求富貴也其舉賢援能有如此者言儒者進逹引能有如此在上諸事也儒有聞善至此者此明儒者舉任同類之屬前經舉賢援能謂䟽逺者此經任舉謂親近者也爵位相先也者相先謂相讓言儒者見爵位之事必先相推讓於朋友也患難相死也儒者有患難相爲致死也乆相待也者謂朋友乆在下位不升已則待之而乃進也逺相致也者謂已得明君而仕朋友在小國不同得志則相招致共仕明君也其任舉有如此者謂朋友更相委毀之也其特立獨行有如此者言獨能特立獨有此行如此所云之事也前第五儒旣明特立此又云特立獨行者前云特立但明一身勇武不論行之所爲此經所云非但身所特立又獨有此行爲獨行故更言特立也注麤猶至志也正義曰麤猶䟽也微也君不知已有善言正行者釋經文上不知也云則觀色縁事而微翹發其意使知之者釋經麤而翹之也云又必舒而脫脫焉已爲之疾則君納之速君納之速怪妬所由生也者釋經又不急爲也若納已言速疾則被衆人所怪妬所由生也云丗治不輕不以賢者並衆不自重愛也者言凡人之情見衆人無知已之獨賢則盡心用力若衆人皆賢或自替廢儒者不以如此恒自重愛也儒有上不臣天子至此者此明儒者志操規爲之事上不臣天子伯夷叔齊是也下不事諸侯長沮桀溺是也愼靜而寛者旣愼而靜所尚寛緩也強毅以與人者若有人與已辨言行而彼人道不正則已不苟屈從之是用剛毅以與人也愽學以知服者謂廣愽學問猶知服畏先代賢人言不以已之愽學凌跨前賢也近文章砥厲廉隅者言儒者習近文章以自磨厲使已廉隅也雖分國如錙銖者言君雖分國以禄之視之輕如錙銖不貴重也不臣不仕者謂不與人爲臣不求仕官但自規度所爲之事而行故云其規爲有如此者也注強毅至日錙正義曰強毅以與人彼來辨言行而不正不苟屈以順之也者解經強毅以與人之事謂彼人來至與巳辨爭言行而彼人爲道不正巳則不苟且屈橈以順從之云不用已之知勝於先丗賢知之所言也者解經愽學以知服謂不用已之所知勝於先丗賢知者之所言服從之也云八兩曰錙者案筭法十黍爲參十參爲銖二十四銖爲兩八兩爲錙儒有合志至此者此明儒者與人交友之事合志同方者方猶法也言儒者與交友合齊志意而同於法則也營道同術者謂經營道藝同齊於術同術則同方也但合志同方據所懷志意也營道同術據所習道藝也並立則樂者謂與知友並齊而立俱同仕官則歡樂也相下不厭者謂遞相卑下不厭賤也乆不相見聞流言不信者雖有朋友乆不相見聞流謗之言欲譖毀朋友則巳不信其言也其行本方亡義者庾氏言其行所本必方正所立必存義也同而進不同而退者謂朋友所爲與已同則進而從之若不與已同則退而避之其交友有如此者言其結交爲朋友有如此在上諸事也自此以上凡有十五儒所陳之事亦有前後乖異者此上經云不臣不仕第一儒云席上之珍以待聘夙夜強學以待問懷忠信以待舉力行以待取則有仕官之志也第十儒云寛𥙿第六儒云剛毅與寛𥙿亦别也第三儒云愛其死養其身備豫禍患第五儒云劫之以衆沮之以兵見死不更其守亦不同也如此儒之乖違上下不一略舉一二言也所以如此不同者言儒包百行事非一揆量事制冝隨機而發當其剛毅之節則守死不移論其營養之道則寛而容衆逢有道之丗則進而事君遇無道之時則退而不仕且賢有優劣儒有大小大儒則理包百行小儒則或偏守一邊所以尚書皐陶九德不一德多則爲天子諸侯德少則爲大大卿士苟逹於此儒行亦然雖或不同無所怪也温良者仁之本至此者此明聖人之儒兼上十五儒之行亦是孔子嫌其斥已假言仁者之儒以得富貴不歡喜失節不慁君王者慁辱也言不見慁辱於君王而違道也不累長上者累猶係也長上謂卿大夫言不以累係於長上而失志也不閔有司者閔病也有司謂羣吏言儒者不以困病於有司而失常謂不以羣吏所困迫注閔病至自謂正義曰閔病也釋詁文云不爲天子諸侯卿大夫羣吏所困迫而違道者言天子諸侯解經君王也云卿大夫解經長上也羣吏解經有司也案史記孔子丗家云在魯哀公不用在齊犂鉏所毀入楚子西所譛適晉趙欲害伐樹於宋削跡於衞畏匡厄陳則身𬒳辱累多矣鄭以其如此故釋云不以慁累閔病而違道云孔子自謂也鄭知者以此一儒在衆儒之末聖人儒後特更說此一條事與孔子相㑹故知孔子自謂也今衆人之命儒也妄常者此一節明孔子說儒旣畢遂言今丗賤儒以譏哀公也命名也妄無也言今丗衆人名之爲儒者無復常人遭人則謂之爲儒以儒相詬病者詬病猶耻辱也言今丗以命之爲儒是相恥辱時丗如此故哀公輕儒也注以儒靳故相戲正義曰在魯莊公十一年宋人戰於乘丘長萬爲魯所獲宋人請之魯人歸之宋公靳之長萬宋大夫也曰始吾敬子今子魯囚也吾不敬子矣長萬病之後弑閔公杜云戲而相愧曰靳孔子至舎哀公館之聞此言也此經明孔子自衞反魯歸至其家哀公就而舘之聞孔子之言遂敬於儒也言加信行加義者是記所録也終没吾丗不敢以儒爲戲者是哀公之言記者述而録之注儒行至服正義曰儒行之作蓋孔子自衞初反魯時也案左傳哀十一年冬衞孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則甞學之矣甲兵之事未之聞也退命駕而行文子遽止之將止魯人以幣召之孔子乃歸以傳文無館事故鄭稱蓋以疑之也云不敢以儒爲戲當時服者以哀公終竟不能用孔子故孔子卒哀公誄之傳云生不能用死而誄之非禮也是終竟輕儒此云不敢以儒爲戯是當時蹔服非乆也大學第四十二正義曰案鄭目録云名曰大學者以其記愽學可以爲政也此於别録屬通論此大學之篇論學成之事能治其國章明其德於天下却本明德所由先從誠意爲始大學至道矣正義曰此經大學之道在於明明德在於親民在止於至善積德而行則近於道也在明明德者言大學之道在於章明巳之光明之德謂身有明德而更章顯之此其一也在親民者言大學之道在於親愛於民是其二也在止於至善者言大學之道在止處於至善之行此其三也言大學之道在於此三事矣知止而后有定者更覆說止於至善之事旣知止於至善而後心能有定不有差貳也定而后能靜者心定無欲故能靜不躁求也靜而后能安者以靜故情性安和也安而后能慮者情旣安和能思慮於事也慮而后能得者旣能思慮然後於事得冝也物有本末事有終始者若於事得冝而天下萬物有本有末經營百事有終有始也知所先後者旣能如此天下有事萬物皆識知其先後也則近道矣者若能行此諸事則附近於大道矣古之欲明明德於天下者前章言大學之道在明德親民止善覆說止善之事旣畢故此經明明德之理先治其國者此以積學能爲明德盛極之事以漸到今本其初故言欲章明巳之明德使徧於天下者先湏能治其國欲治其國者先齊其家也欲齊其家者先脩其身言若欲齊家先湏脩身也欲脩其身者先正其心言若欲脩身必先正其心也欲正其心者先誠其意者揔包萬慮謂之爲心情所憶念謂之意若欲正其心使無傾邪必湏先至誠在於憶念也若能誠實其意則心不傾邪也欲誠其意者先致其知者言欲精誠其已意先湏招致其所知之事言初始必湏學習然後乃能有所知曉其成敗故云先致其知也致知在格物此經明初以致知積漸而大至明德前經從盛以本𥘉此經從初以至盛上下相結也致知在格物者言若能學習招致所知格來也已有所知則能在於來物若知善深則來善物知惡深則來惡物言善事隨人行善而來應之惡事隨人行惡亦來應之言善惡之來縁人所好也物格而后知至者物旣來則知其善惡所至善事來則知其至於善若惡事來則知其至於惡旣能知至則行善不行惡也知至而后意誠旣能知至則意念精誠也意誠而后心正者意能精誠故能心正也國治而后天下平者則上明明德於天下是以自天子至庶人皆然也壹是皆以脩身爲本者言上從天子下至庶人貴賤雖異所行此者專壹以脩身爲本上言誠意正心齊家治國今此獨云脩身爲本者細則雖異其大略皆是脩身也其本亂而末治者否矣本亂謂身不脩也末治謂國家治也言已身旣不脩而望家國治者否矣否不也言不有此事也其所厚者薄而其所薄者厚未之有也者此覆說本亂而末治否矣之事也譬若與人交接應湏敦厚以加於人今所厚之處乃以輕薄謂以輕薄待彼人也其所薄者厚謂已旣與彼輕薄欲望所薄之處以厚重報己未有此事也言已以厚施人人亦厚以報已也若已輕薄施人人亦輕薄報巳言事厚之與薄皆以身爲本也此謂知本此謂知之至也者本謂身也旣以身爲本若能自知其身是知本也是知之至極也所謂誠其意者自此以下至此謂知本廣明誠意之事此一節明誠意之本湏愼其獨也母自欺也言欲精誠其意無自欺誑於身言於身必湏誠實也如惡惡臭者謂臭穢之氣謂見此惡事人嫌惡之如人嫌臭穢之氣心實嫌之口不可道矣如好好色者謂見此善事而愛好之如似人好色心實好之口不可道矣言誠其意者見彼好事惡事當湏實好惡之不言而自見不可外貌詐作好惡而内心實不好惡也皆湏誠實矣此之謂自謙者謙讀如慊慊然安靜之貌心雖好惡而口不言應自然安靜也見君子而后厭然揜其不善而著其善者謂小人獨居無所不爲見君子而後乃厭然閇藏其不善之事宣著所行善事也人之視已如見其肺肝然則何益矣者言小人爲惡外人視之昭然明察矣如見肺肝雖蹔時揜藏言何益矣此謂誠於中形於外者言此小人旣懷誠實惡事於中心必形見於外不可揜藏注謙讀爲慊正義曰以經義之理言作謙退之字旣無謙退之事故讀爲慊慊不滿之貌故又讀爲厭厭自安靜也云厭讀爲黶黶爲黒色如爲閇藏貌也曽子曰十目所視者此經明君子脩身外人所視不可不誠其意作記之人引曾子之言以證之十目所視十手所指者言所指視者衆也十目謂十人之目十手謂十人之手也其嚴乎者旣視者及指者皆衆其所畏敬可嚴憚乎富潤屋德潤身者言此二句爲喻也言家若富則能潤其屋有金玉又華飾見於外也德潤身者謂德能霑潤其身使身有光榮見於外也心廣體胖者言内心寛廣則外體胖大言爲之於中必形見於外也故君子必誠其意者以有内見於外必湏精誠其意在内心不可虚也詩云瞻彼淇澳者此一經廣明誠意之事故引詩言學問自新顔色威儀之事以證誠意之道也瞻彼淇澳菉竹猗猗者此詩衞風淇奥之篇衞人美武公之德也澳隈也菉王芻也竹萹竹也視彼淇水之隈曲之内生此菉之與竹猗猗然而茂盛以淇水浸潤故也言視彼衞朝之内上有武公之身道德茂盛亦蒙康叔之餘烈故也引之者證誠意之道有斐君子者有斐然文章之君子學問之益矣如切如磋者如骨之切如象之磋又能自脩也如琢如磨者如玉之琢如石之磨也瑟兮僴兮赫兮喧兮有斐君子終不可諠兮者又瑟然顔色矜莊僴然性行寛大赫然顔色盛美喧然威儀宣美斐然文章之君子民皆愛念之終乆不可忘也諠忘也自此以上詩之本文也自此以下記者引爾唯而釋之如切如磋者道學也者論道其學矣如琢如磨者自脩也者謂自脩飾矣言初習謂之學重習謂之脩亦謂詩本文互而相通也瑟兮僴兮者恂慄也者恂讀爲峻言顔色嚴峻戰慄也道盛德至善民之不能忘也謂善稱也有斐君子終不可諠兮論道武公盛德至極美善人之愛念不能忘也注此心至著也正義曰諠忘也釋訓文也云道猶言也謂經中道盛德至善恐爲道德之道故云道猶言也云恂字或作峻讀如嚴峻之峻者以經之恂字他本或作峻字故讀爲嚴峻之峻詩箋云還爲恂也此記爲赫兮喧兮詩經云赫兮咺兮本不同也云以其意誠而德著也以武公用意精誠德著於人人不忘也以經廣明誠意之事故鄭云意誠而德著也詩云於戲前王不忘者此一經廣明誠意之事此周頌烈文之篇也美武王之詩於戲猶言嗚呼矣以文王武王意誠於天下故詩人嘆美之云此前丗之王其德不可忘也君子賢其賢而親其親者言後丗貴重之言君子皆美此前王能賢其賢人而親其族親也小人樂其樂而利其利者言後丗卑賤小人美此前王能愛樂其所樂謂民之所樂者前王亦愛樂之利其利者能利益其人之所利民爲利者前王示利益之言前王施爲政敎下順人情不奪人之所樂利之事故云小人樂其樂而利其利也此以没世不忘也由前王意能精誠垂於後世故君子小人皆所美念以此之故終没於丗其德不忘也康誥曰克明德者此一經廣明意誠則能明巳之德周公封康叔而作康誥戒康叔能明用有德此記之意言周公戒康叔以自明其德與尚書異也大甲曰顧諟天之明命者顧念也諟正也伊尹戒大甲云爾爲君當顧念奉正天之顯明之命不邪僻也帝典曰克明峻德者帝典謂堯典之篇峻大也尚書之意言堯能明用賢俊之德此記之意言堯能自明大德也皆自明也此經所云康誥大甲帝典等之文皆是人君自明其德也故云皆自明也注皆自明明德也正義曰明明德必先誠其意此經誠意之章由初誠意也故人先能明已之明德也湯之盤銘此一經廣明誠意之事湯之盤銘者湯沐浴之盤而刻銘爲戒必於沐浴之者戒之甚也苟曰新者此盤銘辭也非唯洗沐自新苟誠也誠使道德日益新也日日新者言非唯一日之新當使日日益新又曰新者言非唯日日益新又湏恒常日新皆是丁寧之辭也此謂精誠其意脩德無巳也康誥曰作新民者成王旣伐管叔蔡叔以殷餘民封康叔誥言殷人化紂惡俗使之變改爲新人此記之意自念其德爲新民也詩曰周雖舊邦其命惟新者此大雅文王之篇其詩之本意言周雖舊是諸侯之邦其受天之命唯爲天子而更新也此記之意其所施敎命唯能念德而自新也是故君子無所不用其極者極盡也言君子欲日新其德無處不用其心盡力也言自新之道唯在盡其心力更無餘行也詩云邦畿千里惟民所止此一經廣明誠意之事言誠意在於所止故上云大學之道在於至善此商頌玄鳥之篇言殷之邦畿方千里唯人所居止此記斷章喻其民人而擇所止言人君賢則來也詩云緡蠻黃鳥止于丘隅者此詩小雅緡蠻之篇刺幽王之詩言緡蠻然微小之黃鳥止在於岑蔚丘隅之處得其所止以言微小之臣依託大臣亦得其所也子曰於止知其所止者孔子見其詩文而論之云是觀於鳥之所止則人亦知其所止鳥之知在岑蔚安間之處則知人亦擇禮義樂土之處而居止也可以人而不如鳥乎者豈可以人不擇止處不如鳥乎言不可不如鳥也故論語云里仁爲美擇不處仁焉得知是也詩云穆穆文王於緝熙敬止者此大雅文王之篇美文王之詩緝熙謂光明也止辭也詩之本意云文王見此光明之人則恭敬之此記之意於緝熙言嗚呼文王之德緝熙光明又能敬其所止以自居處也注鳥擇岑蔚安間而止處正義曰岑謂巖險蔚謂草不蓊蔚言鳥之所止必擇靜宻之處也禮記正義卷第六十六
