  text: 禮記正義卷第六十三
  hash: sha256:fe475131590e539ed04de88a301dc811c97d78a99c596d0e005ec1ccfa6c3206
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0061_SBCK_001-1a}
body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔穎達等奉勑撰子日至唯終正義曰此一節明在下羣臣無問大小皆須恭敬謹愼又君無以小臣而謀大事也大臣不親百姓不寧則忠敬不足富貴巳過也者沈氏云謂大臣離二不與上相親政教煩苛故百姓不寧若其如此臣不忠於君君不敬於臣是忠敬不足所以致然也由君與臣富貴己過極也大臣不治而邇臣比矣者大臣不肯為君理治職事由邇近之臣與上相親比故也邇臣不可不愼也是民之道也者邇近也言親近之臣不可不愼擇其人道謂道路言邇臣是民之道路邇臣好則人從之好邇臣惡則人從之惡也君母以小謀大者言君無得與小臣而謀大臣之事也母以逺言近者無得以逺臣共言近臣之事也母以內圖外者無得以內臣共圖謀外臣之事所以然者小大之臣意殊逺近之臣不同恐各為朋黨彼此交爭轉相陷害故不圖謀也則大臣不臣不疾而逺臣不蔽矣者若能如此則外內情通小大意合大怨恨於君也疾猶非也近臣不為人所非毀而逺臣不被障蔽故也葉公之顧命曰母以小謀敗大作者此葉公顧命之書無用小臣之謀敗損大臣之作母以嬖御人疾莊后者莊后謂齊莊之后是適夫人也無得以嬖御賤人之為非毀於適夫人母以嬖御士疾莊士者言母得以嬖御之士非毀齊莊之士大夫卿士者覆説言莊士即大夫卿之典事者士事也注言近以見逺言大以見小互言之正義曰言近以見逺謂言近臣親比則逺臣不親比云言大以見小謂大臣不治小臣治也故云互言之也注大臣至陷害正義曰由大臣執㩲於外小臣執命於內或大臣忌小臣或小臣忌大臣所以內外交爭若共圖謀轉相陷害故所謀之事各於其黨與大臣謀大臣與小臣謀小臣是各於其黨中知其過失審悉也注葉公楚縣公葉公子髙也正義曰知葉公子髙者左傳云丗本文云臨死遺書曰顧命者約尚書顧命之篇子曰至由聖正義曰此節明君不信用臣也不親其所賢而信其所賤者謂在上親任其所賢有德之人而信用其所賤無德者民是以親失者言以此化民民效於上失其所當親惟親愛羣小也而教是以煩者言羣小被親既無一德政教所以煩亂也詩云彼求我則如不我得此詩小雅正月之篇刺幽王之詩言彼幽王初求我賢人如不得於我言禮命煩多也執我仇仇亦不我力者既得賢人執留我仇仇然不堅固亦不於我上以力而用我引之者證不親其所賢也君陳曰未見聖若已弗克見既見聖亦不克由聖者此尚書君陳篇成王戒君陳之辭也言凡人未見聖道之時如似已不能見既見聖道亦不能用之也子曰至惟終正義曰此一節戒愼言之事小人溺於水者謂卑賤小人居近川澤者愛玩於水溺覆沒也多為水所覆沒故云小人溺於水君子溺於口者言卿大夫之君子以口傷人而致怨恨遂被覆沒亦如溺於水不能自治也大人溺於民者大人謂人君也由君在上陵虐下民則人衆離叛君無所尊故溺於民也皆在其所褻也者言小人君子大人等所以被沒溺者皆在於褻慢而不能敬愼故夫水近于人而溺人所若逺於民則人不沒溺伹由水近人則人得用之沐浴而日日狎習不復畏懼或泳之或遊之無有誡忌至於洪波浪起亦猶習以為常故致覆溺也德易狎而難親也易以溺人者德易狎者言有德之人初時學其近者淺者謂言可得是易可親狎至大者逺者莫測其理是難可親也初時易狎是易也終則難親是溺人也故云易以溺人也口費而煩易出難悔易以溺人者説德既竟此還釋溺口所由費惠也口虛出言而無實從之是口惠也口惠不難失在煩數故云而煩也無以實言是易出也一出言駟馬追之不及是難悔必為物所憾所以有禍口費易出難悔被害是溺人也夫民閉於人而有鄙心者此釋溺民所由也言下民之情常自閉塞不通人道故云閉於人也而用心鄙詐故云有鄙心可敬不可慢易以溺人者既閉塞人道而有鄙詐卒難告喻故人君當敬以臨之庶其漸染若又陵慢則必怨畔則國無民君道便喪溺也民處卑下易可褻慢終致怨畔是溺人也大甲曰母越厥命以自覆也者伊尹戒大甲之辭言無得顚越其教命以自覆敗也若虞機張者虞謂虞人機謂弩牙言為政之道如虞人射獸先弩牙以張也往省括于厥度則釋者謂已心往機間省視箭括當於所射之度乃釋弦而發矢故云則釋言為政之道政教已陳當以已心省此所施政教合於羣下然後乃施之也兊命曰惟口起羞惟甲胄起兵者此尚書篇名傅説戒髙宗之辭口為榮辱之主若出言不當則被人所賤故起羞辱也甲胄罰罪之器若所罰不當反被兵戎所害故甲胄起兵也惟衣裳在笥惟干戈省厥躬者衣裳在篋笥當服之以行禮不可妄與於人惟所施干戈之事當自省已身不可妄加無罪浪以害人大甲曰天作孽可違也者若水旱災荒自然而有非由人失所致故云天作孽亦可徙移辟災是可違也自作孽不可以逭者已自作禍物皆怨恨所在而致禍害故不可逃也尹吉曰惟尹躬天見干西邑夏者吉當為告天當為先言伊尹告大甲云伊尹身之先祖見西方夏邑之君謂禹也夏都在亳西故云西邑也自周有終相亦惟終者周謂忠信言夏之先君有能則是安邑亦在亳西也子曰至曰怨正義曰此論君人相須言養人之道不可不愼也詩云昔吾有先正其言明且清者此逸詩也正長也詩人稱昔吾之有先君正長其教令之言分明且淸潔國家所以安也都邑所以成也庶人所以生也誰能秉國成不自為正卒勞百姓者卒盡也言詩人傷今無復有先正之賢故云今日誰能執國之八成又當謙退之不自為正者得其正道能用仁恩盡勞來百姓言今無復有如此之人疾時大臣唯專功爭美各自為是也君雅曰夏日暑雨小民惟曰怨者此穆王命君牙之辭也言民心難稱所怨恆多夏日暑熱及雨天之常道細小之人惟曰怨也資冬祁寒小民亦惟曰怨者至於冬曰是大寒之時小人亦惟曰怨猶言君政雖曰得當人怨之不已是治民難也注成邦之八成也正義曰案周禮小宰職云掌以官府之八成經邦治一曰聽政役以比居二曰聽師田以簡稽三曰聽閭里以版圖四曰聽稱責以傅别五曰聽祿位以禮命六曰聽取豫以書契七曰聽賣買以質劑八曰德出入以要會皆事品式以聽治於道須齊一也子曰至好仇正義曰此一節明其朋匹之事君子能好其正者匹匹偶言君子能愛好其朋友匹偶以下云君子好仇故知此正為匹也故君子之朋友有鄉其惡有方者言鄉方皆猶輩類也言君子所親朋友及所惡之人皆有輩類言君子善者則為朋友也既好惡不同故君子之交可者與之不以榮枯為異是朋友不善者則可憎惡之言有常也若小人唯利是求所善所惡無恆定也是故邇者不惑而逺者不疑也由好惡有定可望貌而知故近者不惑逺者不疑也詩云君子好仇者此周南關睢之篇詩意云窈窕淑女君子好仇此則斷章云君子之人以好人為匹也子曰至威儀正義曰此一節明交友之道唯善是仇以威儀相攝佐也則好賢不堅而惡惡不著也者以賢而貧賤則輕絶之是好賢不堅惡而富貴則重絶之則惡惡不著也如此者是貪利之人故云雖曰不利吾不信也詩云朋友攸攝攝以威儀者此大雅既醉之篇美成王之告大平之詩於時朋友羣臣所以禮義相攝佐之時以威儀也言以賤而求利者注衣或在內新時不見正義曰以經云苟有其車必見其載苟有其衣當言必見其著今乃云必見其敝以衣初新著時或在內裏人不見也其敝破棄時乃始見故云必見其敝子曰至厥躬正義曰此一節明重言行之事言從而行之則言不可飾也者從隨也謂言在於先而後隨以行之言當須實不可虛飾也行從而言之則行不可飾也者謂行在於前言隨於後論説於行則行當須先實不可虛飾也故君子寡言而行以成其信者以其言行相副之故君子當顧言而行以成其信也則民不得大其美而小其惡者必須以行為驗不用虛辭為此之故則人不得虛增大其美事而減小其惡事由美惡大小皆驗於行也詩云白圭之玷尚可磨也此大雅抑之篇刺厲王之詩也白圭之玉玷缺尚可磨而平之此言語玷缺不可為而改之是無如之何也小雅曰允也君子展也大成者此詩小雅車攻之篇美宣王之詩也允信也言信實矣君子謂宣展誠也誠實矣而大成大平也引之者言信為本君奭曰昔在帝者此周公君奭辭也帝往昔之時在上天也後得古文而禮家又貪其説因合於禮記耳奔喪禮屬凶禮也鄭云逸禮者漢書藝文志云漢興始於魯淹中得古禮五十七篇其十七篇與今儀禮正同其餘四十篇藏在祕府謂之逸禮其投壷禮亦此類也又六藝論云漢興髙堂生得禮十七篇後孔子壁中得古文禮五十七篇其十七篇與前同而字多異以此言之則此奔喪禮十七篇外既謂之逸何以下文鄭注又引逸奔喪禮似此奔喪禮外更有逸禮者但此奔喪禮對十七篇為逸禮內録入於記其不入於記者又比此為逸也故二逸不同其實秖是一篇也此奔喪一篇兼天子諸侯然以士為主故鄭下文注云未成服者素委貌是士之所服故知以士為主也奔喪至盡哀正義曰此一篇揔明奔五服之喪也從始聞至於喪所成服之節今各隨文解之此一節論初聞之節五服皆然故鄭注云雖非父母聞喪而哭其禮亦然鄭必知五服皆然者以下文云日行百里不以夜行唯父母之喪見星而行别云唯父母則知以前兼五服也行至竟哭正義曰此一節奔喪在路至其國竟奔赴之淂則成報而為之拜賔此既親拜賔故知主人也此謂奔父之喪若母之喪又哭則免此下文云又哭括髮袒故知為父也此謂未成服也故下云三日成服襲絰于序東者謂在堂下當序牆之東非謂堂上之序東也送賔皆如初者謂前送賔畢而反位後送賔亦畢而反位故云皆如初也於又哭括髮祖成踊於三哭猶括髮袒成踊者括髮袒皆在堂上殯東西面成踊則在堂下之東西面位也三日成服拜賔送賔皆如𥘉者謂於堂下之東拜賔成踊送賔反位故云皆如𥘉也注未成服者素委貌深衣正義曰知素委貌深衣者案曽子問篇云壻親迎女在塗遭喪女改服布深衣縞總女人之縞總似男子之素冠故知布深衣素冠又小記云逺葬者比反哭者皆冠及郊而后免明知在路皆冠也此素委貌謂士庶人若大夫巳上則素辨也注云巳殯者位在下正義曰案士喪禮小斂訖降自西階即位故知殯畢位在下小斂之後未殯之前雖降在堂下仍更升堂至既殯之後則長在阼階之下故云既殯位在下也注襲服至哭踊正義曰云不於又哭乃絰者案士喪禮奉于堂降踊喪東髽即位與主人拾踊注云拾更也主人與之更踊賔客之是待婦人為賔客禮以婦人外成適他族故也雖以賔客待之亦為異於賔客之禮故雜記云婦人奔喪入自闈門升自側階注入自闈門升自側階異於女賔若女賔則喪大記篇云寄公夫人入自大門今此入闈門是異於女賔以婦人雖是外成以奔夫屬不得全同女賔故也奔母至括髮正義曰此一經論奔母之喪節也此謂適子故經云拜賔送賔皆如奔父之禮若庶子則亦主人為之拜賔送賔注為母於又哭而免輕於為父也正義曰此文又哭不括髮與喪服小記篇云又哭而免其理雖同其日則異於喪服小記據在家小斂之後又哭之時不括髮而免也此則從外奔喪至內乃不括髮而免也婦人至拾踊正義曰此婦人奔喪之禮也注婦人至客之正義曰婦人入者由闈門知入自闈門者雜記篇文以諸侯夫人奔喪入自闈門明卿大夫以下婦人皆從闈門入也闈門謂東邊之門云髽於東序者以男子之免在東序故知婦人亦髽於東序就掩映之處在堂上也男子則堂下也云升自東東面之階故雜記云升自側階云不髽於房變於在室者熊氏云未殯之前婦人髽於室故士喪禮云婦人髽于室若既殯之後室中是神之所處婦人在堂當髽於東房今此婦人始來奔喪故髽於東序耳此文據天子諸侯之禮案大記云婦人髽帶麻于房中注云天子諸侯之禮房中則西房也云去纚大介曰髽者鄭注士喪禮云髽之異於髺髮者既去纚而以髮為大紒如今婦人露紒其象也奔喪至之禮正義曰此一節論既葬之後奔父母之喪禮主人之待之也即位於墓左婦人墓右者主人謂先在家者非謂適子也此奔喪者身是適子故經云拜賔反位成踊若非適子則不得拜賔也三日成服於五哭相者告事畢者三日成服謂來奔喪日後三日通奔日則為四日於此日成服則五哭矣相者告事畢謂成服之日為四哭成服明日之朝為五哭此謂既葬巳後而來歸故唯五哭相者告事畢不復哭也注主人至事也正義曰鄭注嫌經云主人是適子故云主人謂在家者必知然者以奔喪者親自拜賔是奔喪者身為主人不得待者為主人故云謂在家者也云哭於墓為父母則袒者以下文云除喪而后歸則之墓哭成踊東括髮袒除喪畢尚括髮袒明葬後歸為父母袒可知也云告事畢者於此後無事也釋所以墓所初哭成踊則告事畢者以墓所既括髮絰絞帶拜賔之後於此墓所更無事也注又哭至五哭正義曰又哭三哭不袒者哀戚已久殺之也今經云又哭三哭但云括髮不云袒者既葬巳後哀情稍殺故也云成服之朝為四哭者以初至象始死為一哭明日象小斂為二哭又明日象大斂為三哭又明日成服之日為四哭又明日為五哭皆數朝哭不數夕哭故為五也云此謂既期乃後歸至者也若其未期之前在家者猶朝夕哭則知奔喪者亦朝夕哭今云五哭相者告事畢明是既期已後朔望朝哭而已故鄭云其未期猶朝夕哭不止於五哭也注一括至者同正義曰一括髮謂歸入門哭時者鄭恐一括髮是墓所括髮入門則不括髮故明之云一括髮謂入門哭時者謂以筵几在堂不應入門遂不括髮故云謂入門時也云於此乃言為母異於父者明及殯不及殯其異者同釋為母異於父應從上文及賔奔母之喪而言之人及不及殯後始言為母異於父之意若及殯則言異於父恐不殯若不及殯處而言之則及殯之處灼然可知是舉後揔明前也故云明及殯不及殯其異者同謂及殯一括髮不及殯亦一括髮是異於父者其事同也齊衰至事畢正義曰此一節明既葬之後奔齊衰以下喪禮但齊衰以下有大功小功緦麻日月多少不同若奔在葬後而三月之外大功以上則有免麻東方三日成服若小功緦麻之喪則不得有三日成服小功以下不稅無追服之理若葬後通葬前未滿五月小功則亦三日成服其緦麻之喪止臨喪節而來亦得三日成服也東即位拜賔成踊者東即位謂奔喪者於東方就哭位拜賔謂主人代之拜賔成踊謂奔喪者於主人拜賔之時而成踊凡言成踊每一節有三踊凡三節九踊乃謂之成也注不言袒言襲者容齊衰親者或袒可正義曰今案經文直言免麻于東方即位不稱袒而下云成踊襲下既稱襲則有袒理經若言袒恐齊衰以下皆袒故不得揔言袒也經稱襲者容有齊衰重為之得襲故言襲注為父至字也正義曰知為父於又哭括髮而不袒者案上文為父不及殯歸入門左北面哭盡哀括髮袒下文云相者告就次於又哭括髮成踊不言袒是為父於又哭括髮而不袒也云又哭三哭皆言袒袒衍字也者今齊衰以下之喪經文於又哭三哭乃更言袒輕喪而袒非其冝故知經之袒衍餘之字也聞喪至如初正義曰此一節明聞喪不得奔於所聞之處發喪成服之禮聞喪不得奔者謂以君命有事其事未了故不得奔喪也乃為位者謂以君命使故得為位如朝夕哭位矣襲絰綾帶即位者於此聞喪之日覆哭踊畢襲所袒之衣著首絰絞帶之垂即東方之位三日成服於五哭拜賔送賔如初者三日成服通數聞喪為四日五哭謂成服之明日哭也於此哭時有賔來即拜而迎之去即送之皆如初於五哭訖亦可以止者也不云相者告事畢禮文略也注聞父至可也正義曰知聞父母喪而不得奔謂以君命有事者若非君命有事則不得為位當須速奔今乃為位故知以君命有事也云不於又哭乃絰者喪至此踰曰節於是可也者不於又哭謂不於明日之又哭此經云又哭謂當日之中對初聞喪之哭乃為又哭哭後乃帶與明日又哭別也初聞喪象又哭象小斂時也士喪禮云小斂乃絰則此亦當又哭乃絰今於聞喪之日即絰帶者以喪至此赴者至踰其日節故於是聞喪之日可加絰帶也注其在至以止正義曰在官謂在官府館舍館舍是賔之所專有由館舍之中而作廬故知禮畢亦告就次云言五哭者以迫公事五日哀殺亦可以止者此經唯云五哭不云哀止知可以止者若成服之後恆常有哭何須特云五哭之文明五哭之後不復朝夕有哭故以五哭斷之若除至不踊正義曰此一節明除服之後奔父母喪節則之墓哭成踊者亦謂主人適子初在墓南北面哭成踊乃來就主人之位括髮袒也主人之待之也無變於服者主人亦謂在家者無變於服謂著平常之吉服不踊者以在家者其服已除哀情以殺故不踊也注東東至而歸正義曰以東方是主人之位經云東故云即主人之位云如不及殯者也以上文奔父母之喪不及殯先之墓北面哭下云東即主人之位除喪之後奔其位如不及殯之時云遂除於墓而歸者以經云遂除於家不哭鄭恐來至家始除服故明之云遂除謂墓所遂除服至於家不復哭也自齊至免麻正義曰此一節明齊衰以下除服之後奔喪之節唯著免麻不括髮墓所哭罷即除此免麻者當謂至緦麻也凡為至而往正義曰此一節明齊衰以下不得往奔則於所聞之處為位及免絰成服之禮三日五哭者謂初聞喪為一哭明日朝夕二哭又明日朝夕二哭揔為五哭所以三日為五哭者為急欲奔喪以已之私事須營早了故三日而五哭止也注謂無至乃行正義曰已聞齊衰以下之喪既不銜君事又無私事故可得早奔唯以已之私事未得奔者必知無君事者若銜君命於事為重唯父母之喪乃敢顯然為鄼列之位今若銜君使命聞齊衰以下輕喪不敢以私害公不敢顯然為位此言為位故知無君命自以私事未得奔者云齊衰以下更為位而哭皆可行乃行者齊衰以下於聞喪之處巳哭哭罷更為位而哭可行即行以齊衰以下皆然故云皆也注數朝至之正義曰前云三日成服於五哭皆數朝哭五日而五哭唯三日數夕哭為五哭者前文三日五哭成服之後乃云五哭故數成服後日之哭乃為五此三日五哭是三日之內為五哭故數夕哭為五哭經文不同故鄭注亦異云亦明日乃成服者鄭恐三日為五哭恐數聞喪三日亦成服故云明日乃成服以成服必除初聞喪為三日也云凡云五哭者其後有賔亦與之哭而拜之者從上以來四處有五哭之文上兩處於五哭之下無拜賔送賔之事下兩處五哭之文雖有拜賔送賔恐與上有異故鄭揔明之云凡云五哭者其後有賔亦與之哭而拜之揔結於上也注外喪緩而道逺成服乃行容待齎也正義曰以外喪恩輕故哀情緩也道路又逺容待齎持賵贈之物故成服乃去也齊衰至而哭正義曰此一節明奔喪所至之處哭泣之禮案雜記云大功望鄉而哭此云望門而哭者雜記所云者謂本齊衰喪者降服大功哭父至張帷正義曰此一節明無服之親聞喪所哭之處案檀弓云師吾哭諸寢與此異兄弟吾哭諸廟與此同朋友哭諸寢門外與此同其不同者熊氏云檀弓所云殷禮也此所云周法也此哭父黨於廟而檀弓云有殯聞逺兄弟之喪哭於側室若無殯則在寢與此不同者異代禮也此母黨在寢逸奔喪禮母黨在廟者皇氏云母存則哭於寢母亡則哭於廟熊氏云哭於廟者是親母黨哭於寢者蓋慈母繼母之黨未知孰是故兩存之沈氏云事由父者哭之廟事由己者則哭之寢此師於廟門外者是父之友與為師同故哭之廟義亦通也注一哭而巳則不為位矣正義曰此明諸哭者本是無服故但哭不為位案檀弓云申祥之哭言思與哭嫂同為位者熊氏云異代禮也此文朋友喪將欲奔故哭若朋友巳久雖聞喪則不復哭故檀弓云朋友之墓有宿草而不哭是也注謂哭其舊君不敢拜賔辟為主正義曰知哭舊君者以下文云諸臣在他國為位而哭是於他國為位而哭見事之君則知此是哭諸舊君也注族親昏姻在異國者正義曰此謂與諸侯異姓之昏姻又在他國不與諸侯為臣身又無服故暫為位而哭若與諸侯同姓是五服之內皆服斬也故小記云與諸侯為兄弟者服斬是也若君之姑姊妹之女來嫁於國中者則有服故雜記云諸侯之外宗猶內宗是有服也注謂於至袒也正義曰此謂斬衰以下之喪初聞喪應踊者小功以下應除之後服雖不稅而初聞喪亦免袒而成其踊也以本是五服之親為之變也拜賔則尚左手者於時有賔來弔拜賔之時尚其左手謂左手在尚從吉拜也無服至者麻正義曰此經論哭無服而為位及弔服加麻也及婦人降而無服者麻哭嫂與叔為位并及族姑姊妹女子出嫁於人元是緦麻今降而無服亦當為位哭之加弔服之麻不為之袒免故云無服者麻也注雖無至者麻正義曰以經云無服者麻既無服又云麻故知弔服加麻也麻謂緦之絰也云兄公於弟之妻則不能也者兄公謂夫之兄也於弟之妻則不能為位哭之然則弟婦於夫兄亦不能也兄公於弟妻不服者卑逺之也弟妻於兄公不服者尊絶之也爾雅釋親云婦人謂夫之兄為兄公郭景純云今俗呼兄鍾語之轉耳今此記俗本皆女旁置公轉誤也皇氏並云婦人稱夫之兄為公者須公平尊稱也云凡為其男子服其婦人降而無服者麻者此是亦奔喪禮文言凡為其男子服其婦人降而無服者麻男子謂族伯叔族兄弟之等為其族姑及姊妹既降無服其族姑姊為族伯無服加麻是男之於女女之於男皆無服而加麻故云几為其婦人降而無服者也凡奔至拜之正義曰此經論奔喪大夫士來弔待之節大夫至袒拜之成踊而后襲者謂大夫來至弔此奔喪之士其奔喪者先袒拜之成踊之后然後襲衣尊大夫故先拜而後襲於士襲而後拜之者謂士來弔此奔喪之人其奔喪者初亦袒襲衣之後乃始拜之士卑故先襲而後拜也注主人成踊正義曰此主人謂奔喪者身是士初來奔喪主人括髮於堂上乃降堂而哭於此時大夫至因拜之於東階下不敢成巳踊及襲絰帶之事待拜後始成踊襲絰帶也若士來弔則降堂先成已禮踊襲絰帶之後乃拜之士謂兩士相敵然則與兩大夫相敵則亦襲後乃拜之云或曰大夫後至者袒拜之為之成踊者以此經但云袒拜之成踊其餘經本云大夫後至袒拜之為之成踊與此經文字多少不同故云或曰禮記正義卷第六十三
