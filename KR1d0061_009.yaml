body:
  text: 不言在者案論語云足則吾能徴之矣日是言在也案異義公羊説譏二名謂二字作名若魏万多也説二名者若公子棄疾弑其君即位之復改名居是為二名許謹案云文武时賢臣有𣪚冝生蘓忿生則公羊之説非信左氏義也逮事父母則諱王父母正義曰逮及也王父母謂祖父母也若及事父母則諱祖也何以然孝子聞名心嚁祖是父之所諱則子不敢言既巳經不言父母云而匕言便心瞿憶故諱之也不逮事父母則不諱王父母者若紉少孤不及識父母便淂言之故不諱祖父母也庾云謂父王母之恩正應由父所以連言母者婦事舅姑固事父母旦配夫為體諱敬不朱故糿無父而識母者則可以諱王父母也注此謂庻人也至諱祖耳正義曰云適土以上廟事祖者祭法云適土二廟祖之与祢各為一厝其中土亦庴事祖但祖祢共庴則土喪祀一庴是也能氏云此適土者从巳中土下土對庻人府史亦稱適也大夫之所有公諱正義曰今謂人扵大夫之所正淂避公家之諱是教學惟詩書有誦礼則不誦惟臨文行事若有所諱則並失事正故不諱也厝中不諱者謂有事扵高祖厝祝辤說不為曽以下諱也尊無二也下扵則諱上也若有事扵文則諱巳上也夫人之諱雖質君之前臣不諱者夫人君之妻也質對也夫人本家所諱也臣扵夫人之家恩遠故也婦諱不出門者門婦宮家之諱俚扵婦宫中不言耳若扵宫外則不為諱也故臣對老前不諱也婦親遠扵宫中言避之耳陳鏗問雜記母之諱宫中諱妻之諱不舉扵其側此則与母諱同何也田瓊荅曰雜記方分尊卑故許言之曲礼據不出門大言之耳母諱遠妻諱近則亦冝言也但所避者狹耳諱大功小不諱正義曰古者暮親則為諱也陳鏗問日亦謂為婦乎自巳親乎田瓊荅曰雜記云卒尖而諱王父母兄弟世父母姑姊妹子与父同諱是父所諱齊衰親也然則大㓛小㓛不諱矣熊氐大功亦云諱小㓛不諱若小功与文同諱則亦諱之知者雜記云王父母兄苐世叔父母姑姉妹子与父同諱是父之世叔父母及姑巳下皆為之小㓛父為諱故已從父為之諱也入境而問禁者此不並為敬主人也境堺首也禁謂國中政教所忌也凡至境堺當先訪主國何所禁也入國而问俗者國城城中中即如今國門内也俗謂常所行者入主今城内亦先问風俗常所行也入門而問諱者門主人門也諱主人祖先君名宜先知之欲为避之也門諱而以门为限者主人出至大门外迎客客入門方應交椄故扵门为限也公为敬主人也外事以剛日至踐之正義曰此一莭眀卜筮及用日之法各随文觧之外事以剛曰者外事郊外之事也剛竒日也十日有五竒五偶甲丙戊康剛也外是剛義故用剛日也注順其出為陽至甲午祠兵正義曰以出在郊外故順之用剛日也公羊荘公八年正月師次于郎以待陳人蔡人甲午祠兵傳云祠兵者何出日祠丘何休云礼不徒使故將出必祠兵於近郊此鄭所引直取申午證用剛日事耳其祠之文鄭所不用故異義公羊説以为甲午祠兵左氏說甲午治兵鄭駮之公羊字之誤以治為祠因為作説引周礼四時田獵治兵振振之法是從左氏之說不用公羊事故柔曰正義日事郊内之事也乙丁巳􅉝祭五偶為柔也然則郊天是國外事應用剛而郊特牲云郊用辛非剛也又社稷是郊内應用柔而郊特牲云祭社曰用甲非柔也所以然所以召誥用代者召誥是吿祭非常礼也郊之􅉝者唯謂夏正郊天雩大享眀堂耳圓丘自用至曰五時迎氣各用其𥘉莭之日不公用􅉝凡卜筮者古先聖王所以立卜筮者下云使民所以信時曰敬鬼神决嫌疑定猶豫卜筮必用龜箸案劉向云著之言乆龜千歲而靈蓍耳年而神以其長久故能辯吉㓙也龜蓍能傳神之命以吿人故金縢告大王王季父王云尓之許我乃卜三龜一襲吉是能傳神命也又鄭注天府云卜筮實問於神龜筮能出其卦兆是也案白虎通稱礼三正記曰天子龜一尺三寸諸侯尺大夫八寸二六寸龜隂故偶也其筮案少窂大夫立筮鄭云大夫蓍長五尺推此而言天子九尺諸侯七尺土三尺也所以謂之卜筮者师説云卜覆也以覆審吉㓙筮决也决定其惑劉氏以為卜赴也赴来者之心筮问也問筮者之事赴問互言也案繋辤云定天下之告成凶天下之舋舋莫善于蓍龜又云蓍之徳胤而神非之德方以知神以知来智以蔵住又說非昔者聖人幽賛于神明而生蓍㩀此諸文則著龜知靈相似無長短也所以僖公四羊左傳云筮短龜長不如從長者時公卜取麗姫不告更欲筮之故史蘓𣣔正公之意託云筮短龜長耳其實無優劣也若杜預鄭玄因筮短龜長之言以為實有長短故杜預注傳云物生而有象象而後滋滋而後扵奴龜象筮数故象長數短是也象所以長者以物𥘉生則有象去𥘉既近且苞羅万形故為長也數短者数是終未去𥘉旣遠推尋事数始能求象故為短也又鄭康成注占人云占人亦占筮筮短龜長主於長者是鄭及柱杜公以為龜長筮短也凡卜筮天子諸侯若大事則卜筮並用公先筮後卜故華人云國之大事先筮後卜鄭注云先華後卜即事之漸大事者則太卜云國大貞卜立若卜大封大祭祀凡振凡喪事八命一日征二日象三日与四日諆五曰果六曰至七曰而八曰廖此䓁公為大事也故鄭注占人云将卜八事先以筮筮之是也若次事則准用卜不筮也故表記云天子無筮鄭注云征伐出師若巡狩天子至尊大事公用卜也是天子出行唯卜与民和比七曰筮祠謂筮牲与曰也八曰筮叅謂御与事右也孔曰筮環謂易力可致师也故鄭注占人云不卜而徒筮者則九筮是也天子既尔諸侯亦然故春秋僖廿五年晉卜納襄王得黄帝戰於坂泉之兆又筮之得大有之􅕉襄九年晉卜代宗亦上而𣸪筮是大事卜筮並用也但春秋乱世公先卜後筮不能如礼耳礼既先筮後卜尚書云龜從者以号早言之故先龜也鄭注周礼云筮㓙則正不所以洪􅚘有筮􅊇龜從者雀靈恩云凡卜筮天子公用三代蓍龜若三筮並㓙則正而正不卜鄭所云者是也若一吉二㓙雖筮􅊇猶淂卜也則洪範所云者是也其大夫則大事筮大事若之地及葬日為之大則卜之故雜記云大天卜宅与葬日是也其小事用筮則少牢常礼筮日是也土亦大事卜事筮故土喪礼卜葬曰以喪为重湏定吉㓙故用卜也其寻常吉祭比葬為輕故日筮也葬既得卜日吉淂卜㓙事公吉可知故唯筮葬地不𣸪用卜也旬之外日逺其曰正義日案火牢大夫礼今月下旬卜筮来月上旬此是旬之外日也主人吿筮者云欲用逺其日故少牢云日用丁巳筮旬亘吉乃官誡既云旬有百是旬外旨此謂大夫礼云旬之内近某日者案特牲土礼云云不諏日注云土賤軄藝時至事睱可以祭則筮其日不如大夫先与有司扵庴門外諌謀丁巳之日也是土扵旬𥘉即筮旬内之日是旬之内日也主人告筮者云用近某日是也此㩀大夫上也故有旬外之日若天子諸侯其有雜祭或用旬外其辤公与此同也案少牢特牲其辤公云来曰丁亥不云逺其日者近其日者文不具也喪事先逺日正義曰喪事謂葬与二二祥祥是奪哀之義非孝心所欲但制不猶巳故卜先從逺曰而起不不冝急徴申孝心也故宣八年左傳云礼卜葬先逺日避不懷注懐思也避不思親此尊早俱然雖士亦應今月下旬先卜來月下旬不吉卜中旬不吉卜上旬吉事先近日者吉謂祭祀冠娶之属故少牢云若不吉及逺曰又筮日如𥘉是先日也日為日至有常正義日命龜筮辤也卜擇吉曰故日为日假尔㤗西有常假尔春筮有常者假因也尔汝尔扵蓍龜也㤗大中之大也𣣔府衣羙此龜筮故謂为大龜大筮也有常者言汝大龜筮制吉㓙分眀有常也故云假尓大龜大筮有常作筮大夫已上命龜有三命筮有二其一为事命龜是涖卜之官以主人命卜史是一也二人史既淂所卜之命吏述序涖卜所陳之辤名日述命二也卜人即席西面命龜云假朱㤗龜有常三也命筮二者一為事命筮則主人以所為之事命筮史是也二則筮史淂主人之命遂述之云云為述命是也土則命龜有一知土命筮有一者土喪礼云命筮人哀子某为其父筮宅筮人许諾不述命注云述不命土礼略是土命筮一也知土命龜二者土喪礼涖卜命曰哀子其卜葬其父無有近悔行諾不述命乃云即席西面龜既云不述命是土命龜二也知大夫命筮二者以上命苤不述命則知大夫巳上述命也故少牢云人日孝孫其来日丁交用薦歲事于皇祖伯某又云史遂述日假尔㤗筮有常孝孫某来曰了亥云云是大夫命筮二但冠即席所命扵述命之上也知大夫命龜三者喪礼涖卜为事命龜又有即席而命面龜云不𫐠命眀大夫述命故知大夫命龜三也正義曰此大事者謂小事之中为大事非周礼貞犬封及八事之等故徒用卜而巳可云大事卜者惣兼大貞大封及八事䓁雖卜筮並用惣公是卜故云大事卜俱大事卜則先茎後卜卜筮有若小事筮休有筮而无卜也卜筮不過三正義日王肅云礼以三为成也上旬中旬下旬三卜筮不吉則不舉也鄭意言不過三者謂下不吉而㓙凶而又卜以至於三三若不吉則正若筮亦也故魯有四卜之譏崔恩云謂不過三用之也若大事龜筮益用者先用三王筮次用三王龜始是一用也三如是乃为三也若𥘉始之時三筮三龜皆㓙則止或逆多徒小或從逆少𥘉始此者公至扵三也單卜單筮其法唯一用而巳不吉則擇遠日不至於三也前以用三王之龜筮土有􅊇從故至三也此唯有用一故至扵三也案雀觧亦用三用王龜筮也注魯四卜郊春秋譏正義曰卜郊之事或三或四或五襄七年夏四月三卜郊不從乃免牲僖可一年夏及襄土年夏四月四卜郊不從成十年夏四月五卜郊不從三傳傳說叅差不同左氏之說魯郊常礼不湏卜可郊与不但卜牲与日唯周之三月为之不可在四月四月雖三卜亦为非礼故僖可一年在左傳云祀不卜常祀是常祀不卜也襄七年傳云唘蟄而郊丨而後耕今既耕而後而卜郊冝其不從用周之三月不可至四月也若公羊之義所云卜者皆为卜曰故僖可一年公羊傳云三卜礼也四月卜非礼又成十七年公羊傳云郊用正月上􅉝何休云魯郊特卜三正王之郊用夏正又定十五年三卜之運何休云運轉也以卜春正不吉故𣸪轉卜夏三月五月淂二吉故五月郊如休之竟魯郊牲卜三正假令春正月卜吉又卜殷正不吉則用夏正郊天若此三正之内有㓙不從則卜夏三月但滿三吉則淂为郊此公羊及何休之意也榖梁之説春秋卜者皆卜曰也哀元元年左傳穀梁傳云郊自正月至三月郊之時也我以十二月下􅉝卜正月上辛而不從則以正日下辛卜二月􅉝而不從則二月下􅉝卜三月上􅉝不從則不郊如是榖梁三正月之卜吉則为四月五月則不可与公羊說同与何住意異休以四月五月卜滿三吉則可郊也若鄭玄之意礼不當卜左氏同故箴高目旨云當卜礼日月耳不當卜可礼与不鄭又以魯之郊天唯用周正月建子之月牲数有灾不吉改卜後月故或用周之二月三月故有硌蟄而四月則不可故駮異義云引眀堂子四春正月乗大路祀帝扵郊又云魯用孟春建子之月郊則与天子不同月眀矣魯数失礼牲数有灾不吉則改卜後月如鄭之言則与公羊梁卜三公不同也此云魯四月卜郊春秋譏之用公羊榖梁三卜正四卜非正也是四卜为譏三卜淂正与左氏言違左氏三卜亦非故也卜筮不相襲正義曰襲因也前卜不吉則止不淂因更筮也若前筮不吉則心不淂因更卜是不相因襲也若相因不心是瀆龜筮則神不吉也王云三筮乃三卜不相襲者初各專其心也注卜不吉至筮之是也正義日公𥘉不吉故公更筮之是因襲也表記云筮不襲鄭云襲因也大事則卜小事筮然与此注不同者眀襲有二義故兩住各舉其一則大事各有所施不淂因龜卜小事因筮大事也二則不吉不可𣸪卜也不吉不可𣸪筮龜為卜正義曰觧卜筮所用也龜䖏筮後是龜覆扵筮榮為筮者筮在龜前為决也謂蓍為榮者榮俱以筴謀榮為義言用此物以謀扵前事也筮者先聖王之所以使民信時日者觧所以湏卜筮義也先聖㐲義以来聖人為天子者不直云先王又加聖字夫王未必聖者古来非一聖不必王孔子是也眀造制卜筮必湏聖位兼者四時及一月十二月也日者甲乙之属聖王制此卜筮使民探愪而信時日之吉㓙也敬鬼神者擇吉而祭是敬鬼神也畏法合也者法典則也令教訓也君行法令若依卜筮而為之則民敬而畏之也所以使民决嫌疑者事火異更云所以有嫌疑而卜筮决㫁之也㝎猶豫也者説文云猶獸名擢属則必踐之者踐善也言卜筮淂吉而行事必善也王云淂可行之日必履而行之踐履也弗非无非之者也君車将駕終扵篇末正義曰此以下物眀乗車顧式僕御謹敬之事各随文解之君車将駕者謂為君之御祀也君車君所乗之車也将駕謂始駕時也則傼執策立於馬前者傼即御車者也古之好人为之故孔子日吾執御又云子適衛舟有傼及周礼諸侯傼公用大夫土也筮馬杖也别有牽馬駕車而此傼火知車事故監駕也又恐馬奔走故自執馬校倚立當馬前也鄭云執筮是監馬前是恐馬行也己駕則傼展輪者己駕駕竟展視也軨舊文車蘭也駕竟傼從在車輪左在四面具㸔視之上至扵蘭也盧云軨轄頭也皇氏謂軨是轄頭盧是也一則車行由轄二則蘭之苓字不作車邊為之鄭云展軨具視謂遍視之也郊馬者効白也傼監視駕竟而入白君道駕畢故云日巳駕也奮衣由右􅎅者奮振也由從也偍後右邊然上也傼入白駕竟先出就車扵車後自振衣去塵而從右邊升上也必從右者君位在右故避君空位耳貳綏者弍副也綏登車纆也綏有二是正綏擬君之升一者副綏擬傼右之升故傼振衣畢取副綏而升也詩云升祈綏車箋云綏所引登事有舊晚乗者謂傼先諓車時君既未出未敢依常而立所以跪而乗之以為敬也然此是暫試空左不嫌也執策分轡者筴馬杖也轡御馬索也車有一轅而四馬乗之中史兩夹轅者名服馬兩邊各騑馬亦日驂馬故待云兩服上驤兩驂應行言与中服相次序是也然每一馬有二轡四馬則以驂馬内轡繋扵軾前其驂馬外轡并夹轅兩㐲馬各二轡云轡在手分置兩手手各淂三轡故詩云六轡沃若是也令言執策分轡謂一手執村又云轡以三置空手中以三置杖手故云執筴分轡也馳之者分轡既竟試駈行之也五步而立者傼時跪而駈今馬行行淂五步正而僕倚立待君出也何㣧云跪以見敬則立調試之也君出就車者謂君始出上事時也則傼并轡授綏者君𥘉欲上而傼并六轡及筮置一手中所餘一空手取正綏以授与君命登車也當右手并轡左手授綏轉身向後引君上也左右攘辟者詩待駕陪位諸臣也攘刧也避逺也君已上車車欲進行故左右者悉遷却以避車淂不仿車行也車駈而驟者左右避故駈車而進則左右從者疾趍從車行至子大门者大门君㝡外门也謂車行至外门時也君橅傼之手者撫案止也傼手執轡車行由人君欲令駐車故君枊心撲手也而顧命車右就車者顧逥頭也郑笺詩廻首日顧也車右勇力之土也就車謂君命勇土令上車也車行則中有三人君在左傼在中央勇土在右也初在门内未顧勇之士士故從趍在車後今車行既至大门方出履險阻恐有非常故廻頋命車右上車也门閭渠必步者是車右土之礼也门閭謂凡所從門閭遇䖏也溝廣深四尺者渠亦溝也步謂下車勇土雖即上車車若至門閭溝渠而舅土必下車也所以然者一則君子不誣十夕丨遇門閭必弍則臣當下也二則溝深危險恐有傾覆故勇土亦湏下泆特之也而傼不下者車行由傼之下則車无御故不下凡傼人之礼必授人綏正義曰凡傼謂為一切傼非但為君傼時也車上既為傼主所故為人御必授綏与所升之也人若傼者䧏木者謂土為大夫大夫為郷也若傼御者早降則主人不湏謙故受取綏也然則否者不然謂傼者敵體雖御其主人冝謙不綏也若傼者䧏木橅傼之手者傼者雖卑而受其綏不嫌猶當撫止傼手若不聽自授然乃受也不然則自下拘之者不然不䧏木者也既敵受而傼者必授則主人當却手從傼手下自拘取之注云撫小心之謙也至則不受正義曰由從也此時主人初𣣔上而僕在車上轉身向主人以授綏主人不就傼手外取而以手從傼手外下進拘取傼手畏上邊示不傼授也云傼与巳同不爵則不受車不入大門正義曰案公食大夫記云賔之示車大門外西方賔車不入門廣敬与此同覲礼記云偏駕不入王門謂同姓金路異姓象路之等舍之等扵賔館不淂入王門又云黙車龍旂以朝黙車淂入門大但不淂入入門伹不庴門婦人不立乗正義曰立倚也質弱不倚乗也異男子也男子倚乗而婦人坐乗所以異也犬馬不上扵堂正義曰賔主相見礼也犬馬乃将為礼而賤不牽上人堂也犬則執緤馬則執靮以呈之取非摯弊故也故君子黄已詩云黄髮兒齒公老人也注云彂句言故眀知此是衆萹雜辤正義日謂他萹上舊礼雜辤此辤連上生下所以有故今位記者及此他萹雜辤而未為此淂彂首有故下郷位正義曰卿位路門之内門東北面位故論語郷黨云入門又云過位色勃如注云過位謂入門非面君揖之位故燕礼大射鄉大夫門在非面公䧏阼階南向尔卿是也今謂尋常出入出則過郷位而上車入則未到郷位而下車若迎賔客則楽師注云登車大寝之前友䧏于阼階之前或可下卿是諸侯礼楽师㩀天子礼入國不馳者馳車馳國中人多若馳車則害人故不馳愛人也若馳善好藺人也猶善好也藺雷㓨也若車馳則行㓨人也何胤云藺􅺺也入里必式者五家為里里巷首有門十室不可誣故入必式而礼之為敬也里必式則閭亦弍故門閭必步也不涇十室也論語云十室之邑必有忠信如丘者焉是不誈十室也君命召者謂有命呼召臣也雖賤人者君之使者雖假今是賤人為之大夫士必自御之者御迎也使者雖賤而君命可尊故大夫土之貴者亦自出迎之注御當為訝至乱之耳正義日鄭云引春成年二季孫行父臧孫者使眇者二大夫約相与率师為鞌之戰鄭言彼既以御為訝此御故冝是訶而世人乱之瀆云御耳介者不拜者介甲鎧也著鎧者不為弍敬故冝无所拜也為其拜而蓌拜也者解所以不拜義也蓌挫也戎客暨暨若著甲而屈拜挫損其戎威之客也一云菱詐也言著鎧而拜形儀不似扵詐也慮矯蓌則失容節菱猶詐也詳車壙左正義曰此以下又眀傼御礼也祥猶吉也車吉謂平吉時所乗者也死葬時因為魂車鬼神尚吿故葬魂乗吉車也壙空也車上貴左故傼者在空右左以擬神也注空神位也祥車葬之乗車也正義日知葬之乗車者以其大小二祥生人所示車無空左之法言空唯㩀葬時魂車故知也乗君之乗車正義日君乗車謂君次路也王者五路王自乗一所餘四路公從行臣若乗不敢空左故典路云凡會同軍振於四方以路從鄭云王出扵事无常王乗一路典路以其餘路從亦以華國也又戎右軄云會同元革車鄭云會同王雖示金路猶以革路行充之者謂居左也興礼日示君之車示不敢曠曠左左則似祥車近扵㓙時故示者自居左必式雖䖏左而不敢自安故恒馮式也云示車則君公在左若兵戎革路則君在中央御者左居故成二年朝韓厥代御者居中杜云自非元師御者公在中将在左以此而言則师及君冝在中也又詩云左旋右䄂鄭云左左人謂御者也右車右也中謂将也兵車之法将居皷下御者在左君在左悪空其位也太傼云王出入則左御而前駈注云前駈如今導引而居左自馭不叅乗避王也亦有車右焉傼御婦人則進左手正義日傼在中央婦人在左傼御之時進左手特轡所以乗者形微相背也後右手者若進右手則近相相向向則生嫌御故後右逺嫌也御國君則進右手者後左手礼以相向爲敬故進右手非男女元所嫌也而府既御不淂恒形今之駒輿是也衣車如鱉而長也漢桓帝時禁臣下乗之也車上不廣欬正義曰弘大也欬聲欬也車巳髙若在上而火磬欬似自驕矜又驚衆也不妾指者妄虚也在車上髙若無事忽虚以手指麾四方亦为或衆也立視五奮者車上依礼奮䂓也車輪一周為一䂓示車之輪髙六寸侄一國三六十八淂丈八六寸為尺八寸惣一視有丈九八寸五䂓為九丈九六尺為步㹅为十六步半在車上所視則前十六步半地也注舊猶䂓正義日知舊為䂓者以舊䂓聲相近故為䂓䂓是圜囬故讀䂓言或為祟他夲祀記有作祟字或視馬尾車其尾近在車蘭前故車上式下頭時不淂遠而令瞻視馬尾頋不過榖者車轂也若轉頭迥頋不淂過過轂轂則掩後人私也故論語云車中不内頋是也國中以策慧卹勿驅者前云入國不馳此為故為遅行法也策馬杖慧掃也卹勿搔麾也入國不馳故不用鞭策但取竹帶葉者為杖形如掃尋故云策慧云卹勿者以筴微馬體不欲令疾但搔麾之時形状䘏勿然塵不出䡄者車轍也車行遅故塵埃不起不淂楊飛出轍外也國君下齊牛式宋廟正義日案齊右軄云凡有牲事則前馬注云王見是牲則拱而式又引曲礼日國君下宋厝弍齊牛鄭注周官与此父異者熊氏云此文誤當以周礼注為正冝云下宋厝式齊牛大夫土下公門式路馬者公門其君之门也路馬君之馬也敬君至门布下車君物故見君馬而式之也馬比门为輕故有下式之異乗路馬必朝服者謂臣路馬君之車馬也臣雖淂乗之猶不可慢故必朝眼而自御示之也載鞭策者又不敢執杖杖馬故但載杖以行也不敢授綏者若君左則傼人授今習儀者身既居左自馭而乗雖有車右而不敢授綏与已也左必式者既不空左故亦左而敬也此言不敢授綏与前不敢曠左文互也步路馬必道者此謵單牽君馬行時也步猶行也若行君之馬必中道正路為敬以足盛路馬彗有誅正義日芻食馬草也誅罸也此草擬为供馬所食若足蹴踰之者則𬒳責罸也齒路馬有誅者齒羊也若論量君馬歲數亦為不敬亦被責罸公廣敬也礼曲礼下正義日錄云義与前篇同簡爭分為上下禮奉者當心至則襲正義日此一節論臣所奉特及俛仰裼襲之莭依文觧之物有冝奉持之者有冝提契之者各因其冝奉之者謂仰手謂當心奉特其物提之者謂屈臂當前而提其物帶有二䖏朝服之属其帶則髙心深衣之類其帶則下脇以何知然王藻說大帶云叅分帶下申居二焉申長三尺而云居帶之下叅分之三則帶之下去地四尺五寸矣人長八尺為限若帶下四尺五寸則帶上所餘正三尺五寸故知朝服䓁帶則髙也而深衣云帶上無厭脇下无厭髀當深衣此眀平常提奉故益可知執天子之噐則上衡至提之正義日向眀常法此以下眀臣各為其君上提奉之礼也執特也上猶髙也衡平也平謂人之拱手正与心平故謂心為衡天子至尊噐不故冝下故臣為擎奉公髙扵心弥敬也此衡謂与心平也凡言衡有二䖏若大夫衡視則謂面为衡此为天子執噐則上衡謂當心也既有二䖏不同鄭云此衡謂与心平眀他云衡者不与心平也國君國君則平衡者周君諸侯也䧏扵天子故其臣為奉持噐与心齊平也大夫妥之者妥下也又䧏扵諸侯故其臣為奉噐下扵心也土則提之者上云大夫妥之以下扵心今为土提之又在妥之下即上提者當帶凡執主之噐執輕如不堯正義日向眀特奉髙下之節此辨特奉之容儀也主亦君也礼大夫稱主今此所言主通天子諸侯下含大夫爲君者故并日主土則不能也克勝也尊者之噐不論輕重其臣執之唯冝重慎噐雖数輕小而執之恒如實重如不勝之客也故論語日孔子云執珪鞠窮如也如不勝也躬礼日上介執玊如重之也執主噐弊圭璧尚左右手至电踵正義日眀提奉用手足之儀也圭璧瑞玉也尚上也謂執特君噐及弊玊也擎奉此物則右手左下手在上左尊故云上左手行不舉足車輕电踵者电也踵後脚也若執噐行時則不淂舉足但起前後使踵如車輕曵地而行云車輪曵踵也立則聲折垂佩至妥正義日向眀奉特及手足之儀此眀授受時礼也立倚也佩謂玊佩也帶佩兩邊臣則身冝僂折如聲之背故云聲折也身既僂折則所著之佩從兩邊出縣垂扵前也主佩倚者主謂君也倚猶附也君冝立直則佩直附倚身而不縣垂出前也則臣佩垂者君若直立佩倚扵身則冝曲曲折折則佩不淂倚身故縣示扵前也主佩垂則臣佩委者君若重慎折身而佩垂則臣弥曲故磐委扵地也然臣不彂初大曲必侍君僂而後方曲者亦授立不跪之義也執玊其有藉者則禓無藉則襲正義日化執玊之時必有其藻以承扵玊若書餝見美之時必垂藻之兩端令垂向扵下謂之有藉當時所執之人則去躰上外服以見在内裼衣故云有藉者則禓其至質充美之時承玉之藻不使下垂屈而在手謂之無藉當時所執之人則掩其上服襲盖禓衣謂之无藉者則襲此謂執玉之人或朝聘行礼或有禓時有襲時注云圭璋特而襲璧琮加束帛而禓亦是也正義日鄭云此者以絰云禓襲㩀人之禓襲欲眀玉亦有裼襲云圭璋特而襲者上公享王圭以馬享舌璋以皮皮馬既不上扵堂其堂上唯特有圭圭璋璋既是寳物不可露見䨱襲之故云圭璋特而襲也璧琮加束帛而禓者謂侯伯子男享天子璧以帛享舌琮以錦既有錦帛承玊其玊上唯用輕細之物蒙覆以禓之故云璧琮加束帛而禓也言亦是者非但人有禓襲其玊亦是禓襲之義此皇式之説然氏以為上眀賔介二人為禓襲圭璋特以下又眀賔主各自为禓襲謂朝聘時用圭璋特賔主但襲行享時用璧琮加束帛賔主但裼亦是也凡執玊天子執冒故玊人軄云執冒四寸以朝諸侯注云徳能覆冒天子四寸者方以尊接早以小為貴又孔安國注頋命云方四寸耶刻之用冒諸侯之以為瑞信子男執璧盖亦以刻駖覆之但無以言又執鎮圭以朝日及祭天地宗庴知者曲瑞云王執鎮圭以朝日又鄭志云祭天地宗廟亦執之是也朝日既執鎮圭則夕月亦當然也大宗伯云王執鎮圭注云以四鎮之山為琭飾其長尺二寸故玊人云鎮圭尺有二尺天子守之是也其五寸諸侯大宗伯又云公執桓圭注云雙桓謂之桓之宫室之象所以安其長九寸故玊人云命圭九寸公守之是也宗伯又云侯執信伯執聘圭注云盖公以人形為瑑餝父有麁縟耳欲其慎行以保身公長七寸故玊人云命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之江南儒者觧云直者为身其文縟細曲者为身其文麁略義或然也宗伯又云子執聲璧男執蒲璧注云聲所以養人蒲为席所以安人不執圭者末成國也盖瑑為聲稼及蒲草之文其侄公五寸故大行人云子執㯏璧男執蒲璧五寸是也凡圭廣三寸􅌋寸半刻上左右各寸半知者是躬礼記文其璧則内有孔外有玊其孔謂之好故尔雅釋噐云内俉好謂之璧好倍内謂之環内好若一謂之環此諸侯所執圭璧公朝于五寸及自相朝所通用也故典瑞前既陳玊則云朝覲宗過㑹同于五諸侯相見亦如之是也其公侯伯朝若公用璋知者以躬礼聘君用圭聘夫人以璋則知扵天子及舌亦然也其子男既朝王璧朝朝后冝用琮以璧琮相對故也鄭注小行人云其上公及二王後享天子圭以馬享后璋以皮其侯伯子男享天子璧以帛享后琮以錦其玉大小各如其命数知者玉人瑑琮九寸諸侯以享天子是也其諸侯相朝所執之玊与朝天子同其􅌋玊公璧以享君以享夫人知者約聘礼璧以享君琮以享君琮以享夫人眀朝礼亦當然子男相享則䧏用琥以繡璜以黼故鄭注小行人云其扵諸侯亦用璧琮子男扵諸侯享用瑭璜公下其瑞是也其諸侯之臣聘天子及聘諸侯其玊聘及玉享各降其若瑞一寸故玉人云瑑圭璋八寸璧琮八寸以覜聘是也其藉王之藻鄭注覲礼云繅以藉王以韋衣木廣袤各如其玊之大夫子則以五采書之諸侯則三采子男二采其卿大夫亦二采故興瑞云王五采五就公侯伯三采三就子男二采并就又云瑑圭璋璧琮二采一就是也熊氏五采五就者采别二行為一就故五就也三宋三就者亦采别二行为一就故三就也二采并就者亦采别二行為一就故并就三采一就者以卿大夫卑二采采别唯一行二行共为一就知然者雜記及聘礼記三采六寸則知天子諸侯采别为二木也此是周法其殷已上則礼説含丈嘉云天子三公諸侯公以三帛以薦王宋圴注云此殷礼三帛謂朱白象三正其五帝之礼薦玊用一色之帛故鄭注虞書一帛高陽氏之後用赤繒高􅉝氏之後用黒繒其餘諸侯用日繒其餘謂尭之諸侯既以采色盡韋衣扵板上前後垂之又有五色組䋲以為繋其組上以玄为地下以黄為地長尺無事則以繋玊有事則垂为飾故聘礼記云玄緟繋長尺絢組注云繋燕事則以繋玊因为飾用五采䋎上玄下綘为地是也其裼襲之義者繅藉有二種一者以韋衣木書之也者一絢垂之若之鏁藉則常有今言有無者據垂之者也其垂繅之時則湏禓屈繅之時則湏襲案聘礼賔至主人厝門之外賈人東面坐取櫝唘取櫝取圭垂繅不起而授上介注云不言裼者賤不禓也以人賤故不裼眀貴者垂鏁當裼也云上介不襲執王屈綽授賔注云束帛加璧享是有藉者裼凡朝之与聘賔与主君行礼皆而襲至行享之時則皆禓也習者以聘礼行聘則襲受享則禓凡享時其玊皆無故崔靈恩云𥘉享圭璋特故有其餘享則束帛加璧既有束帛不湏綽凡諸侯朝天子皆行三享之故礼大行人云公侯伯子男並云厝中将弊三享覲礼云四享者鄭注四當三初享或用龜或用虎之皮其次三牲魚腊龜金丹洙唯國所有分为二享皆以辟帛致之若其臣出聘唯行一享故聘礼致夫人聘享唯一享也禓之所以異扵襲者凡衣近體有𫀆禈之属其外有裘夏月則衣葛其上有禓衣上有襲襲之上有常著之服弁之属也掩而不門則謂之为襲若開此皮弁左袒出其禓衣謂之為裼故鄭注聘礼云裼者左袒也一玉之上若垂綽之時其人則裼屈之時其人則襲則裼相因表記云裼襲不相因者彼謂各執其物龜玊者則襲受享者則賜与此同也國君不名老至同名正義曰此節惣眀稱謂之事各依文觧之國君不名卿老者人雖有國家之貴而猶冝有所敬不淂呼其名者乎卿謂上卿貴故白卿老也世婦者謂兩媵也次扵夫人而貴扵諸妾也言諸侯雖貴不淂呼此二木人名也大夫不名世臣姪娣者丗臣父時老臣也姪是妻之兄弟之女娣是妻之姝從妻而来為妾也大夫不淂呼世臣及貴妾名也然王制云大夫不世爵此有世臣者子賢襲父爵者也土不名家相長妾者家相謂之大夫之也諸侯在喪稱嗣子其故其臣之子璧之不敢与世子同名也世子諸侯之適子也諸侯之臣若為其太子作名不淂与君適子同也白庸云乂在稱世子何繋扵君注云璧僣数也其先之生則亦不改也世或為大正義曰若名子与君世子同則嫌其名自比擬於君故儧效也世子貴不同則与庻子同不嫌又若其子生在君之世子前已為名而君来同之此是君来同已則湏易也故榖梁昭七年傳何以君臣君同名子不奪人之名重其所由来也是臣先名君後同之臣不改也又案雜記云与之諱同則稱字若先生与世子同名亦當然也諸侯子不可同則天子子故冝不也異義公羊説臣子死君父猶名之孔子云鯉死死是巳死而稱名左氏説大夫既没稱字而不名桓二年宗督其設事言死凡人扵恩猶不然況賢聖乎然鯉也死末蒲􅉝鯉死稱伯魚者案冠礼卄以稱伯其父未必要斈也但辛直稱伯耳集伯問案春秋君在稱世子君薨稱子其既葬稱子無言副子其者也又大夫之子當何張逸荅日此子其耳大夫之子稱未聞案稱副予其或殷礼也君使土聘至之正義日射法毎兩人相對以决勝負名之日偶偶貴賤必對故卿与卿偶大夫与大夫偶或竒餘不足則使土俻偶故大射君与賔偶卿大夫自偶又肖土御扵大夫日司射誓偶卑者与尊者為偶不異侯是言土淂預偶故此有使土射也不能則辤以疾者土若不能則不得云不但能當自稱有疾也何以然者天射以表德土既升朝必冝有德若云不能則是素喰足辱兼辱君不知人誤用巳也日其有負薪之憂者此稱疾之辤也其土名也負捨也薪藮日薪詩云如何匪攵仃不尅是大故用斧也憂勞也言巳擔藮餘勞不堪射也不直云病云負薪者若直云病則以傲慢故陳病之所由眀非假也然土禄伐耕旦𣸪問庻人子云能負薪而今上負薪者亦謙辤也兼言昔未為土時經擔樵今由動彂昔勞也白虎云天子疾云日不豫言不𣸪歡豫諸侯病日負子子民也言負民不𣸪子之也桓十六年街侯朔出奔齊公羊云有疾日負咨諸侯之疾所名不同者盖子兹諮公聲相近其字相乱未知􅌻是音義隱云天子日不豫諸侯曰不燕大夫日犬馬土日負薪注云使土射謂以俻偶憂或為疾正義曰知非土自射而云俻偶者熊氏云若其自射不湏使又不應辤以其言使言辤故俻偶侍扵君子不頋望而對非礼正義曰謂多人侍人君子有問若指門一人則一人直對若並問多人則侍者當先頋望坐中或有勝巳勝已者冝前而巳不淂率則尔先對非礼也注云礼謙尚也至先對者也正義日此證問多人而不頋望對者論語云子路曾誓冉有公西華四人侍㘴扵孔孔子子合問四人各言其去而子路率尓先對云願治千禾之國而孔子哂之云為國以礼其言不讓是哂故君子行礼至之法正義日此一節論臣去夲國行礼之事各随文解之云君子行礼者謂去先祖之國居他者也求猶務也俗者夲國礼法所行眀雖他國猶冝重夲行我國法不務變之從新也如祀宗之臣入扵齊魯齊之臣入扵杞宗各冝夲行巳夲國礼法也此云不求變俗謂大夫出他國不變已之夲國之俗案鄭去鄭荅趙商以為街武公居殷墟故用殷礼即引此云君子行礼不求變俗如鄭之意不變所往之國舊時風俗与此不同者熊氏云若人出居他國衣不忘夲故變夲風俗若人君務在化民因其舊俗故住之雜新國不湏改也然則不求變俗其文雖一伹人君人臣兩義不同熊氏必知人君不易舊俗者王制云脩其教不易其俗又左傳定四年封魯公國商之人封康叔於殷公唘以高政封唐叔扵夏憈唘以夏政是公因其俗也案有列扵朝有䛇扵國三世之喪服為舊君變衰三月傳日三不從侍放京絶者爵禄尚列扵朝出入尚有詔扵國如喪服所云大夫侍放之時名為有列有䛇不至三世者熊氏云彼據為舊君著服故以未去國之時為有列有䛇此㩀去國之後但有列䛇仍行舊國之礼断章取證故彼此不同登祀之礼者此陳不變之事若登祀不變即夏立尸殷坐尸周旅酬六尺及先求隂陽犠牲騂里之属也居衰之服者殷雖尊貴猶服傍早周則以尊隆注之位者殷不重過以班高䖏上周世貴正嗣孫居其首公從其國之故者謂故佋也凡上諸事悉不改革行之如夲國故佋也然正舉三條者餘冠婚之属從可知也謹脩其法而審行之者并結前事令分眀謹脩夲法審慎以行之也其法謂其先祖之制度若夏殷子孫在周者悉行其先世之礼是不變俗去三國世爵禄有列扵朝至宗後正義日此以下眀在他國而淂變故俗者也将眀淂變故上先眀未淂者也去國三世謂三誅不用或事礙𬒳黜去入新國巳經三世者也則鄭云二世自袒至孫也爵禄有列扵朝謂夲君不絶其祖祀後為立在朝者也出入有詔扵國者出入猶吉㓙之事更相往来也詔吿也去巳三世而夲國之君猶為立既為立後不絶則若有吉凶之事當与夲國之卿大夫往耒出入共相赴吿故云出入有詔扵國注云若臧孫紇夲邾立臧為矣正義日引之證有列者也臧孫紇臧武仲也時為季孫家臣癈長立火故与孟氏相忌遂出奔制邾魯人以臧氏有㓛復立其異母弟臧為以守先祀是有列也故魯衰公卄三年云臧紇奔邾自邾使吿臧賈且致夲蔡日紇不倿失守宗祧敢告不予紇之罪不及不及不祀子以大蔡納請其可賈日是家之禍非子之過賈聞命矣再拜受龜使爲以納請遂自爲也紇非能害也乃立臧爲紇致防而奔齊是也若兄弟宗族猶存則反吉扵正義日此是出巳三世而爵禄無列扵朝吉凶不相䛇告而不仕新國者宗族兄弟謂之夲國之親宗太後宗之後也己朝夲已不列不告若宗族猶在兄弟尚在已有吉㓙當反還吿宗適不忌夲故也前告國者亦告兄弟耳然既未仕新國猶用夲礼也音義隱云雖無列扵朝有吉㓙猶反吿扵宗子其都無親在故國不𣸪来往也云國三世至之法正義日此猶是無列無
