  text: 禮記正義卷第六十八
  hash: sha256:93c85ddcb86e271c739cbfe883f2266bcf93a9b9970d5081868fbadc0266ea19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0061_SBCK_006-1a}
body:
  text: 唐國子祭酒上護軍曲阜縣開國子臣孔穎逹等奉勑撰冠義第四十三正義曰案鄭目録云名曰冠義者以其記冠禮成人之義此於別録屬吉事但冠禮起早晚書傳既無正文案略説稱周公對成王云古人冒而句領注云古人謂三皇時以冒覆頭句領繞頸至黃帝時則有冕也故丗本云黃帝造火食旃冕是冕起於黃帝也但黃帝以前則以羽皮為之冠黃帝以後乃用布帛其冠之年即天二諸侯十二而冠故襄九年左傳云國君十五而生子冠而生子禮也又云一星終也是十二年歲星一終案文王十五而生武王尚有兄伯邑考金縢云王與大夫盡辨時成王十五而著辨則成王已冠矣是天子十二而冠與諸侯同又祭法云王下祭殤五若不早冠何因下祭五等之殤大夫冠之年幾無文案喪服大夫為昆弟之長殤大夫既為昆弟長殤則不二十始冠也其士則二十而冠也曲禮云十曰弱冠也其夫子之子亦早冠所以祭殤有五其諸侯之子皆素裳奠摯奠之於君也遂以摯見于鄉大夫鄉生者以摯謂以雉也故士相見禮冬用雉夏用腒見於鄉大夫謂在朝之鄉大夫也鄉先生謂鄉老而致仕也成人之者此明加冠成人之義必成人者將責成人禮焉冠責以成人之事若成人事立可以治人也是冠者為治之本故先王重之行之於廟士行之於禰廟故士冠禮注廟謂禰廟既在襧廟此云尊先祖者尊禰即尊先祖之義且下士祖禰共廟其諸侯則冠於大祖之廟故左傳云先君之祧以處之聘禮云不腆先君之祧鄭注以為始祖之廟則天子當冠於始祖廟也服虔注左傳先君之祧處之以為曽祖廟者以左傅魯襄公冠於衛成公之廟衛成公則當今衛君獻公曽祖服虔望時解之故以祧為曽祖非鄭義也昏義第四十四正義曰案鄭目録云名曰昏義者以其記娶妻之義內教之所由成也此於別録屬吉事也謂之昏者案鄭昏禮目録云娶妻之禮以昏為期因名焉必以昏者取其陽往隂來之義入後二刻半為昏以定稱之壻曰昏妻曰姻故經解注云壻曰昏妻曰姻是也謂壻以昏時而來妻則因之而去也若壻之與妻之屬名壻之親屬名之曰姻女之親屬名之為昏故鄭注昏禮云女氏稱昏壻氏稱姻爾雅壻之父為姻婦之父為婚又云壻之黨為姻兄弟婦之黨為婚兄弟是也其天地初分之後遂皇之時則有夫婦故通卦驗云遂皇始丗握機矩是法北斗七星而立七政禮緯斗威儀之篇七政則君臣父子夫婦及政等既稱夫婦是始自遂皇也譙周云大昊制嫁娶儷皮為禮是儷皮起於大昊也其媒官之義具於月令疏孟子云舜不告而娶是娶妻告父母亦起於五帝也其五帝以前為昏不限同姓異姓三王以來文家異姓為昏質家同姓為昏其昏之年幾案異義大戴説男三十女二十有昏娶合為五十應大衍之數自天子逹於庶人同一也故春秋左氏説國君十五而生子禮也二十而嫁三十而娶庶人禮也禮夫為婦之長殤長殤十九至十六知夫年十四十五見士昏禮也許君謹案舜年三十不娶謂之鰥文王十五而生武王尚有兄伯邑考知人君早昏娶不可以年三十非重昏嗣也若鄭意依正禮士及大夫皆三十而後娶及禮云夫為婦長殤者關異代也或有早娶者非正天子諸侯昏禮則早矣如左氏所釋毛詩所用家語説以男二十冠女十五而笄自此以後嫁娶至男女與家語異也昏禮至禮也正義曰此一節之迎於門外揖讓而升自從始至終也納采者謂采擇之禮故昏禮云下逹納采用鴈也必用鴈者白虎通云鴈取其隨時而南北不失節也又是隨陽之鳥妻從夫之義也問名者問其女之所生母之姓名故昏禮云為誰氏言女之母何姓氏也此二禮一使而兼行之納吉者謂男家既卜得吉與女氏也納徴者納聘財也徴成也先納聘財而后昏成春秋則謂之納幣其庶人則緇帛五兩卿大夫則玄纁玄三纁二加以儷皮及諸侯加以大璋天子加以榖圭皆具於周禮經注也請期者謂男家使人請女家以昏時之期由男家告於女家何必請者男家不敢自專執謙敬之辭故云請也女氏終聽男家之命乃告之納吉納徴請期每一事則使者一人行惟納徴無鴈以有幣故其餘皆用鴈主人筵几於廟者謂行此等之禮主人謂女父母設筵几於禰廟此等皆據士昏禮而知之也聽命於廟者謂女之父母聽受壻之使者之命於廟堂之上兩楹之間也父親至之也正義曰此一節明親迎之時父之醮子眀迎婦之節父親醮子而命之迎者謂壻父身親以酒醮子而命之親迎也男先於女也者釋命親迎之意所以必命迎者欲使男往迎之女則從男而來也是男子先迎女從後至是男先於女也若男子不迎女自來至是女自先來不得為男先於女也主人筵几於廟而拜迎于門外者主人女之父以壻來親迎故拜迎於門外以敵禮待之壻執鴈入揖讓升堂再拜奠鴈者主人就東階初入門將曲揖當階北靣揖當碑揖至階三讓主人升自阼階揖壻升自西階北靣奠鴈再拜蓋親受之於父母也於時女房中南靣母在房戶外之西南靣壻既拜訖旋降出女出房南靣立於母左父西靣誡之女乃西行母南靣誡之是壻親受之於父母但親受之非是分明手有親受示有親受之義故云蓋以疑之降出御婦車者謂壻降西階而出親御婦車也而壻授綏者謂婦升車之時而壻授之以綏御輪三周者謂壻御婦車之輪三匝然後御者代壻御之婦至壻揖婦以入者謂婦至壻之寢門壻揖以婦入則稍西避之故魏詩云宛然左辟謂此時也共牢而食在夫之寢胥故孝經云喪則致其哀祭則致其嚴是昏禮為諸禮之本也夫禮至體也正義曰此經因昏禮為諸禮之本遂廣明禮之始終始則在於冠昏終則重於喪祭其間有朝聘鄉射是禮之大體之事也夙興至代也正義曰此論昏禮明日婦見舅姑舅姑醴婦又舅姑入室婦饋特豚又眀日舅姑饗婦之節此即士昏禮也故有特豚饋於舅姑若大夫以上非唯特豚而巳雖以士為主亦兼明大夫故有厥眀舅姑共饗婦若士婦見舅姑之日即舅姑饗婦故士昏禮舅姑醴婦醴婦既訖則饗之不待厥明也婦執笄棗栗假修以見者案士昏禮舅坐于阼階西靣姑坐于房外南靣婦執笲棗栗進東靣拜奠于舅席訖婦又執腵修升進北靣拜奠于姑席是也贊醴婦婦祭脯醢祭醴者案士昏禮婦席于戶牖間贊者酌醴置於席前北面婦於席西東面拜受贊者西階上北面拜送又拜薦脯醢婦升席左執觶右祭脯醢訖以柶祭醴三是祭脯醢祭醴也成婦禮也者言所以見舅姑及醴之者成其為婦之禮也舅姑入室婦以特豚饋者案士昏禮舅姑入于室婦盥饋特無魚南代者則上經婦降自阼階以著代是也申重也既明婦禮順又重加之以著代之義也所以重責婦順焉也者言成婦禮眀婦順則重著代所以厚重責婦人之孝順焉分之則婦禮婦順著代三者別文皆揔歸於婦順故自此以下唯申明婦順也以審守委積蓋藏者言既當夫氏又成婦事以此詳審保守家之所有委積掩蓋藏聚之物也注室人謂女妐女叔諸婦也正義曰經既言順於舅姑乃和於室人是在室之人非男子也女妐謂壻之姊也女叔謂壻之妹諸婦謂娣姒之屬注云順備者行和當事成審也正義曰行是順於舅姑和謂和於室人當謂當於夫則前經所説是也云事成審者則前經以成絲麻布帛之事以審守委積蓋藏是事成審也是以至順也正義曰此經更申明前經成婦順之事所以能成婦順者以未嫁之前先教以四德故此經明嫁所教之事祖廟未毁教于公宫者此謂與君為骨肉親廟有四高祖之廟未毀除此欲嫁之女教於公宫也祖廟既毁教于宗室者謂與君四從以外同髙祖之父以上其廟既遷是祖廟既毀此女則教於大宗子之室教之其教已成祭女所出祖廟成也以為未嫁之前先教四德又祭而告但成其為婦之順欲使嫁而為婦奉遵此教而成和順注謂與至告焉正義曰此云教於公宫故知是天子諸侯同姓也天子當言王宫今經云公宫知兼天子者此云公宫謂公之宫也若天子公邑官家之宫耳非謂諸侯公宫也此昏義雖記士昏禮之事自此以下廣明天子以下教女及夫婦之義故此經教女舉貴者言云嫁女者必就尊者教成之者案內則女子十年不出使姆教成之明巳前恆教但嫁前三月特就公宫之教欲尊之也云教之者女師也者即詩周南云言告師氏則昏禮注云姆婦人五十無子出者也云祖廟女所出之祖也者謂女父與君所分出之祖或與君共髙祖而分出以下皆然與諸侯共髙祖廟未毁所出之女皆自公宫教之天子雖七廟親廟上自髙祖以下也云公君也者鄭恐唯謂諸侯之公故解公為君天子諸侯皆稱君云宗室宗子之家也者鄭既不云大宗小宗則大宗小宗之家悉得教之與大宗近者於大宗教之與大宗逺者於小宗教之此記謂君之同姓若君之異姓異姓始祖在者其後亦有大宗小宗其族人嫁女各於其家也云祭之祭其所出之柤也者此女出於君之髙祖則祭髙祖廟出於君之曽祖則祭曽祖以下皆然女親行祭詩云誰其尸之有齊季女是也云祭無牲牢告事耳非正祭也者以祭君之廟應用牲牢今其俎唯魚故云告事耳非正祭也云其齊盛用黍者以其告祭不用正牲則無稻梁既以蘋藻為羮則當有齊盛此士祭特牲黍稷故知此亦用黍也云君使有司告之者約雜記釁廟使有司行之故知此告成之祭亦使有司也若有卿大夫以下則女主之宗子掌其禮也云若其祖廟巳毁則為壇而告焉者此謂與宗子或同曽祖假令宗子為士只有父祖廟曽祖髙祖無廟則為壇於宗子之家而告焉若與宗子同曽祖則為壇告曽祖焉若與宗子同髙祖則為壇告髙祖焉此注或有作墠者誤也所以知者以祭法篇適士二廟一壇則曽祖為壇也大夫三廟二壇則髙祖及髙祖之父為壇或可宗子為中士下士伹有一廟無壇則為墠而告之也古者至盛德正義曰此一經因上夫婦昏禮之事故此明天子與后各立其官掌內卜之事法隂陽所為但后之所立六宫周之法也之制也欲見其婁相當夏周木對為內外也正義曰案宫人云掌王六寢之修注云路寢一小寢五是天子六寢也云六宫在後者后之六宫在王之六寢之後亦大寢一小寢五其九嬪以下亦分居之其三夫人雖不分居六宫亦分主六官之事或二宫則一人也或猶如三公分主六卿之類也云六官在前者六卿之官在王六寢之前其三孤亦分主六官之職揔謂之九卿故考工記云外有九室九卿朝焉是也云三公以下百二十人者周三百此百二十人延於百數故云似夏時以無正文故稱似也云內治婦學之法也者案九嬪職云掌婦學之法故知內治是婦學也云隂德謂主隂事隂令也者案內宰掌王之隂事隂令注云隂事謂羣妃御見之事隂令為王所求為於北宫也是故至義也正義曰此以下説男女之教若其不得日月為之適食人眀天子與后是父之與母之義是故曰食則天子素服而修六官之職蕩天下之陽事者謂救曰之時著素服蕩除天下之陽事有穢惡者案左傳昭三十一年十二月辛亥朔日有食之庚午之日始有謫謫謂曰之將食之氣氣見於上所以責人君也故詩云十月之交朔月辛卯日有食之亦孔之醜又云此日而食于何不臧是君之不善而曰食凡日食若壬午朔日有食之左傳云公問於梓愼禍福何為對曰二至二分日有食之不為災也日月之行也分同道也至相過也其他月則為災陽不克也故常為水也然詩之十月則夏之八月秋分曰食而為災者以辛卯之日卯往侵辛由反克金故為災昭七年夏四月甲辰朔日有食之而大咎衛君上卿四月夏之二月為災者以其甲辰之日甲為木辰為土卯當克土今日食土反克木故為災也昭二十一年秋七月壬午朔而日食壬為水午為火水應克火而日食火反克水不為災者以秋七月夏之五月是壬午之時得有克壬之理故不得為災杜預以為假曰食之異以戒懼人君其言若信若不信不可定以為驗也鄉飲酒義第四十五正義曰案鄭目録云名曰鄉飲酒義者以其記鄉大夫飲賔于庠序之禮尊賢養老之義此於別録屬吉事儀禮有其事此記釋其義也伹此篇前後凡有四事一則三年賔賢能二則鄉大夫飲國中賢者三則州長習射飲酒四則黨正言之皆謂之鄉飲酒知此篇合有四事者以鄭注鄉人州長黨正鄭又云飲國中賢者亦用此禮也鄭必知此篇鄉大夫賔賢能及飲國中賢者并州長黨正者以此經云鄉人即鄉大夫士則州長黨正又云君子謂卿大夫飲國中賢者下又云六十者坐五十者立侍亦是黨正飲酒之事下又云合諸鄉射是亦州長習射之禮鄭以此參之故知此篇兼有四事鄉則三年一飲州則一年再飲黨則一年一飲也所以然者天子六鄉諸侯三鄉鄉二鄉大夫一鄉各有鄉大夫而鄉有鄉學取致仕在鄉之中大夫為父師致仕之士為少師在於學中名為鄉先生教於鄉中之人謂鄉學每年入學三年業成必升於君若天子鄉則升學士於天子若諸侯之鄉則升學士於諸侯凡升之必用正月也將用升之先為飲酒之禮鄉大夫與鄉先生謀事學生最賢使為賔次者為介又次者為衆賔此鄉大夫為主人與之飲酒而後升之故周禮鄉大夫職云三年則大比放其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之鄭云賢者有德行者能者有道藝者故鄭云古者年七十而致仕老於鄉里大夫名曰父師士名少師而教學焉恆知鄉人之賢者是以大夫就而謀之賢者以為賔其次以為介又其次為衆賔而與之飲酒是亦將獻之以禮禮賔之也若州一年再飲者是春秋習射因而飲之以州長為主人也若黨一年一飲者是歲十二月國於大蠟祭而黨中於學飲酒子貢觀蠟是也亦黨正為主人也此鄉飲酒之義説儀禮鄉飲酒也但儀禮所據是諸侯之鄉大夫三年賔賢能之禮故鄭儀禮鄉飲酒目録云諸侯之鄉大夫三年將獻賢者於君以禮賔與之飲酒是也鄭必知諸侯鄉大夫者以鄉飲酒禮云磬階間縮􅋼注云大夫而特縣方賔鄉人之賢者從士禮也若天子之大夫特縣則鍾磬並有今唯云磬故知諸侯之鄉大夫也若諸侯之州長則士也故儀禮鄉射是諸侯州長經稱鹿中記云士則鹿中明非諸侯之鄉大夫為之也鄉飲至以道正義曰此一節初眀鄉飲酒之禮拜迎至拜洗相尊敬之事故聖人制之以道也鄉飲酒之義主人拜迎賔于庠門之外者此謂鄉大夫故迎賔于庠門外若州長黨正則於序門外也盥洗揚觶者謂主人將獻賔以水盥手而洗爵揚觶謂既獻之後舉觶酬賔之時亦盥洗也必盥以致其潔敬之意也拜至者謂賔與主人升堂之後主人於之上北靣再拜是拜至也拜洗者謂主人拜至訖洗爵而升賔於西階上北靣再拜拜主人洗也拜受者賔於西階上拜受爵也拜送者主人於阼階上拜送爵也拜既者既盡也賔飲酒既盡而拜也所以致敬也者言賔主相拜致其恭敬之心尊讓潔敬也者言入門而三揖三讓是尊讓盥洗揚觶是潔也拜至拜洗之等是致敬也故㧾結之云尊讓潔敬也者君子之所以相接也注庠鄉學也州黨曰序正義曰案州長職云春秋射于州序黨正云屬民飲酒于序是州黨曰序有室謂之庠無室謂之序鄉學為庠州黨為序學記云黨有庠者謂鄉人在州黨但於鄉之庠學不別立也則州黨曰序必是無室今案鄉射云豫則鈎楹內堂則由楹外故鄭注云庠之制有堂有室也豫讀如成周宣謝災之謝凡屋無室日謝今文豫為序序乃夏后氏之學亦非也以此言之則州黨為序其義非也今云州黨曰序者但州黨之序雖並皆無室今鄉射則鈎楹內是內之深無室事顯正得讀豫為謝是無室故也不得讀豫為序以序非無室之名故云非也以有楹內楹外之言故鄭特云序非也謂正鄉射文非非是餘處序字皆非也餘處之序並皆無室也但有虞氏之庠周以為鄉學夏后氏之序周以為州黨之學明夏時之序則有室也周時州黨之序則無室也序名雖同其制則別故鄉射注云序乃夏后氏之學非謂州黨之學也以鄉射為豫巳非今文為序又非故云亦非鄉學雖為序云亦有東西牆謂之序故鄉飲酒或云序東西州學雖為序據其序內亦有堂稱故鄉射或云堂東堂西也鄉人至賔也正義曰此一節明設尊及玄酒貴其質素又羞出東房及東榮設洗主人事賔之義也鄉人謂鄉大夫也士謂州長黨正也君子者謂卿大夫也尊於房戶之間賔主共之也者以鄉大夫等唯有東房故設酒尊於東房之西室戶之東在賔主之間示賔主之共有此酒也酒雖主人之設賔亦以酢主人故云賔主共之也尊有玄酒貴其質也者北面設尊玄酒在左謂在酒尊之西也所以設玄酒在西者地道尊右貴其質素故也羞出自東房主人共之也者謂供於賔也洗當東榮榮屋翼也設洗於庭當屋翼也必在東者示主人所以以事賓從冠義以來皆記者疊出儀禮經文每於一事之禮經義每義皆舉經文於上陳其義於下以釋之也他皆放此也賔主至務焉正義曰此一節明賔主介僎坐位之義也賔主象天地也介象隂陽也者天地則隂陽著成為天地故賔在西北天地嚴凝之氣著主在東南天地溫厚之氣著介坐在西南象隂之微氣僎在東北象陽之微氣三賔象三光者謂衆賔也四面之坐象四時也者主人東南象夏始賔西北象冬始僎東北象春始介西南象秋始其四時不離天地隂陽之內而坐即是賔主介僎之所象也曰聖者聖通也謂上諸事並是通賔主之意也聖立而將之以敬曰禮者謂通賔主之事其道巳立能將行之以恭敬乃謂之禮也禮以體長幼曰德德者得也既能有禮以體成長糿於事得冝故曰德也德也者得於身也重釋稱德之義是得善行於其身謂身之所行皆得於理也古之學術道者將以得身也者術者藝也言古之人學此才藝之道也將以得身也謂使身得成也此謂賔賢之人有術道今以賔敬接待之事其尊敬學習術道身得成就而有令名是故聖人務焉者以上賓主德義之事於禮最重故聖人務行焉祭薦至爭矣正義曰此一節眀飲酒之禮祭薦祭酒相尊敬之心貴禮賤財之義祭薦者主人獻賔賔即席祭所薦時脯醢也祭酒者賔既祭薦又祭酒也敬禮也者言賔既祭薦又祭酒是賔敬重主人之禮也嚌肺嘗禮也賔既祭酒之後興取俎上之肺嚌齒之所以嘗主人之禮也啐酒成禮也於席末者啐謂飲主人酒而入口成主人禮於席末謂席西頭也案鄉飲酒禮祭薦祭酒濟肺皆在席之中唯啐酒在席之末又鄉飲酒禮云祭脯醢奠爵右取肺卻左手右絶末以祭尚左手嚌之興加于俎坐挩手遂祭酒嚌肺在前祭酒在後此先云祭酒者嚌是嘗嚌之名祭酒是未飲之稱故祭酒與祭薦相連表其敬禮之事言是席之正非專為飲食也者若此席專為飲食應於席中啐酒今乃席末啐酒此席之設本不為飲食是主人敬重於賔故設席耳祭薦祭酒嚌肺在席中者敬主人之物故在席中啐酒入於已故在席末也此所以貴禮而賤財也者於席上祭薦祭酒是貴禮席末啐酒是賤財也卒觶致實於西階上言是席之上非專為飮食也者卒觶主人酬賔賔卒立以兵觶也致實其所實之酒於西階上不就席卒觶者言此席之上非專為飲食也故不於席所而卒觶啐才始入口猶在席末也卒觶則盡爵故逺在西階上前文方論設席之禮故言是席之正此覆説前席故變文言是席之上上亦正也此先禮而後財之義也者先禮即貴後財則賤則亦上下互而相通也注致實至末也正義曰以經卒觶致實既云卒觶論其將欲卒觶之時舉其事者致實論其盡酒之體故更言致實也云酒為觴實者以盡酒稱致實之意酒為觴中之實今致盡此實也云祭薦祭酒嚌肺於席中唯啐酒於席末也者皆鄉飲酒禮文鄉飲至立矣正義曰此眀黨正飲酒正齒位之事六十者坐五十者立待者案鄉飲酒禮賔賢能則用處士為賓其次為介其次為衆賔皆以年少者為之此正齒位之禮其賔介等皆用年老者為之其餘為衆賔賔內年六十以上於堂上於賔席之西南靣坐若不盡則於介席之北東靣北上其五十者則立於西階下東靣北上示有陪侍之義非即在六十者旁同南靣立也以聽政役者所以立於階下示其聽受六十以上政事役使也所以明尊長也者言欲明尊敬六十之長老故立而聽政役六十者三豆至九十者六豆者以其每十年加一豆非正禮故不得為籩豆偶也其五十者亦有豆也但二豆而已則鄉飲酒禮衆賔立於堂下者皆二豆其賔介之豆無正文當依衆賔之年而加之也所以眀養老也豆是供養之物故云眀養老立侍是陪侍之儀故云明尊長也而后乃能入孝弟者人若知尊長養老則能入孝弟之行也民入孝弟謂入門而能行孝弟出尊長養老者謂出門而能尊長養老也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣者諸於也謂春秋二時聚合其民於州長鄉射之禮以教之鄉飲酒之禮謂十月黨正飲酒是教之鄉飲酒之禮既州長教射黨正教飲酒則民知尊長養老故孝弟之行以此而成立也注此説至禮也正義曰鄭知此經所説是黨正正齒位者以儀禮鄉飲酒之篇無正齒位之禮今此云六十者坐五十者立侍故知是黨正正齒位之禮此謂𥘉飲酒之時正齒位及其禮末皆以醉為度雜記云一國之人皆若狂是也云其鄉射則州長春秋以禮會民而射于州序之禮也者此則州長職文引之者證經中之鄉射也云謂之鄉者州黨鄉之屬也者既是州長黨正射飲而並謂之鄉者以州黨屬鄉故云鄉之屬也云或則鄉之所居州黨者鄭更云別解此州黨謂之鄉鄉之所居此州黨行飲酒射之禮鄉大夫則代此州長黨正為主人故得稱鄉射鄉飲酒也若鄉之州黨鄉所不居則鄉大夫不得為主人亦不得稱鄉射鄉飲酒但謂之州射黨正飲酒可也云如今郡國下令長於鄉射飲酒者謂郡治之下及王侯有國治之下滿萬戶以上之令不滿萬戶之長於己縣或射或飮酒則從郡之大守及主國之相來自行禮相監臨之儀不用令長禮也令長射而飲酒似州長黨正也大守與相來監臨似鄉大夫監臨也故引以相證也孔子至易也正義曰謂孔子先觀鄉飲酒之禮而稱知王道之易易故記者引之結成鄉飲酒之義吾觀於鄉者鄉謂鄉飲酒言我觀看鄉飲酒之禮有尊賢尚齒之法則知王者教化之道其事甚易以尊賢尚齒為教化之本故也不直云易而云易易者取其簡易之義故重言易易猶若尚書王道蕩蕩王道平平皆重言取其語順故也主人至別矣正義曰此一經明鄉飲酒之禮主人待賔之異明貴賤之別也衆賔自從之者主人親自速賔并往速介而衆賔不須往速自從賔介而來也而衆賔自入者謂賔介至門主人拜賔及介而衆賔不須拜自入門是賔介貴於衆賔貴賤之義别矣三揖至辨也正義曰此明主人於賔介禮隆殺分別也拜至獻酬辭讓之節繁者主人於賔三揖三讓拜其來至又酌酒獻賔賔酢主人主人又酌而自飲以酬賔是辭讓之節其數繁多也及介省矣者案鄉飲酒介酢主人則上主人不酬介也是及介省矣至干衆賓升受坐祭立飲不酢而降者案鄉飲酒之禮主人獻衆賔于西階上受爵坐祭立飲不酢主人而降西階東面也隆殺之義辨矣者於賔禮隆衆賔禮殺是隆殺之義别也工入至流也正義曰此一節論鄉飲酒設樂樂賔罷則以禮正之不至流邪之事也工入升歌三終者謂升堂歌鹿鳴四牡皇皇者華每一篇而一終也主人獻之笙入三終者謂吹笙之人入於堂下奏南陔白華華黍每一篇一終也主人獻之者謂獻笙人也間歌三終者間代也謂笙歌巳竟而堂上與堂下更代而作也堂上人先歌魚麗則堂下笙由庚此為一終又堂上歌南有嘉魚則堂下笙崇丘此為二終也又堂上歌南山有臺則堂下笙由儀此為三終也此皆鄉飲酒之文故鄭注鄉飲酒云間代也謂一歌則一吹也魚麗言大平年豐物多也此采其物多酒旨所以優賔也南有嘉魚言大平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之燕樂也南山有臺言大平之治以賢者為本此采其愛友賢者為邦家之基民之父母既欲其身之壽考又欲其名德之長也由庚崇丘由儀今亡其義未聞也合樂三終者謂堂上下歌瑟及笙並作也若工歌關睢則笙吹鵲巢合之若工歌葛覃則笙吹采蘩合之若工歌卷耳則笙吹采蘋合之所以知然者則鄉飲酒云乃合樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋鄭云合樂謂歌樂與衆聲俱作周南召南國風篇也王后國君夫人房中之樂歌也關睢言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采蘩言國君夫人不失職采蘋言卿大夫之妻能修其法度也工告樂備遂出者工謂樂正工先告樂正樂正告賔以樂備而遂下堂也言遂出者樂正自此至去不復升堂也鄉飲酒云工告于樂正樂正告于賔乃降注云樂正降者以正歌備無事也降立西階東北靣一人揚觶乃立司正焉者一人謂主人之吏也一人舉觶之後乃立司正樂既備將留賔旅酬為有懈惰故主人使相禮者一人為司正以監之也舉觶示將行旅酬也鄉飲酒云作相為司正又云司正洗觶升自西階阼階上北靣受命于主人主人曰請安于賔司正告于賔賔禮辭許注云為賔欲去留之告賔於西階又云司正既舉觶而薦諸其位注云司正主人之屬也無獻因其舉觶而薦之知其能和樂而不流也者結之也流失禮也工升歌後立司正以正之故知鄉飲酒能和樂不流邪失禮也賔酬至遺矣正義曰此經明旅酬之時賔主少長皆得酬酒長幼無被遺棄之事少長以齒終於沃洗者言旅酬之時賔主人之黨各以少長為齒以次相旅至於執掌罍洗之人以水沃盥洗爵者皆預酬酒之限此經主人酬介介酬衆賔雖據旅酬之時其少長以齒終於沃洗是無算爵之節也伹因其旅酬遂連言無算爵欲見無不周遍弟長而無遺而知終沃洗是其無算爵案鄉主人之贊者西靣北上不與無算爵然後與是也知其弟無遺矣者弟少也言少之與長皆被恩澤而無遺棄也故云知其能弟長而無遺也降説至亂也正義曰此一經明飲酒之禮雖爵行無數猶能節文自終不至於亂也降説屨升坐者此謂無算爵之初也以前皆立而行禮未徹俎故未説屨至此徹俎之後乃説屨升堂坐也修爵無數者謂無算爵也熊氏云謂行爵無數矣朝不廢朝者朝後乃行飲酒之禮是朝不廢朝也莫不廢夕者謂飲酒禮畢乃治私家之事是莫不廢夕此謂鄉飲酒之禮若黨正飲酒一國若狂無不醉也節文終遂焉者終謂終竟也遂謂曰也言雖至飲畢主人備禮拜而送賔節制文章終音申遂不有闕少故鄭云終遂由充備也知其能安燕而不亂也謂安在於燕樂而不至亂也貴賤至易也正義曰此一節揔結上經明上五種之事又覆説前文孔子所以知王道之易易也此五行者足以正身安國矣者五行謂上第一云貴賤之義別第二云隆殺之義辨第三云和樂而不流第四云弟長而無遺第五云安燕而不亂是五種之行也彼國安而天下安者以鄉飲酒於此將天下諸侯為彼國故云彼國安而天下安也鄉飲至本也正義曰此記者更覆説鄉飲酒之義有所法象之事前文雖備故此更詳也立賔以象天立主以象地者前文天地共言故云賔主象天地此則析言之賔以象天主以象地賔者主之所尊敬故以賔象天主供物以養賔故以主象地也設介僎以象日月者則前經隂陽也但隂陽據其氣日月言其體僎在東北象日出也介在西南象月出也注三光三大辰也正義曰案昭十七年有星孛于大辰公羊云大辰者何大火也伐為大辰北辰亦為大辰故爾雅云大辰房心尾也大火謂之大辰北極謂之北辰是三大辰也何休云大火與伐天所以示民時早晚天下取以為正故謂之大辰辰時也是天之政教出於大辰亨狗至本也正義曰此一節覆眀上立主象地以下諸文之意也亨狗於東方祖陽氣之發於東方也者此覆説前文羞出自東房也洗之在阼其水在洗東祖天地之左海也者此覆説前經洗當東榮因説水在洗東法天地左海也尊有玄酒教民不忘本也者此覆説上文尊有玄酒貴其質也賔必至參也正義曰此一節更揔明鄉飲酒坐所在并明三揖三讓每事皆三之義産萬物者聖也者聖之言主也東方産育萬物故為聖也養之長之假之仁也者假大也謂養育萬物長之使大仁恩也五行春為仁夏為禮今春為聖夏為仁者春夏皆生養萬物俱有仁恩之義故此夏亦仁也聖既生物以生物言之則謂之聖故東方為聖也各以義言之理亦通也中者藏也者言北方主智亦為信也若以五行言之則為信若以萬物歸藏言之則為藏也介必東鄉介賔主也者主人獻賔將西行就賓賔又南行將就主人介在西階之上以介覵隔賔主之間也主人者造之産萬物者也釋所以主人居東方之意東方産育萬物主人供客所須故主人造為産萬物之事也月者三日則成魄者謂月盡之後三日乃成魄魄謂明生傍有微光也此謂月明盡之後而生魄非必月三日也所以前月大則月二日生魄前月小則三日乃生魄三賔者政教之本者凡建國既立三卿助君治國今鄉飲酒立三賔象國之立三卿故云政教之本也注言禮者隂也大數取法於月也正義曰樂既為陽故禮為隂月是隂精故禮之數取法於月也禮記正義卷第六十八
